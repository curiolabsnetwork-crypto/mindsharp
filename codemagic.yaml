workflows:
  ios-workflow:
    name: MindSharp iOS
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: co.mindsharp.app
      node: 22
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Add iOS platform
        script: |
          npx cap add ios
          npx cap sync ios
      - name: Set up code signing
        script: |
          cd ios/App
          # Set team ID and automatic signing
          xcrun agvtool new-version -all 1
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier co.mindsharp.app" App/Info.plist
      - name: Build iOS
        script: |
          xcode-project use-profiles \
            --project ios/App/App.xcodeproj
          xcode-project build-ipa \
            --workspace ios/App/App.xcodeproj/project.xcworkspace \
            --scheme App \
            --team-id F5XQNUNHRF
    artifacts:
      - build/ios/ipa/*.ipa
