workflows:
  ios-workflow:
    name: MindSharp iOS
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      node: 22
      xcode: latest
    scripts:
      - name: Install dependencies
        script: |
          set -ex
          npm install
      - name: Add iOS platform
        script: |
          set -ex
          rm -rf ios
          npx cap add ios
          npx cap sync ios
      - name: Set up code signing
        script: |
          set -ex
          keychain initialize
          # Build sırasında yeni bir RSA private key oluştur
          ssh-keygen -t rsa -b 2048 -m PEM -f /tmp/codemagic_private.key -q -N ""
          # Bu key'i kullanarak Apple'da iOS Distribution sertifikası oluştur (yoksa)
          app-store-connect certificates create \
            --type IOS_DISTRIBUTION \
            --certificate-key=@file:/tmp/codemagic_private.key \
            --save \
            || echo "Certificate already exists, continuing"
          # Provisioning profile'ı çek/oluştur ve sertifikaları indir
          app-store-connect fetch-signing-files "co.mindsharp.twa" \
            --type IOS_APP_STORE \
            --certificate-key=@file:/tmp/codemagic_private.key \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Build iOS
        script: |
          set -ex
          xcode-project build-ipa \
            --project ios/App/App.xcodeproj \
            --scheme App
    artifacts:
      - build/ios/ipa/*.ipa
