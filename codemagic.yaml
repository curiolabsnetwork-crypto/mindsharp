workflows:
  ios-workflow:
    name: MindSharp iOS
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: co.mindsharp.app
      node: 20
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Add iOS platform
        script: |
          npx cap add ios || true
          npx cap sync ios
      - name: Build iOS
        script: |
          xcode-project use-profiles
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme App
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
