  <script>
    window.MindSharpAds = {
      _initialized: false,
      _rewardedReady: false,
      AD_UNIT_ID: 'ca-app-pub-9758848686103243/3344380722',
      async init() {
        try {
          if (!window.Capacitor || !window.Capacitor.isNativePlatform()) return;
          const { AdMob } = window.CapacitorAdMob || {};
          if (!AdMob) return;
          await AdMob.initialize({ testingDevices: [], initializeForTesting: false });
          this._initialized = true;
          this.loadRewarded();
        } catch(e) {}
      },
      async loadRewarded() {
        try {
          if (!this._initialized) return;
          const { AdMob } = window.CapacitorAdMob || {};
          if (!AdMob) return;
          await AdMob.prepareRewardVideoAd({ adId: this.AD_UNIT_ID, isTesting: false });
          this._rewardedReady = true;
        } catch(e) { this._rewardedReady = false; }
      },
      isReady() { return this._initialized && this._rewardedReady; },
      async showRewarded(onReward) {
        try {
          if (!this.isReady()) { onReward && onReward(false); return; }
          const { AdMob } = window.CapacitorAdMob || {};
          if (!AdMob) { onReward && onReward(false); return; }
          const result = await AdMob.showRewardVideoAd();
          this._rewardedReady = false;
          this.loadRewarded();
          if (result && result.type === 'Rewarded') { onReward && onReward(true); }
          else { onReward && onReward(false); }
        } catch(e) { onReward && onReward(false); }
      }
    };
    document.addEventListener('deviceready', () => window.MindSharpAds.init(), false);
    window.addEventListener('load', () => { setTimeout(() => window.MindSharpAds.init(), 800); });
  </script>

    function loadStats() {
      try {
        const s = localStorage.getItem('ms_stats');
        return s ? JSON.parse(s) : { totalGames:0, totalWins:0, bestScores:{}, bestMoves:{}, bestTime:{}, totalMoves:0, totalTime:0, maxCombo:0, streak:[] };
      } catch { return { totalGames:0, totalWins:0, bestScores:{}, bestMoves:{}, bestTime:{}, totalMoves:0, totalTime:0, maxCombo:0, streak:[] }; }
    }
    function saveStats(stats) { try { localStorage.setItem('ms_stats', JSON.stringify(stats)); } catch {} }
    function recordGameStats({ mode, moves, time, score, comboBonus }) {
      const stats = loadStats();
      stats.totalGames = (stats.totalGames || 0) + 1;
      stats.totalWins  = (stats.totalWins  || 0) + 1;
      if (!stats.bestScores[mode] || score > stats.bestScores[mode]) stats.bestScores[mode] = score;
      if (!stats.bestMoves[mode]  || moves < stats.bestMoves[mode])  stats.bestMoves[mode]  = moves;
      if (!stats.bestTime[mode]   || time  < stats.bestTime[mode])   stats.bestTime[mode]   = time;
      stats.totalMoves = (stats.totalMoves || 0) + moves;
      stats.totalTime  = (stats.totalTime  || 0) + time;
      if (comboBonus > (stats.maxCombo || 0)) stats.maxCombo = comboBonus;
      stats.totalScore = (stats.totalScore || 0) + score;
      const today = new Date().toISOString().slice(0, 10);
      if (!stats.streak) stats.streak = [];
      if (!stats.streak.includes(today)) stats.streak.push(today);
      saveStats(stats);
      return stats;
    }
    function getStreakCount(streak) {
      if (!streak || streak.length === 0) return 0;
      const sorted = [...streak].sort().reverse();
      let count = 0;
      let cur = new Date();
      cur.setHours(0,0,0,0);
      for (const d of sorted) {
        const dd = new Date(d);
        dd.setHours(0,0,0,0);
        const diff = Math.round((cur - dd) / 86400000);
        if (diff === 0 || diff === count) { count++; cur = dd; }
        else break;
      }
      return count;
    }

    const TILE_COLORS = ['#E8000A', '#29B6F6', '#F9A825', '#212121'];
    const GRID_CONFIGS = {
      '8x4': { rows:4, cols:8, pairs:16, maxNum:4, difficulty:'Classic', tileCount:32 },
      '8x7': { rows:7, cols:8, pairs:28, maxNum:7, difficulty:'Hard',    tileCount:56 },
    };
    const PREVIEW_TILES = [
      { color:'#E8000A', number:1, rot:-8,  y: 4 },
      { color:'#29B6F6', number:4, rot: 4,  y:-6 },
      { color:'#F9A825', number:7, rot:-5,  y: 8 },
      { color:'#212121', number:9, rot: 7,  y:-3 },
    ];

    function generateTiles(pairs, maxNum) {
      const colorCount = TILE_COLORS.length;
      const uniquePairs = [];
      for (let n = 1; n <= maxNum; n++) {
        for (let c = 0; c < colorCount; c++) uniquePairs.push({ number:n, color:TILE_COLORS[c] });
      }
      for (let i = uniquePairs.length-1; i > 0; i--) {
        const j = Math.floor(Math.random()*(i+1));
        [uniquePairs[i],uniquePairs[j]] = [uniquePairs[j],uniquePairs[i]];
      }
      const selected = uniquePairs.slice(0,pairs);
      const allTiles = [...selected,...selected].map((p,idx) => ({ id:idx, number:p.number, color:p.color, flipped:false, matched:false }));
      for (let i = allTiles.length-1; i > 0; i--) {
        const j = Math.floor(Math.random()*(i+1));
        [allTiles[i],allTiles[j]] = [allTiles[j],allTiles[i]];
      }
      return allTiles;
    }

    function calcScore({ pairs, moves, time, comboBonus }) {
      const baseScore = pairs * 100;
      const movePenalty = Math.max(0,(moves-pairs)*8);
      const timePenalty = Math.floor(time*1.5);
      return Math.max(0, baseScore - movePenalty - timePenalty + comboBonus);
    }

    function mulberry32(seed) {
      return function() {
        seed |= 0; seed = seed + 0x6D2B79F5 | 0;
        let t = Math.imul(seed ^ seed >>> 15, 1|seed);
        t = t + Math.imul(t ^ t >>> 7, 61|t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
      };
    }
    function getDailyDateKey() {
      const d = new Date();
      return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
    }
    function getDailySeed() {
      const key = getDailyDateKey();
      let hash = 0;
      for (let i = 0; i < key.length; i++) hash = Math.imul(31,hash) + key.charCodeAt(i) | 0;
      return Math.abs(hash);
    }
    function generateDailyTiles(gridMode) {
      const m = gridMode || '8x4';
      const cfg = GRID_CONFIGS[m];
      const sharedKey = getDailyDateKey() + m;
      let sharedHash = 0;
      for (let i = 0; i < sharedKey.length; i++) sharedHash = Math.imul(31,sharedHash) + sharedKey.charCodeAt(i) | 0;
      const sharedRng = mulberry32(Math.abs(sharedHash));
      const colorCount = TILE_COLORS.length;
      const uniquePairs = [];
      for (let n = 1; n <= cfg.maxNum; n++) {
        for (let c = 0; c < colorCount; c++) uniquePairs.push({ number:n, color:TILE_COLORS[c] });
      }
      for (let i = uniquePairs.length-1; i > 0; i--) {
        const j = Math.floor(sharedRng()*(i+1));
        [uniquePairs[i],uniquePairs[j]] = [uniquePairs[j],uniquePairs[i]];
      }
      const selected = uniquePairs.slice(0,cfg.pairs);
      const uid = (() => {
        try {
          let id = localStorage.getItem('ms_uid');
          if (!id) { id = Math.random().toString(36).slice(2)+Date.now().toString(36); localStorage.setItem('ms_uid',id); }
          return id;
        } catch { return 'anon'; }
      })();
      const personalKey = getDailyDateKey()+m+uid;
      let personalHash = 0;
      for (let i = 0; i < personalKey.length; i++) personalHash = Math.imul(31,personalHash) + personalKey.charCodeAt(i) | 0;
      const personalRng = mulberry32(Math.abs(personalHash));
      const allTiles = [...selected,...selected].map((p,idx) => ({ id:idx, number:p.number, color:p.color, flipped:false, matched:false }));
      for (let i = allTiles.length-1; i > 0; i--) {
        const j = Math.floor(personalRng()*(i+1));
        [allTiles[i],allTiles[j]] = [allTiles[j],allTiles[i]];
      }
      return allTiles;
    }

    function loadDailyStreak() {
      try { const raw = localStorage.getItem('ms_daily_streak'); return raw ? JSON.parse(raw) : { count:0, lastDate:null }; }
      catch { return { count:0, lastDate:null }; }
    }
    function saveDailyStreak(streak) { try { localStorage.setItem('ms_daily_streak', JSON.stringify(streak)); } catch {} }
    function updateStreak() {
      const today = getDailyDateKey();
      const streak = loadDailyStreak();
      if (streak.lastDate === today) return streak;
      const yesterday = (() => {
        const d = new Date(); d.setDate(d.getDate()-1);
        return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
      })();
      const newCount = streak.lastDate === yesterday ? streak.count+1 : 1;
      const newStreak = { count:newCount, lastDate:today };
      saveDailyStreak(newStreak);
      return newStreak;
    }
    function hasDoneToday() { return loadDailyStreak().lastDate === getDailyDateKey(); }
    function getDailyResult(gridMode) {

      };
      const play = (type) => {
        const ac = getCtx(); if (!ac) return;
        if (type === 'win') {
          [523,659,784,1047].forEach((f,i) => {
            const o2=ac.createOscillator(); const g2=ac.createGain();
            o2.connect(g2); g2.connect(ac.destination); o2.frequency.value=f;
            g2.gain.setValueAtTime(0.12,ac.currentTime+i*0.12);
            g2.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+i*0.12+0.3);
            o2.start(ac.currentTime+i*0.12); o2.stop(ac.currentTime+i*0.12+0.3);
          }); return;
        }
        if (type === 'combo3') {
          [523,659,784,880,1047].forEach((f,i) => {
            const o2=ac.createOscillator(); const g2=ac.createGain();
            o2.connect(g2); g2.connect(ac.destination); o2.type='sine'; o2.frequency.value=f;
            g2.gain.setValueAtTime(0.18,ac.currentTime+i*0.07);
            g2.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+i*0.07+0.25);
            o2.start(ac.currentTime+i*0.07); o2.stop(ac.currentTime+i*0.07+0.25);
          }); return;
        }
        if (type === 'combo') {
          [660,880].forEach((f,i) => {
            const o2=ac.createOscillator(); const g2=ac.createGain();
            o2.connect(g2); g2.connect(ac.destination); o2.type='sine'; o2.frequency.value=f;
            g2.gain.setValueAtTime(0.14,ac.currentTime+i*0.1);
            g2.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+i*0.1+0.25);
            o2.start(ac.currentTime+i*0.1); o2.stop(ac.currentTime+i*0.1+0.25);
          }); return;
        }
        const o = ac.createOscillator(); const g = ac.createGain();
        o.connect(g); g.connect(ac.destination);
        if (type==='flip')  { o.frequency.value=440; g.gain.setValueAtTime(0.1,ac.currentTime); g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.1); }
        else if (type==='match') { o.frequency.value=660; o.frequency.setValueAtTime(880,ac.currentTime+0.1); g.gain.setValueAtTime(0.15,ac.currentTime); g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.3); }
        else if (type==='fail')  { o.frequency.value=220; g.gain.setValueAtTime(0.08,ac.currentTime); g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.2); }
        o.start(); o.stop(ac.currentTime+0.3);
      };
      return play;
    }

    // Ardışık Guest ID — session boyunca sabit, localStorage'da tutulur
    async function getOrCreateGuestId() {
      try {
        const stored = localStorage.getItem('memotiles_user');
        if (stored) return stored; // Kullanıcı zaten isim seçmiş veya Guest ID var
        // Firestore'dan atomic increment ile unique numara al
        const counterRef = db.collection('counters').doc('guestId');
        let guestNum = 1;
        await db.runTransaction(async (tx) => {
          const doc = await tx.get(counterRef);
          if (doc.exists) {
            guestNum = (doc.data().next || 1);
            tx.update(counterRef, { next: guestNum + 1 });
          } else {
            tx.set(counterRef, { next: 2 });
          }
        });
        const guestName = `Guest${guestNum}`;
        try { localStorage.setItem('memotiles_user', guestName); } catch {}
        return guestName;
      } catch(e) {
        return 'Guest';
      }
    }

              <div style={{ background:'rgba(243,156,18,0.1)', border:'1px solid rgba(243,156,18,0.3)',
                borderRadius:12, padding:'8px 12px', marginBottom:8, display:'flex', alignItems:'center', gap:10 }}>
                <div style={{ fontSize:22 }}>{streakFire}</div>
                <div style={{ flex:1 }}>
                  <div style={{ color:'#b8860b', fontWeight:900, fontSize:14 }}>{streak.count} {t("daily_day_streak")}</div>
                  <div style={{ color:'rgba(100,60,10,0.55)', fontSize:11, marginTop:1 }}>{tomorrowMsg}</div>
                </div>
              </div>
              {/* İsim */}
              {(!nameSaved || !nameInput.trim()) ? (
                <div style={{ marginBottom:8, borderRadius:12,
                  background:'rgba(255,248,220,0.9)',
                  border:'1.5px solid #f0c040', padding:'10px 12px' }}>
                  <div style={{ color:'#7a3e00', fontWeight:700, fontSize:12, marginBottom:3, textAlign:'center' }}>
                    {lang==='tr' ? 'Bugünkü sıralamada görün' : "Appear on today's leaderboard"}
                  </div>
                  <div style={{ color:'#b8860b', fontWeight:600, fontSize:11, textAlign:'center', marginBottom:8 }}>
                    {dailyRank && dailyTotal
                      ? t('daily_name_rank_prompt').replace('{rank}', dailyRank).replace('{total}', dailyTotal)
                      : t('daily_name_norank_prompt')}
                  </div>
                  <div style={{ display:'flex', gap:6 }}>
                    <input type="text" value={nameInput} onChange={e => setNameInput(e.target.value)}
                      onKeyDown={e => { if (e.key==='Enter') { const n=nameInput.trim(); if(n){onSaveName(n);setNameSaved(true);} } }}
                      onFocus={() => { window.scrollTo(0,0); document.body.style.overflow='hidden'; }}
                      onBlur={() => { document.body.style.overflow=''; }}
                      placeholder={t("name_placeholder")} maxLength={20}
                      style={{ flex:1, padding:'8px 10px', borderRadius:9, border:'1.5px solid #e67e22',
                        background:'rgba(255,255,255,0.95)', fontSize:16, fontWeight:700, color:'#3d1a00',
                        outline:'none', textAlign:'center', transform:'translateZ(0)' }}/>
                    <button onClick={() => { const n=nameInput.trim(); if(n){onSaveName(n);setNameSaved(true);} }}
                      style={{ padding:'8px 14px', borderRadius:9, border:'none', flexShrink:0,
                        background: nameInput.trim() ? 'linear-gradient(135deg,#f39c12,#e67e22)' : 'rgba(200,169,110,0.3)',
                        color:'#fff', fontWeight:800, fontSize:16, cursor:'pointer' }}>✓
                    </button>
                  </div>
                  <div style={{ textAlign:'center', marginTop:6 }}>
                    <button onClick={() => setNameSaved(true)} style={{ background:'none', border:'none',
                      color:'rgba(120,80,20,0.45)', fontSize:10, cursor:'pointer', textDecoration:'underline' }}>
                      {t('name_skip')}
                    </button>
                  </div>
                </div>
              ) : (
                <div style={{ color:'rgba(100,60,10,0.5)', fontSize:11, textAlign:'center', padding:'2px 0 6px' }}>
                  {t("daily_leaderboard_name")} <span style={{ color:'#b8860b', fontWeight:700 }}>{nameInput}</span>
                  <button onClick={() => setNameSaved(false)} style={{ background:'none', border:'none',
                    color:'rgba(180,120,20,0.5)', fontSize:11, cursor:'pointer', marginLeft:6 }}>{t("daily_edit")}</button>
                </div>
              )}
              {/* Butonlar */}
              <button onClick={onShare} style={{ width:'100%', padding:'14px 0', borderRadius:14, border:'none', marginBottom:7,
                background:'linear-gradient(135deg,#f39c12,#e67e22,#d35400)',
                color:'#fff', fontWeight:900, fontSize:16, cursor:'pointer',
                boxShadow:'0 4px 16px rgba(243,156,18,0.5)', letterSpacing:0.5 }}>
                📤 {lang==='tr' ? 'Paylaş — Skoru Gönder!' : 'Share My Result!'}
              </button>
              <button onClick={onMenu} style={{ width:'100%', padding:'10px', borderRadius:12,
                border:'1.5px solid rgba(200,169,110,0.4)', background:'transparent',
                color:'rgba(120,80,20,0.6)', fontWeight:600, fontSize:12, cursor:'pointer' }}>
                {t("daily_back_menu")}
              </button>
            </div>
          </div>
        </div>
      );
    }

    function DailyScoresScreen({ onBack, dateKey, gridMode, myScore }) {
      const [entries, setEntries] = React.useState([]);
      const [loading, setLoading] = React.useState(true);
      const fmtT = s => String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
      const modeLabel = { '8x4':t('difficulty_classic'), '8x7':t('difficulty_hard') }[gridMode] || gridMode;
      const today = new Date();
      const dateLabel = today.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
      React.useEffect(() => {
        if (!db) { setLoading(false); return; }
        db.collection('daily_scores').where('dateKey','==',dateKey).where('gridMode','==',gridMode).get()
          .then(snap => {
            const rows = snap.docs.map(d => d.data());
            rows.sort((a,b) => (b.score||0)-(a.score||0));
            setEntries(rows); setLoading(false);
          }).catch(() => setLoading(false));
      }, [dateKey, gridMode]);
      return (
        <div style={{ width:'100%', display:'flex', flexDirection:'column', gap:10 }}>
          {/* Header — ScoreBoard ile aynı */}
          <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:4 }}>
            <button onClick={onBack} style={{ background:'rgba(0,0,0,0.35)', border:'1px solid rgba(255,255,255,0.2)',
              color:'#ffe082', borderRadius:10, padding:'7px 13px', cursor:'pointer', fontSize:16 }}>←</button>
            <h2 style={{ color:'#ffe082', fontFamily:'Georgia,serif', margin:0, fontSize:20,
              textShadow:'0 2px 6px rgba(0,0,0,0.8)' }}>{t('daily_header',{mode:modeLabel})}</h2>
          </div>

          <div style={{ background:'rgba(0,0,0,0.5)', borderRadius:16, padding:'14px 10px',
            border:'1px solid rgba(255,255,255,0.15)', backdropFilter:'blur(4px)' }}>

            {/* Tarih + oyuncu sayısı satırı */}
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10, padding:'0 4px' }}>
              <span style={{ color:'#ffe082', fontSize:12, fontWeight:700 }}>{dateLabel}</span>
              <span style={{ color:'rgba(255,224,130,0.6)', fontSize:11 }}>
                {getLang()==='tr' ? 'Bugün oynayan ' + entries.length + ' oyuncu' : entries.length + ' players today'}
              </span>
            </div>

            {loading ? (
              <div style={{ color:'rgba(255,255,255,0.4)', textAlign:'center', padding:24 }}>{t('loading')}</div>
            ) : entries.length===0 ? (
              <div style={{ color:'#ffe082', textAlign:'center', fontSize:13, margin:'16px 0' }}>{t("daily_no_scores")}</div>
            ) : (
              <div style={{ maxHeight:400, overflowY:'auto' }}>
                {entries.map((e,i) => {
                  const isMe = myScore > 0 && e.score === myScore;
                  const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
                  return (
                    <div key={i} style={{ display:'flex', alignItems:'center', padding:'6px 8px', marginBottom:4, gap:4,
                      background: isMe ? 'rgba(243,156,18,0.25)' : i===0 ? 'rgba(241,196,15,0.25)' : 'rgba(255,255,255,0.1)',
                      borderRadius:8, fontSize:11,
                      border: isMe ? '1.5px solid rgba(243,156,18,0.6)' : i===0 ? '1px solid rgba(255,200,0,0.4)' : '1px solid rgba(255,255,255,0.05)' }}>
                      {/* Sıra / madalya */}
                      <span style={{ fontWeight:700, color: medal ? '#ffe066' : isMe ? '#ffe066' : '#fff',
                        minWidth:52, flexShrink:0, fontSize:13 }}>
                        {medal || ('#'+(i+1))}
                      </span>
                      {/* İsim */}
                      <span style={{ color: isMe ? '#ffe066' : '#fff', fontWeight: isMe ? 800 : 600,
                        flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
                        {e.user||t('guest')}
                      </span>
                      {/* Sen badge */}
                      {isMe && (
                        <span style={{ background:'rgba(243,156,18,0.35)', border:'1px solid rgba(243,156,18,0.6)',
                          color:'#ffe082', fontSize:9, fontWeight:800, padding:'1px 6px', borderRadius:20, flexShrink:0, marginRight:2 }}>
                          {getLang()==='tr' ? 'sen' : 'you'}
                        </span>
                      )}
                      {/* Skor */}
                      <span style={{ color:'#ffe082', fontWeight:800, minWidth:44, textAlign:'right', flexShrink:0 }}>
                        {(e.score||0).toLocaleString()}
                      </span>
                      {/* Hamle */}
                      <span style={{ color:'#ffe082', minWidth:36, textAlign:'right', flexShrink:0 }}>
                        {(e.moves||0)}mv
                      </span>
                      {/* Süre */}
                      <span style={{ color:'#ffe082', minWidth:36, textAlign:'right', flexShrink:0 }}>
                        {fmtT(e.time||0)}
                      </span>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </div>
      );
    }

    function getCharacter(score) {
      // Filter all chars with minScore <= score, return highest minScore
      const eligible = CHARACTERS.filter(c => score >= c.minScore);
      if (eligible.length === 0) return CHARACTERS[CHARACTERS.length - 1];
      return eligible.reduce((best, c) => c.minScore > best.minScore ? c : best, eligible[0]);
    }

        if (needsName && !nameSaved) {
          setNameShake(true);
          setTimeout(() => setNameShake(false), 600);
          if (action) setPendingAction(() => action);
          return true;
        }
        return false;
      };

      // Character & fact — sabit kalsın, her render'da değişmesin
      const character = React.useMemo(() => getCharacter(score), [score]);
      const fact = React.useMemo(() => getRandomFact(), []);

      React.useEffect(() => {
        trackEvent('win_modal_view', {mode, score, rank, combo_bonus: comboBonus});
      }, []);

      React.useEffect(() => {
        const check = () => setAdAvailable(!!(window.MindSharpAds && window.MindSharpAds.isReady()));
        check();
        const timer = setInterval(check,1000);
        return () => clearInterval(timer);
      }, []);
      const handleWatchAd = () => {
        if (adWatched||adLoading) return;
        setAdLoading(true);
        window.MindSharpAds.showRewarded((rewarded) => {
          setAdLoading(false);
          if (rewarded) { setAdWatched(true); onScoreDoubled && onScoreDoubled(); }
        });
      };
      const displayName = needsName ? (nameSaved ? nameInput : t('well_played')) : user;
      const handleSaveName = () => {
        const n = nameInput.trim();
        if (!n) return;
        onSaveName(n);
        if (scoreDocId) updateScoreUsername(scoreDocId, n);
        setNameSaved(true);
        if (pendingAction) { setTimeout(() => { pendingAction(); setPendingAction(null); }, 50); }
      };
      React.useEffect(() => {
        const colors = ['#f39c12','#e74c3c','#2ecc71','#3498db','#9b59b6','#f1c40f','#1abc9c','#e67e22'];
        const shapes = ['■','●','▲','★','◆'];
        setConfetti(Array.from({ length:38 }, (_,i) => ({
          id:i, color:colors[Math.floor(Math.random()*colors.length)],
          shape:shapes[Math.floor(Math.random()*shapes.length)],
          left:Math.random()*100, delay:Math.random()*2.5,
          duration:2.5+Math.random()*2, size:8+Math.random()*10, rotate:Math.random()*720,
        })));
      }, []);
      const getRankInfo = () => {
        if (!rank) return { label:t('well_played'), color:'#95a5a6', bg:'rgba(149,165,166,0.15)' };
        if (rank===1) return { label:t('new_record'), color:'#f1c40f', bg:'rgba(241,196,15,0.2)', glow:true };
        if (rank<=3) return { label:t('top3'), color:'#e67e22', bg:'rgba(230,126,34,0.18)' };
        if (rank<=10) return { label:t('top10'), color:'#27ae60', bg:'rgba(39,174,96,0.15)' };
        return { label:`Rank #${rank}`, color:'#7f8c8d', bg:'rgba(127,140,141,0.12)' };
      };
      const rankInfo = getRankInfo();
      const today = new Date();
      const dateStr = `${String(today.getDate()).padStart(2,'0')}-${String(today.getMonth()+1).padStart(2,'0')}-${today.getFullYear()}`;
      const lang = getLang();
      const charName = lang==='tr' ? character.tr : character.en;
      const charQuote = lang==='tr' ? character.quotetr : character.quoteen;
      const factText = lang==='tr' ? fact.tr : fact.en;

      const buildCertificate = async () => {
        const W=1080, H=1920;
        const canvas = document.createElement('canvas');
        canvas.width=W; canvas.height=H;
        const ctx = canvas.getContext('2d');

        // Arka plan
        const bgImg = new Image(); bgImg.crossOrigin='anonymous'; bgImg.src='./wood_bg.png';
        await new Promise(r => { bgImg.onload=r; bgImg.onerror=r; });
        ctx.fillStyle='#2b1a10'; ctx.fillRect(0,0,W,H);
        try {
          const r = Math.max(W/bgImg.width, H/bgImg.height);
          ctx.drawImage(bgImg,(W-bgImg.width*r)/2,(H-bgImg.height*r)/2,bgImg.width*r,bgImg.height*r);
        } catch(e) {}
        const vg=ctx.createRadialGradient(W/2,H*0.4,50,W/2,H*0.4,H*0.7);
        vg.addColorStop(0,'rgba(0,0,0,0.2)'); vg.addColorStop(1,'rgba(0,0,0,0.78)');
        ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);

        // Ana kart
        const cx=60,cy=140,cw=W-120,ch=H-300,cr=48;
        const rr=(x,y,w,h,r)=>{ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();};
        ctx.save();ctx.shadowColor='rgba(0,0,0,0.6)';ctx.shadowBlur=60;ctx.shadowOffsetY=20;
        rr(cx,cy,cw,ch,cr);
        const cardGrad=ctx.createLinearGradient(cx,cy,cx,cy+ch);
        cardGrad.addColorStop(0,'#fdf6e3');cardGrad.addColorStop(0.5,'#fef9ed');cardGrad.addColorStop(1,'#f5e6c8');
        ctx.fillStyle=cardGrad;ctx.fill();ctx.restore();
        rr(cx,cy,cw,ch,cr);ctx.lineWidth=10;ctx.strokeStyle='#c8a96e';ctx.stroke();

        // Gold top bar
        ctx.fillStyle='#b8860b';
        for(let i=0;i<W;i+=3){const g=ctx.createLinearGradient(0,cy,0,cy+12);g.addColorStop(0,'#f0c040');g.addColorStop(1,'#b8860b');ctx.fillStyle=g;}
        ctx.fillRect(cx+10,cy,cw-20,12);

        // MindSharp başlık
        ctx.save();ctx.textAlign='center';
        ctx.font='900 110px Georgia,serif';
        const tg=ctx.createLinearGradient(W/2-250,0,W/2+250,0);
        tg.addColorStop(0,'#8B4513');tg.addColorStop(0.5,'#c8860a');tg.addColorStop(1,'#8B4513');
        ctx.fillStyle=tg;ctx.shadowColor='rgba(0,0,0,0.2)';ctx.shadowBlur=8;
        ctx.fillText('MindSharp',W/2,cy+150);ctx.restore();

        // Achievement banner
        const bx=cx+80,by=cy+178,bw=cw-160,bh=68,br=12;
        rr(bx,by,bw,bh,br);
        const bg2=ctx.createLinearGradient(bx,by,bx+bw,by);
        bg2.addColorStop(0,'#b8860b');bg2.addColorStop(0.5,'#f0c040');bg2.addColorStop(1,'#b8860b');
        ctx.fillStyle=bg2;ctx.fill();
        ctx.save();ctx.textAlign='center';ctx.font='800 34px Segoe UI,Arial';ctx.fillStyle='#5a2d00';
        ctx.fillText(lang==='tr'?'T E B R İ K L E R !':'C O N G R A T U L A T I O N S !',W/2,by+46);ctx.restore();

        // Rank — only for top 3
        if(rank && rank<=3){
          const rankColor=rank===1?'#f1c40f':rank<=3?'#e67e22':'#27ae60';
          const rankLabel=rank===1?(lang==='tr'?'YENİ REKOR!':'NEW RECORD!'):(lang==='tr'?'İLK 3 — Harika!':'TOP 3 — Amazing!');
          ctx.save();ctx.textAlign='center';ctx.font='900 42px Segoe UI';ctx.fillStyle=rankColor;
          ctx.fillText(rankLabel,W/2,cy+298);ctx.restore();
        }

        // Kullanıcı adı
        ctx.save();ctx.textAlign='center';
        ctx.font='900 80px Segoe UI,Arial';ctx.fillStyle='#3d1a00';ctx.shadowColor='rgba(0,0,0,0.15)';ctx.shadowBlur=8;
        ctx.fillText((user||t('guest')).trim(),W/2,cy+468);ctx.restore();

        // ── Karakter görselini canvas'a çiz ──
        const charImg = new Image();
        charImg.crossOrigin = 'anonymous';
        charImg.src = character.img;
        await new Promise(r => { charImg.onload=r; charImg.onerror=r; });
        try { ctx.drawImage(charImg, W/2-160, cy+490, 320, 320); } catch(e){}

        // Karakter ismi pill
        const pillX=W/2-200, pillY=cy+830, pillW=400, pillH=70;
        rr(pillX,pillY,pillW,pillH,35);
        ctx.fillStyle=character.labelBg||'#3a6aff';ctx.fill();
        ctx.save();ctx.textAlign='center';ctx.font='800 32px Segoe UI,Arial';ctx.fillStyle='#fff';
        ctx.fillText(charName,W/2,pillY+46);ctx.restore();

        // Skor bloğu
        const spx=cx+70,spy=cy+1020,spw=cw-140,sph=220,spr=28;
        rr(spx,spy,spw,sph,spr);
        ctx.save();ctx.shadowColor='rgba(200,120,0,0.4)';ctx.shadowBlur=28;ctx.shadowOffsetY=10;
        const sg=ctx.createLinearGradient(spx,spy,spx+spw,spy+sph);
        sg.addColorStop(0,'#e67e22');sg.addColorStop(1,'#c0392b');ctx.fillStyle=sg;ctx.fill();ctx.restore();
        ctx.save();ctx.textAlign='center';
        ctx.font='800 30px Segoe UI';ctx.fillStyle='rgba(255,255,255,0.85)';ctx.fillText(t('score_label'),W/2,spy+58);
        ctx.font='900 140px Segoe UI,Arial';ctx.fillStyle='#fff';ctx.fillText(score.toLocaleString(),W/2,spy+188);ctx.restore();
        if(comboBonus>0){ctx.save();ctx.textAlign='center';ctx.font='700 28px Segoe UI';ctx.fillStyle='rgba(255,255,200,0.9)';ctx.fillText(`🔥 +${comboBonus} ${lang==='tr'?'Kombo Bonusu':'Combo Bonus'}`,W/2,spy+216);ctx.restore();}

        // Stats
        const statsY=cy+1290;
        [{label:t('moves_label'),value:moves,color:'#e74c3c'},{label:t('time_label'),value:formatTime(time),color:'#3498db'},{label:t('rank_label'),value:rank?`#${rank}`:'-',color:rank===1?'#f1c40f':rank<=3?'#e67e22':'#27ae60'}].forEach((col,i)=>{
          const colX=cx+70+i*((cw-140)/3)+((cw-140)/3)/2;
          if(i>0){ctx.save();ctx.strokeStyle='rgba(180,140,80,0.35)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(cx+70+i*(cw-140)/3,statsY-20);ctx.lineTo(cx+70+i*(cw-140)/3,statsY+120);ctx.stroke();ctx.restore();}
          ctx.save();ctx.textAlign='center';ctx.font='700 28px Segoe UI';ctx.fillStyle='rgba(100,60,10,0.6)';ctx.fillText(col.label,colX,statsY);
          ctx.font='900 72px Segoe UI,Arial';ctx.fillStyle=col.color;ctx.fillText(String(col.value),colX,statsY+88);ctx.restore();
        });

        // Footer
        ctx.save();ctx.strokeStyle='rgba(180,140,80,0.3)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(cx+100,cy+ch-130);ctx.lineTo(cx+cw-100,cy+ch-130);ctx.stroke();
        ctx.textAlign='center';ctx.font='600 28px Segoe UI';ctx.fillStyle='rgba(100,60,10,0.5)';ctx.fillText(`✦  ${dateStr}  ✦`,W/2,cy+ch-90);
        ctx.font='700 26px Segoe UI';ctx.fillStyle='rgba(100,60,10,0.45)';ctx.fillText('mindsharp.co',W/2,cy+ch-50);ctx.restore();

        return canvas.toDataURL('image/png');
      };

      const handleShare = async () => {
        trackEvent('share_click',{mode,score,character:character.key});
        try {
          setSharing(true);
          const dataUrl = await buildCertificate();
          const res = await fetch(dataUrl);
          const blob = await res.blob();
          const file = new File([blob],'mindsharp-certificate.png',{type:'image/png'});
          if (navigator.share && navigator.canShare && navigator.canShare({files:[file]})) {
            await navigator.share({title:t('share_certificate_title'),text:t('share_certificate_text',{score:score}),files:[file]});
            trackEvent('share_completed',{method:'native',mode,score,character:character.key});
            return;
          }
          const a = document.createElement('a');
          a.href=dataUrl; a.download='mindsharp-certificate.png';
          document.body.appendChild(a); a.click(); a.remove();
          trackEvent('share_completed',{method:'download',mode,score,character:character.key});
        } catch(e) { console.warn(e); }
        finally { setSharing(false); }
      };
      const diffLabel = tDiff(GRID_CONFIGS[mode]?.difficulty || mode);

      return (
        <div style={{ position:'fixed', inset:0, zIndex:200, background:'rgba(0,0,0,0.72)',
          display:'flex', alignItems:'flex-start', justifyContent:'center', overflowY:'auto',
          padding:'12px 0 24px', WebkitOverflowScrolling:'touch', overscrollBehavior:'contain' }}>
          <style>{`
            @keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(380px) rotate(var(--rot));opacity:0}}
            @keyframes cardSlideUp{from{transform:translateY(40px) scale(0.94);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}
            @keyframes scorePop{0%{transform:scale(0.6);opacity:0}70%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
            @keyframes rankGlow{0%,100%{box-shadow:0 0 8px currentColor}50%{box-shadow:0 0 22px currentColor,0 0 40px rgba(241,196,15,0.4)}}
            @keyframes nameGlow{0%,100%{box-shadow:0 0 0 3px rgba(230,126,34,0.25)}50%{box-shadow:0 0 0 5px rgba(230,126,34,0.55),0 0 16px rgba(230,126,34,0.3)}}
            @keyframes nameShake{0%,100%{transform:translateX(0)}15%{transform:translateX(-8px)}35%{transform:translateX(8px)}55%{transform:translateX(-6px)}75%{transform:translateX(6px)}90%{transform:translateX(-3px)}}
            @keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
          `}</style>
          {confetti.map(p => (
            <div key={p.id} style={{ position:'fixed', left:`${p.left}%`, top:'-10px',
              color:p.color, fontSize:p.size, animation:`confettiFall ${p.duration}s ${p.delay}s ease-in forwards`,
              '--rot':`${p.rotate}deg`, pointerEvents:'none', zIndex:300, userSelect:'none' }}>{p.shape}</div>
          ))}
          <div style={{ position:'relative', width:'92%', maxWidth:360, margin:'auto 0',
            background:'linear-gradient(160deg,#fdf8ec 0%,#fef5da 50%,#f5e6c3 100%)',
            borderRadius:24, border:'3px solid #c8a96e',
            boxShadow:'0 0 0 6px rgba(200,169,110,0.2),0 24px 64px rgba(0,0,0,0.55)',
            animation:'cardSlideUp 0.45s cubic-bezier(.22,1.2,.36,1) both',
            overflow:'hidden', maxHeight:'calc(100vh - 32px)', overflowY:'auto' }}>
            <div style={{ height:5, background:'linear-gradient(90deg,#b8860b,#f0c040,#b8860b)' }}/>
            <button onClick={() => { if(requireName(onMenu)) return; onMenu(); }} style={{ position:'absolute', top:12, right:12, zIndex:10, width:30, height:30,
              background:'rgba(200,169,110,0.18)', border:'1.5px solid rgba(200,169,110,0.4)', borderRadius:'50%',
              color: needsName && !nameSaved ? '#ccc' : '#7a5c2e', fontSize:16, cursor: needsName && !nameSaved ? 'not-allowed' : 'pointer', display:'flex', alignItems:'center', justifyContent:'center',
              fontWeight:700, lineHeight:1 }}>✕</button>
            <div style={{ position:'absolute', inset:8, borderRadius:18, border:'1.5px solid rgba(200,169,110,0.35)', pointerEvents:'none', zIndex:1 }}/>
            {[{top:14,left:14},{top:14,right:14},{bottom:14,left:14},{bottom:14,right:14}].map((pos,i) => (
              <div key={i} style={{ position:'absolute', ...pos, color:'#c8a96e', fontSize:18, pointerEvents:'none', zIndex:2 }}>✦</div>
            ))}
            <div style={{ padding:'8px 12px 8px', position:'relative', zIndex:3 }}>
              {/* Header */}
              <div style={{ textAlign:'center', marginBottom:6 }}>
                <h2 style={{ margin:'0 0 4px', fontFamily:'Georgia,serif', fontSize:30, fontWeight:900,
                  background:'linear-gradient(135deg,#7a3e00 0%,#c8860a 50%,#7a3e00 100%)',
                  backgroundSize:'200% auto', WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent',
                  animation:'shimmer 3s linear infinite' }}>MindSharp</h2>
                <div style={{ display:'inline-block', background:'linear-gradient(90deg,#b8860b,#f0c040,#b8860b)',
                  borderRadius:20, padding:'2px 14px' }}>
                  <span style={{ fontSize:9, fontWeight:800, color:'#5a2d00', letterSpacing:2 }}>{lang==='tr' ? 'T E B R İ K L E R !' : 'C O N G R A T U L A T I O N S !'}</span>
                </div>
              </div>

              {/* Rank badge — only for top ranks */}
              {rank && rank<=3 && (
                <div style={{ textAlign:'center', marginBottom:6, background:rankInfo.bg,
                  border:`1.5px solid ${rankInfo.color}`, borderRadius:12, padding:'5px 12px',
                  animation:rank===1?'rankGlow 1.8s ease infinite':'none' }}>
                  <span style={{ color:rankInfo.color, fontWeight:900, fontSize:13 }}>{rankInfo.label}</span>
                </div>
              )}

              {/* Name */}
              <div style={{ textAlign:'center', marginBottom:10 }}>
                {needsName && !nameSaved ? (
                  <div style={{ marginTop:5, marginBottom:2 }}>
                    <div style={{
                      background:'rgba(255,248,220,0.9)', border: nameShake ? '1.5px solid #e74c3c' : '1.5px solid #f0c040',
                      borderRadius:12, padding:'10px 12px',
                      animation: nameShake ? 'nameShake 0.5s ease' : 'none',
                    }}>
                      <div style={{ fontSize:12, fontWeight:700, color:'#7a3e00', textAlign:'center', marginBottom:3 }}>
                        {lang==='tr' ? 'Skoru sıralamaya ekle' : 'Add your score to the leaderboard'}
                      </div>
                      <div style={{ fontSize:11, color:'#b8860b', textAlign:'center', marginBottom:8, fontWeight:600 }}>
                        {rank
                          ? t('name_rank_prompt').replace('{rank}', rank)
                          : t('name_rank_prompt_norank')}
                      </div>
                      <div style={{ display:'flex', gap:6 }}>
                        <input type="text" value={nameInput} onChange={e => setNameInput(e.target.value)}
                          onKeyDown={e => e.key==='Enter' && handleSaveName()}
                          onFocus={() => { window.scrollTo(0,0); document.body.style.overflow='hidden'; }}
                          onBlur={() => { document.body.style.overflow=''; }}
                          placeholder={t("name_placeholder")} maxLength={20}
                          style={{ flex:1, padding:'9px 12px', borderRadius:9,
                            border: nameShake ? '2px solid #e74c3c' : '2px solid #e67e22',
                            background:'rgba(255,255,255,0.95)', fontSize:16, fontWeight:700, color:'#3d1a00',
                            outline:'none', textAlign:'center', transform:'translateZ(0)',
                            boxShadow: nameShake ? '0 0 0 3px rgba(231,76,60,0.3)' : '0 0 0 3px rgba(230,126,34,0.2)' }}/>
                        <button onClick={handleSaveName} style={{ padding:'9px 14px', borderRadius:9, border:'none',
                          background: nameInput.trim() ? 'linear-gradient(135deg,#f39c12,#e67e22)' : 'rgba(200,169,110,0.4)',
                          color:'#fff', fontWeight:800, fontSize:16, cursor:'pointer', flexShrink:0,
                          boxShadow: nameInput.trim() ? '0 2px 8px rgba(230,126,34,0.4)' : 'none' }}>✓</button>
                      </div>
                      <div style={{ fontSize:10, color:'#c0392b', textAlign:'center', marginTop:6, fontWeight:600 }}>
                        {t('name_required_hint')}
                      </div>
                    </div>
                  </div>
                ) : (
                  <div style={{ color:'#3d1a00', fontWeight:900, fontSize:22, fontFamily:'Georgia,serif' }}>{displayName}</div>
                )}
                <div style={{ color:'rgba(120,80,20,0.5)', fontSize:10, marginTop:2 }}>{diffLabel} · {dateStr}</div>
              </div>

              {/* Character — centered */}
              <div style={{ textAlign:'center', marginBottom:4 }}>
                <img src={character.img} alt={charName}
                  style={{ width:100, height:100, borderRadius:12, objectFit:'cover',
                    border:'2px solid rgba(200,169,110,0.4)', boxShadow:'0 3px 12px rgba(0,0,0,0.2)' }} />
                <div>
                  <span style={{ display:'inline-block', marginTop:6, background:'rgba(80,50,20,0.12)',
                    border:'1.5px solid rgba(200,169,110,0.5)', borderRadius:20, padding:'4px 16px',
                    fontSize:13, fontWeight:900, color:character.labelBg||'#5a4030', letterSpacing:0.8 }}>
                    {charName}
                  </span>
                </div>
              </div>

              {/* Character quote */}
              <div style={{ textAlign:'center', fontSize:11, color:'rgba(100,60,10,0.6)', fontStyle:'italic',
                marginBottom:4 }}>
                "{charQuote}"
              </div>

              {/* Score block — centered */}
              <div style={{ background:character.bgGrad||'linear-gradient(135deg,#e67e22,#c0392b)',
                borderRadius:12, padding:'7px 12px 6px', textAlign:'center',
                marginBottom:6, boxShadow:'0 4px 14px rgba(200,80,20,0.4)',
                animation:'scorePop 0.5s 0.2s cubic-bezier(.22,1.2,.36,1) both' }}>
                <div style={{ color:'rgba(255,255,255,0.9)', fontSize:8, fontWeight:800, letterSpacing:2 }}>{t('score_label')}</div>
                <div style={{ color:'#fff', fontSize:40, fontWeight:900, lineHeight:1.1,
                  textShadow:'0 2px 12px rgba(0,0,0,0.4)' }}>
                  {score.toLocaleString()}
                </div>
                {comboBonus > 0 && (
                  <div style={{ color:'rgba(255,255,200,0.95)', fontSize:11, marginTop:2, fontWeight:700 }}>
                    🔥 +{comboBonus} {lang==='tr'?'Kombo':'Combo'}
                  </div>
                )}
              </div>

              {/* Stats */}
              <div style={{ display:'flex', background:'rgba(200,169,110,0.12)', borderRadius:12,
                padding:'7px 0', marginBottom:8, border:'1px solid rgba(200,169,110,0.25)' }}>
                {[
                  { label:t('moves_label'), value:moves, color:'#e74c3c' },
                  { label:t('time_label'),  value:formatTime(time), color:'#2980b9' },
                  { label:t('rank_label'),  value:rank?`#${rank}`:'-',
                    color:rank===1?'#f1c40f':rank<=3?'#e67e22':rank<=10?'#27ae60':'#7f8c8d' },
                ].map((s,i) => (
                  <React.Fragment key={s.label}>
                    {i>0 && <div style={{ width:1, background:'rgba(200,169,110,0.4)', margin:'0 4px' }}/>}
                    <div style={{ flex:1, textAlign:'center' }}>
                      <div style={{ fontSize:9, color:'rgba(100,60,10,0.55)', fontWeight:700, marginBottom:1 }}>{s.label}</div>
                      <div style={{ fontSize:18, fontWeight:900, color:s.color }}>{s.value}</div>
                    </div>
                  </React.Fragment>
                ))}
              </div>

              {/* Ad button */}
              {(adAvailable||adWatched) && (
                <button onClick={handleWatchAd} disabled={adWatched||adLoading}
                  style={{ width:'100%', padding:'10px 0', borderRadius:12, border:'none', marginBottom:7,
                    background: adWatched?'linear-gradient(135deg,#27ae60,#2ecc71)':adLoading?'rgba(155,89,182,0.5)':'linear-gradient(135deg,#8e44ad,#9b59b6)',
                    color:'#fff', fontWeight:900, fontSize:13, cursor:adWatched?'default':'pointer',
                    display:'flex', alignItems:'center', justifyContent:'center', gap:8 }}>
                  {adWatched ? t('ad_earned') : adLoading ? t('ad_loading') : t('ad_watch')}
                </button>
              )}

              {/* Buttons — hiyerarşik */}
              {(() => {
                const isGoodScore = score >= 1000 || (rank && rank <= 10);
                if (isGoodScore) {
                  return (
                    <div>

    function useSettings() {
      const load = (key,def) => {
        try { const v=localStorage.getItem('ms_'+key); return v===null?def:JSON.parse(v); } catch { return def; }
      };
      const [sfx,setSfxRaw]             = React.useState(() => load('sfx',true));
      const [music,setMusicRaw]         = React.useState(() => load('music',true));
      const save = (key,val) => { try { localStorage.setItem('ms_'+key,JSON.stringify(val)); } catch {} };
      const setSfx       = v => { setSfxRaw(v);       save('sfx',v); };
      const setMusic     = v => { setMusicRaw(v);     save('music',v); };
      return { sfx,setSfx,music,setMusic };
    }

                      <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>

                <LinkRow icon="✉️" label={t("contact_us")}        onClick={() => { setLegalType('contact'); trackEvent('legal_page_view',{page:'contact'}); }} />

      );
    }

    function App() {
      const [forceRender, setForceRender] = React.useState(0);
      const [screen, setScreen]     = useState('menu');
      const [showHint, setShowHint] = useState(false);
      const [demoFlippedIds, setDemoFlippedIds] = useState([]);
      const [mode, setMode]         = useState('8x4');
      const [showOnboarding, setShowOnboarding] = useState(false);
      const [showInstallBanner, setShowInstallBanner] = useState(true);
      const [scores, setScores]     = useState([]);
      const [rank, setRank]         = useState(null);
      const scoresRef               = useRef([]);
      useEffect(() => { scoresRef.current = scores; }, [scores]);
      const [tiles, setTiles]         = useState([]);
      const [flipped, setFlipped]     = useState([]);
      const [moves, setMoves]         = useState(0);
      const [matched, setMatched]     = useState(0);
      const [time, setTime]           = useState(0);
      const [running, setRunning]     = useState(false);
      const [won, setWon]             = useState(false);
      const [shake, setShake]         = useState(null);
      const [matchAnim, setMatchAnim] = useState([]);
      const [score, setScore]         = useState(0);
      const [comboBonus, setComboBonus] = useState(0);
      const [combo, setCombo]         = useState(0);
      const [sortBy, setSortBy]       = useState('score');
      const [scoreCategory, setScoreCategory] = useState('8x4');
      const [user, setUser]           = useState(() => { try { return localStorage.getItem('memotiles_user') || ''; } catch { return ''; } });
      const [tempUser, setTempUser]   = useState('');
      const [scoreDocId, setScoreDocId] = useState(null);
      const [dailyDocId, setDailyDocId] = useState(null);
      const [toast, setToast]         = useState(null);
      const [showExitConfirm, setShowExitConfirm] = useState(false);
      const [isDailyMode, setIsDailyMode]         = useState(false);
      const [dailyModeKey, setDailyModeKey]       = useState('8x4');
      const [showDailyModal, setShowDailyModal]   = useState(false);
      const [dailyResult, setDailyResult]         = useState(null);
      const [dailyStreak, setDailyStreak]         = useState(() => loadDailyStreak());
      const [dailyDoneMap, setDailyDoneMap] = useState(() => {
        const map = {};
        ['8x4','8x7'].forEach(m => { map[m] = getDailyDoneForMode(m); });
        return map;
      });
      const todayDoneForMode = (m) => !!dailyDoneMap[m];
      const [dailyRank, setDailyRank]             = useState(null);
      const [dailyTotal, setDailyTotal]           = useState(0);
      const [dailyPersonalBest, setDailyPersonalBest] = useState(null);
      const settings   = useSettings();
      const [showSettings, setShowSettings] = React.useState(false);
      const comboBonusRef = useRef(0);
      const comboRef      = useRef(0);
      const lockRef       = useRef(false);
      const isDailyRef    = useRef(false);
      const play          = useSound();

      const bgAudioCtxRef = useRef(null);
      const bgSourceRef   = useRef(null);
      const bgBufferRef   = useRef(null);
      const bgLoadedRef   = useRef(false);
      const bgPlayingRef  = useRef(false);
      const musicEnabledRef = useRef(settings.music);
      useEffect(() => { musicEnabledRef.current = settings.music; }, [settings.music]);
      const getAudioCtx = () => {
        if (!bgAudioCtxRef.current) bgAudioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
        return bgAudioCtxRef.current;
      };
      const startBgMusic = () => {
        if (bgPlayingRef.current) return;
        const ctx = getAudioCtx();
        if (ctx.state === 'suspended') ctx.resume();
        if (!bgBufferRef.current) return;
        const source = ctx.createBufferSource();
        source.buffer = bgBufferRef.current;
        source.loop = true;
        const gainNode = ctx.createGain();
        gainNode.gain.value = 0.18;
        source.connect(gainNode);
        gainNode.connect(ctx.destination);
        source.start(0);
        bgSourceRef.current = source;
        bgPlayingRef.current = true;
      };
      const stopBgMusic = () => {
        if (!bgPlayingRef.current) return;
        try { bgSourceRef.current && bgSourceRef.current.stop(); } catch(e) {}
        bgSourceRef.current = null;
        bgPlayingRef.current = false;
      };
      useEffect(() => {
        if (bgLoadedRef.current) return;
        bgLoadedRef.current = true;
        fetch('./music.mp3').then(r => r.arrayBuffer()).then(ab => {
          const ctx = getAudioCtx();
          return ctx.decodeAudioData(ab);
        }).then(buffer => {
          bgBufferRef.current = buffer;
          if (musicEnabledRef.current) {
            const ctx = getAudioCtx();
            if (ctx.state === 'suspended') {
              ctx.resume().then(() => { if (musicEnabledRef.current && !bgPlayingRef.current) startBgMusic(); });
            } else {
              startBgMusic();
            }
          }
        }).catch(() => {});
      }, []);
      useEffect(() => {
        if (!bgBufferRef.current) return;
        if (settings.music) startBgMusic(); else stopBgMusic();
      }, [settings.music]);
      useEffect(() => {
        const tryStart = () => {
          const ctx = bgAudioCtxRef.current;
          if (ctx && ctx.state==='suspended') {
            ctx.resume().then(() => {
              if (musicEnabledRef.current && !bgPlayingRef.current && bgBufferRef.current) startBgMusic();
            });
          } else if (ctx) {
            if (musicEnabledRef.current && !bgPlayingRef.current && bgBufferRef.current) startBgMusic();
          }
          document.removeEventListener('pointerdown', tryStart);
        };
        document.addEventListener('pointerdown', tryStart);
        return () => document.removeEventListener('pointerdown', tryStart);
      }, []);

      useEffect(() => {
        if (screen !== 'game') return;
        setShowHint(true);
        setDemoFlippedIds([]);
        const timers = [];
        // Demo animasyon: tiles hazır olana kadar bekle, sonra 2 taş aç/kapat
        timers.push(setTimeout(() => {
          setTiles(cur => {
            if (!cur || cur.length < 4) return cur;
            // Farklı sayıya sahip iki taş seç
            const id0 = cur[0].id;
            const id1 = cur.find(t => t.number !== cur[0].number)?.id ?? cur[2].id;
            // İlk taş açılır
            setDemoFlippedIds([id0]);
            timers.push(setTimeout(() => {
              // İkinci taş açılır
              setDemoFlippedIds([id0, id1]);
              // 900ms sonra oyundaki mismatch gibi ikisi aynı anda kapanır
              timers.push(setTimeout(() => {
                setDemoFlippedIds([]);
              }, 900));
            }, 700));
            return cur;
          });
        }, 600));
        const hideTimer = setTimeout(() => {
          setShowHint(false);
          setDemoFlippedIds([]);
        }, 5000);
        timers.push(hideTimer);
        return () => timers.forEach(t => clearTimeout(t));
      }, [screen]);

      useEffect(() => {
        if (!db) return;
        const unsub = db.collection('scores').orderBy('score','desc').limit(500)
          .onSnapshot(snap => {
            setScores(snap.docs.map(d => ({ id:d.id, ...d.data() })));
          }, err => console.log('Firestore read error:', err));
        return () => unsub();
      }, []);

      const boardRef = useRef(null);
      const [boardWidth, setBoardWidth] = useState(330);
      useEffect(() => {
        if (screen !== 'game') return;
        const el = boardRef.current;
        if (!el) return;
        const update = () => setBoardWidth(el.clientWidth || 330);
        update();
        let ro;
        try { ro = new ResizeObserver(update); ro.observe(el); }
        catch(e) { window.addEventListener('resize', update); }
        return () => { if (ro) ro.disconnect(); window.removeEventListener('resize', update); };
      }, [screen, mode]);

      useEffect(() => {
        if (!running) return;
        const id = setInterval(() => setTime(t => t+1), 1000);
        return () => clearInterval(id);
      }, [running]);

      // İlk ziyarette direkt Klasik oyunu başlat
      const autoplayDone = useRef(false);
      useEffect(() => {
        const hasPlayedBefore = (() => { try { return !!localStorage.getItem('ms_played_before'); } catch { return false; } })();
        if (hasPlayedBefore || autoplayDone.current) return;
        autoplayDone.current = true;
        const cfg = GRID_CONFIGS['8x4'];
        setTiles(generateTiles(cfg.pairs, cfg.maxNum));
        setFlipped([]); setMoves(0); setMatched(0); setTime(0);
        setRunning(false); setWon(false); lockRef.current = false;
        setMode('8x4'); setScore(0); setComboBonus(0); setCombo(0);
        setScoreDocId(null); comboBonusRef.current=0; comboRef.current=0;
        setIsDailyMode(false); isDailyRef.current=false;
        firstFlipTracked.current=false;
        setScreen('game');
        trackEvent('autoplay_start', {});
      }, []);

      const showToast = useCallback((msg) => {
        setToast(msg);
        setTimeout(() => setToast(null), 2400);
      }, []);

      const startDailyChallenge = useCallback((m) => {
        const gm = m || mode;
        setTiles(generateDailyTiles(gm));
        setFlipped([]); setMoves(0); setMatched(0); setTime(0);
        setRunning(false); setWon(false); lockRef.current = false;
        setMode(gm); setScreen('game');
        trackEvent('game_start',{mode:gm,type:'daily'});
        if (window.__setGameActive) window.__setGameActive(true, gm, 'daily');
        setScore(0); setComboBonus(0); setCombo(0); setScoreDocId(null);
        comboBonusRef.current=0; comboRef.current=0;
        setIsDailyMode(true); isDailyRef.current=true;
        setDailyModeKey(gm); firstFlipTracked.current=false;
      }, [mode]);

      const startGame = useCallback((m) => {
        const cfg = GRID_CONFIGS[m];
        setTiles(generateTiles(cfg.pairs, cfg.maxNum));
        setFlipped([]); setMoves(0); setMatched(0); setTime(0);
        setRunning(false); setWon(false); lockRef.current = false;
        setMode(m); setScreen('game');
        trackEvent('game_start',{mode:m,type:'regular'});
        if (window.__setGameActive) window.__setGameActive(true, m, 'regular');
        setScore(0); setComboBonus(0); setCombo(0); setScoreDocId(null);
        comboBonusRef.current=0; comboRef.current=0;
        setIsDailyMode(false); isDailyRef.current=false;
        firstFlipTracked.current=false;
      }, []);

      const firstFlipTracked = useRef(false);
      const handleTile = useCallback((id) => {
        if (lockRef.current) return;
        if (!running) {
          setRunning(true);
          if (!firstFlipTracked.current) {
            firstFlipTracked.current = true;
            trackEvent('game_first_flip',{mode,type:isDailyRef.current?'daily':'regular'});
          }
          // İlk dokunuşta müziği başlat (iOS gesture şartı)
          try {
            if (musicEnabledRef.current && !bgPlayingRef.current && bgBufferRef.current) {
              const ctx = getAudioCtx();
              if (ctx.state === 'suspended') {
                ctx.resume().then(() => { if (musicEnabledRef.current && !bgPlayingRef.current) startBgMusic(); });
              } else {
                startBgMusic();
              }
            }
          } catch(e) {}
        }
        if (settings.sfx) play('flip');
        setTiles(prev => prev.map(t => t.id===id ? {...t,flipped:true} : t));
        setFlipped(prev => {
          const next = [...prev, id];
          if (next.length === 2) {
            lockRef.current = true;
            setMoves(m => m+1);
            setTimeout(() => {
              setTiles(cur => {
                const [a,b] = next.map(fid => cur.find(t => t.id===fid));
                if (a && b && a.number===b.number && a.color===b.color) {
                  const newCombo = comboRef.current+1;
                  comboRef.current = newCombo;
                  setCombo(newCombo);
                  let bonusPts = 0;
                  if (newCombo>=3) { bonusPts=60; if(settings.sfx)play('combo3'); trackEvent('combo_achieved',{combo:newCombo,mode}); }
                  else if (newCombo===2) { bonusPts=25; if(settings.sfx)play('combo'); trackEvent('combo_achieved',{combo:2,mode}); }
                  else { if(settings.sfx)play('match'); }
                  
                  comboBonusRef.current += bonusPts;
                  setComboBonus(b => b+bonusPts);
                  setMatchAnim([a.id,b.id]);
                  setTimeout(() => setMatchAnim([]), 600);
                  const newTiles = cur.map(t => next.includes(t.id) ? {...t,matched:true,flipped:false} : t);
                  const newMatchedCount = newTiles.filter(t => t.matched).length/2;
                  setMatched(newMatchedCount);
                  const activeM = isDailyRef.current ? dailyModeKey : mode;
                  const cfgP = GRID_CONFIGS[activeM] || GRID_CONFIGS[mode];
                  const pct = Math.round((newMatchedCount/cfgP.pairs)*100);
                  if (pct===25||pct===50||pct===75) { trackEvent('game_progress',{percent:pct,mode:activeM,type:isDailyRef.current?'daily':'regular',elapsed_sec:time}); }
                  if (window.__updateGameProgress) window.__updateGameProgress(pct, newMatchedCount);
                  const activeMode = isDailyRef.current ? dailyModeKey : mode;
                  const cfg = GRID_CONFIGS[activeMode] || GRID_CONFIGS[mode];
                  if (newMatchedCount === cfg.pairs) {
                    setRunning(false);
                    if (settings.sfx) play('win');
                    const _type = isDailyRef.current ? 'daily' : 'regular';
                    const _modeKey = isDailyRef.current ? dailyModeKey : mode;
                    if (window.__setGameActive) window.__setGameActive(false);
                    if (!isDailyRef.current) {
                      // Son komboyu göster, sonra modal aç
                      const comboDelay = comboRef.current >= 2 ? 1800 : 0;
                      setTimeout(() => { try { localStorage.setItem("ms_played_before", "1"); } catch {} setWon(true); }, comboDelay);
                    }
                    setMoves((mv) => {
                      setTime((tm) => {
                        const finalScore = calcScore({pairs:cfg.pairs,moves:mv,time:tm,comboBonus:comboBonusRef.current});
                        try {
                          const p = {mode:_modeKey,score:finalScore,moves:mv,time:tm,combo_bonus:comboBonusRef.current,type:_type,session_time_sec:Math.round((Date.now()-_sessionStart)/1000)};
                          if (typeof gtag !== 'undefined') gtag('event','game_complete',p);
                        } catch(e) {}
                        setScore(finalScore);
                        const myEntry = {user:user||t('guest'),mode,moves:mv,time:tm,score:finalScore};
                        const sameMode = (scoresRef.current||[]).filter(s => s.mode===mode);
                        const merged = [...sameMode,myEntry].sort((a,b)=>(b.score||0)-(a.score||0));
                        const myRank = merged.findIndex(s => s.user===myEntry.user&&s.score===myEntry.score&&s.time===myEntry.time&&s.moves===myEntry.moves)+1;
                        setRank(myRank);
                        if (isDailyRef.current) {
                          const result = {moves:mv,time:tm,score:finalScore,gridMode:dailyModeKey};
                          try {
                            const p = {mode:_modeKey,score:finalScore,moves:mv,time:tm,combo_bonus:comboBonusRef.current,type:_type,session_time_sec:Math.round((Date.now()-_sessionStart)/1000)};
                            if (typeof gtag !== 'undefined') gtag('event','game_complete',p);
                          } catch(e) {}
                          try { localStorage.setItem("ms_played_before", "1"); } catch {}
                          saveDailyResult(result,dailyModeKey);
                          setDailyDoneMap(prev => ({...prev,[dailyModeKey]:true}));
                          const newStreak = updateStreak();
                          setDailyStreak(newStreak);
                          setDailyResult(result);
                          (async () => { const u = user || (await getOrCreateGuestId()); submitDailyScore({user:u,moves:mv,time:tm,score:finalScore,gridMode:dailyModeKey}).then(docId => { if(docId) setDailyDocId(docId); }); })();
                          (async () => {
                            try {
                              if (db) {
                                const dateKey = getDailyDateKey();
                                const snap = await db.collection('daily_scores')
                                  .where('dateKey','==',dateKey).where('gridMode','==',dailyModeKey).get();
                                const allScores = snap.docs.map(d => d.data().score||0).sort((a,b)=>b-a);
                                const total = allScores.length;
                                const rankPos = allScores.findIndex(s => s<=finalScore)+1||total;
                                setDailyRank(rankPos); setDailyTotal(total);
                                try {
                                  const stats = JSON.parse(localStorage.getItem('ms_stats')||'{}');
                                  const pb = stats.bestScores&&stats.bestScores[dailyModeKey];
                                  setDailyPersonalBest(pb||0);
                                } catch {}
                              }
                            } catch(e) {}
                            setTimeout(() => { setWon(false); setScreen('menu'); setShowDailyModal(true); }, 800);
                          })();
                        } else {
                          (async () => { const u = user || (await getOrCreateGuestId()); submitScoreToCloud({user:u,mode,moves:mv,time:tm,score:finalScore}).then(docId => { if(docId) setScoreDocId(docId); }); })();
                        }
                        recordGameStats({mode,moves:mv,time:tm,score:finalScore,comboBonus:comboBonusRef.current});
                        setTimeout(async () => {
                          if (!db) return;
                          try {
                            const snap = await db.collection("scores").where("mode","==",mode).orderBy("score","desc").get();
                            const scoresList = snap.docs.map(d => d.data());
                            const position = scoresList.findIndex(s => s.score===finalScore&&s.user===(user||t('guest')));
                            if (position>=0) setRank(position+1);
                          } catch(e) {}
                        }, 1200);
                        return tm;
                      });
                      return mv;
                    });
                  }
                  lockRef.current = false;
                  return newTiles;
                } else {
                  comboRef.current=0; setCombo(0);
                  if (settings.sfx) play('fail');
                  
                  setShake(next);
                  setTimeout(() => setShake(null), 400);
                  const reset = cur.map(t => next.includes(t.id) ? {...t,flipped:false} : t);
                  lockRef.current = false;
                  return reset;
                }
              });
              setFlipped([]);
            }, 900);
          }
          return next;
        });
      }, [running,mode,play,user,settings.sfx]);

      const cfg        = GRID_CONFIGS[mode];
      const totalPairs = cfg ? cfg.pairs : 0;
      const GAP        = (typeof window !== 'undefined' && window.innerWidth < 380) ? 6 : 5;
      const BOARD_PAD  = 8;
      const innerW     = Math.max(0, boardWidth - BOARD_PAD*2);
      const tileW      = Math.max(22, Math.floor((innerW - GAP*(cfg.cols-1)) / cfg.cols));

      // forceRender used to trigger re-render on lang change
      const _lang = forceRender && getLang();

      return (
        <div style={{ minHeight:'100vh', width:'100%', maxWidth:430, margin:'0 auto',
          backgroundImage:"url('/wood_bg.png')", backgroundSize:'cover', backgroundPosition:'center',
          backgroundRepeat:'no-repeat', backgroundColor:'#2b1a10',
          display:'flex', flexDirection:'column', alignItems:'center',
          fontFamily:"'Segoe UI',sans-serif", userSelect:'none', position:'relative', overflow:'hidden' }}>

          <button onClick={() => { const nv=!settings.music; settings.setMusic(nv); trackEvent('music_toggle_float',{value:nv}); }}
            style={{ position:'fixed', top:'calc(env(safe-area-inset-top,0px) + 12px)', right:12, zIndex:9999,
              width:32, height:32, borderRadius:'50%',
              background: settings.music ? 'rgba(255,180,0,0.3)' : 'rgba(0,0,0,0.5)',
              border: settings.music ? '1.5px solid rgba(255,210,0,0.8)' : '1.5px solid rgba(255,255,255,0.25)',
              color: settings.music ? '#ffe066' : 'rgba(255,255,255,0.55)',
              fontSize:15, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center',
              backdropFilter:'blur(4px)', transition:'all 0.2s ease',
              boxShadow: settings.music ? '0 0 10px rgba(255,180,0,0.4)' : 'none' }}>
            {settings.music ? '🎵' : '🔇'}
          </button>

          <style>{`
            .contentWrap { padding: calc(env(safe-area-inset-top, 0px) + 50px) 46px 40px; }
            @media (max-width: 420px) { .contentWrap { padding: calc(env(safe-area-inset-top, 0px) + 44px) 18px 32px; } }
            @keyframes popIn { from{transform:scale(0.5);opacity:0} to{transform:scale(1);opacity:1} }
            @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }
            @keyframes matchPop { 0%{transform:scale(1)} 50%{transform:scale(1.18)} 100%{transform:scale(1)} }
            @keyframes comboBanner { 0%{opacity:0} 10%{opacity:1} 80%{opacity:1} 100%{opacity:0} }
            @keyframes cardSlideUp { from{transform:translateY(40px) scale(0.94);opacity:0} to{transform:translateY(0) scale(1);opacity:1} }
            @keyframes fall { 0%{transform:translateY(0);opacity:1} 100%{transform:translateY(100vh);opacity:0} }
            .shake-tile { animation: shake 0.35s ease; }
            .match-tile { animation: matchPop 0.5s ease; }
          `}</style>

          <div style={{ position:'absolute', inset:0, zIndex:2, pointerEvents:'none',
            background:'radial-gradient(circle at 50% 30%,rgba(0,0,0,0.15),rgba(0,0,0,0.55))' }}/>

          <div className="contentWrap" style={{ position:'relative', zIndex:5, width:'100%', minHeight:'100vh',
            boxSizing:'border-box', display:'flex', flexDirection:'column', alignItems:'center' }}>

            {screen === 'menu' && (
              <div style={{ width:'100%', display:'flex', flexDirection:'column', alignItems:'center' }}>
                <div style={{ width:'100%', position:'relative', display:'flex', justifyContent:'center', alignItems:'center', marginBottom:6 }}>
                  <h1 style={{ margin:0, fontFamily:"'Georgia',serif", fontSize:44, fontWeight:900,
                    background:'linear-gradient(160deg,#fff9c4 0%,#ffe066 40%,#ffb300 70%,#ff8f00 100%)',
                    WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent',
                    filter:'drop-shadow(0 3px 6px rgba(0,0,0,0.8))', textAlign:'center' }}>MindSharp</h1>
                  <button onClick={() => { setShowSettings(true); trackEvent('settings_open',{}); }}
                    style={{ position:'absolute', right:0, background:'rgba(0,0,0,0.35)',
                      border:'1px solid rgba(255,255,255,0.2)', borderRadius:10, width:36, height:36,
                      display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', fontSize:18 }}>⚙️</button>
                </div>

                  const dateStr   = String(today.getDate()).padStart(2,'0')+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+today.getFullYear();
