<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>MindSharp</title>
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#2b1a10" />
  <style>
    html, body { height: 100%; margin: 0; padding: 0; background: #2b1a10; }
    body {
      font-family: "Segoe UI", system-ui, -apple-system, Arial, sans-serif;
      background: #2b1a10 url("./wood_bg.png") center / cover no-repeat fixed;
      overflow-x: hidden;
    }
    body::before {
      content: ""; position: fixed; inset: 0; pointer-events: none;
      background: radial-gradient(circle at 50% 25%, rgba(0,0,0,0.10), rgba(0,0,0,0.58));
      z-index: 0;
    }
    #root { position: relative; z-index: 1; min-height: 100vh; width: 100%; max-width: 430px; margin: 0 auto; }
    
    /* Üst Aksiyon Butonları */
    .ms-top-actions {
      position: absolute; top: 15px; right: 15px; z-index: 100;
      display: flex; gap: 10px; align-items: center;
    }
    .ms-lang-pill {
      background: rgba(0,0,0,0.5); color: #ffe082; padding: 5px 12px;
      border-radius: 20px; font-size: 12px; font-weight: 800;
      border: 1px solid rgba(255,255,255,0.2); cursor: pointer;
    }
    .ms-gear-btn {
      background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2);
      color: #ffe082; width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justifyContent: center; cursor: pointer;
    }
    .ms-menu-footer { color: rgba(255,255,255,0.4); font-size: 10px; margin-top: 20px; text-align: center; }
  </style>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    // === Firebase Yapılandırması ===
    const firebaseConfig = {
      apiKey: "AIzaSyBqtoU6DrecyhCvjYoWOtOcCyadNMDu5dY",
      authDomain: "mindsharp-af404.firebaseapp.com",
      projectId: "mindsharp-af404",
      storageBucket: "mindsharp-af404.firebasestorage.app",
      messagingSenderId: "520056575924",
      appId: "1:520056575924:web:4aff3dbee97a38650cc4e1"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const { useState, useEffect, useCallback, useRef } = React;

    const TILE_COLORS = ['#E8000A', '#29B6F6', '#F9A825', '#212121'];
    const GRID_CONFIGS = {
      '8x4':  { rows: 4, cols: 8,  pairs: 16, maxNum: 4,  label: '32 Tiles', difficulty: 'Easy' },
      '8x5':  { rows: 5, cols: 8,  pairs: 20, maxNum: 5,  label: '40 Tiles', difficulty: 'Medium' },
      '8x7':  { rows: 7, cols: 8,  pairs: 28, maxNum: 7,  label: '56 Tiles', difficulty: 'Hard' },
      '10x8': { rows: 8, cols: 10, pairs: 40, maxNum: 10, label: '80 Tiles', difficulty: 'Expert' },
    };

    // === Yardımcı Fonksiyonlar ===
    function formatTime(s) { const m = Math.floor(s/60); return `${m}:${String(s%60).padStart(2,'0')}`; }
    function formatDate(ts) {
      if (!ts) return "-";
      const d = ts.toDate ? ts.toDate() : new Date(ts);
      return `${d.getDate()}-${d.getMonth()+1}-${String(d.getFullYear()).slice(-2)}`;
    }

    // === WinModal Bileşeni ===
    function WinModal({ moves, time, mode, score, comboBonus, user, onReplay, onMenu, onScores }) {
      const [sharing, setSharing] = useState(false);

      const buildCertificate = async () => {
        const canvas = document.createElement("canvas");
        canvas.width = 1080; canvas.height = 1920;
        const ctx = canvas.getContext("2d");
        
        // Arka Plan
        ctx.fillStyle = "#2b1a10";
        ctx.fillRect(0,0,1080,1920);
        
        // Sertifika Kartı
        ctx.fillStyle = "#fdf6e3";
        ctx.roundRect ? ctx.roundRect(90, 420, 900, 980, 40) : ctx.fillRect(90, 420, 900, 980);
        ctx.fill();

        ctx.fillStyle = "#7a3e00";
        ctx.font = "bold 80px Georgia";
        ctx.textAlign = "center";
        ctx.fillText("MindSharp", 540, 580);
        
        ctx.font = "40px Arial";
        ctx.fillText("Achievement Certificate", 540, 650);
        
        ctx.font = "bold 60px Arial";
        ctx.fillText(user || "Guest", 540, 800);
        
        ctx.font = "bold 120px Arial";
        ctx.fillStyle = "#e67e22";
        ctx.fillText(score.toLocaleString(), 540, 1100);
        
        return canvas.toDataURL("image/png");
      };

      const handleShare = async () => {
        setSharing(true);
        try {
          const img = await buildCertificate();
          const res = await fetch(img);
          const blob = await res.blob();
          const file = new File([blob], 'mindsharp-win.png', { type: 'image/png' });
          if (navigator.share) {
            await navigator.share({ files: [file], title: 'MindSharp Score' });
          } else {
            const a = document.createElement("a"); a.href = img; a.download = "score.png"; a.click();
          }
        } catch (e) { console.error(e); }
        setSharing(false);
      };

      return (
        <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.8)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 1000 }}>
          <div style={{ background: '#fdf6e3', padding: 30, borderRadius: 20, textAlign: 'center', width: '85%', maxWidth: 350 }}>
            <h2 style={{ color: '#7a3e00' }}>Bravo!</h2>
            <div style={{ fontSize: 40, fontWeight: 900, color: '#e67e22', marginBottom: 10 }}>{score}</div>
            <p>Moves: {moves} | Time: {formatTime(time)}</p>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
              <button onClick={handleShare} style={{ padding: 12, borderRadius: 10, border: 'none', background: '#e67e22', color: '#fff', fontWeight: 'bold' }}>
                {sharing ? "Wait..." : "📤 Share Certificate"}
              </button>
              <button onClick={onReplay} style={{ padding: 12, borderRadius: 10, border: 'none', background: '#27ae60', color: '#fff', fontWeight: 'bold' }}>Play Again</button>
              <button onClick={onMenu} style={{ padding: 12, borderRadius: 10, border: '1px solid #ccc', background: 'none' }}>Main Menu</button>
            </div>
          </div>
        </div>
      );
    }

    // === Ana App Bileşeni ===
    function App() {
      const [screen, setScreen] = useState('menu');
      const [mode, setMode] = useState('8x4');
      const [tiles, setTiles] = useState([]);
      const [flipped, setFlipped] = useState([]);
      const [matchedCount, setMatchedCount] = useState(0);
      const [moves, setMoves] = useState(0);
      const [time, setTime] = useState(0);
      const [running, setRunning] = useState(false);
      const [score, setScore] = useState(0);
      const [user, setUser] = useState(localStorage.getItem('ms_user') || '');
      const [won, setWon] = useState(false);

      // Oyun Başlatma
      const start = (m) => {
        const cfg = GRID_CONFIGS[m];
        let t = [];
        // Taşları üret (Basitleştirilmiş)
        for(let i=0; i<cfg.pairs; i++) {
          const pair = { num: (i % cfg.maxNum) + 1, color: TILE_COLORS[i % 4] };
          t.push({...pair, id: i*2}, {...pair, id: i*2+1});
        }
        setTiles(t.sort(() => Math.random() - 0.5).map(x => ({...x, flipped: false, matched: false})));
        setMode(m); setMoves(0); setMatchedCount(0); setTime(0); setWon(false); setScreen('game'); setRunning(true);
      };

      // Timer
      useEffect(() => {
        let id;
        if (running) id = setInterval(() => setTime(t => t + 1), 1000);
        return () => clearInterval(id);
      }, [running]);

      // Taş Tıklama
      const handleTile = (id) => {
        if (flipped.length === 2 || tiles.find(t => t.id === id).flipped) return;
        
        const newTiles = tiles.map(t => t.id === id ? {...t, flipped: true} : t);
        setTiles(newTiles);
        const nextFlipped = [...flipped, id];
        setFlipped(nextFlipped);

        if (nextFlipped.length === 2) {
          setMoves(m => m + 1);
          const [t1, t2] = nextFlipped.map(fid => newTiles.find(x => x.id === fid));
          if (t1.num === t2.num && t1.color === t2.color) {
            setTiles(prev => prev.map(t => nextFlipped.includes(t.id) ? {...t, matched: true, flipped: false} : t));
            setMatchedCount(c => {
              if (c + 1 === GRID_CONFIGS[mode].pairs) {
                setRunning(false);
                const finalScore = (GRID_CONFIGS[mode].pairs * 100) - (moves * 5) - time;
                setScore(finalScore > 0 ? finalScore : 10);
                setWon(true);
                // Firebase'e yaz
                db.collection("scores").add({ user: user || "Guest", score: finalScore, mode, time, createdAt: new Date() });
              }
              return c + 1;
            });
            setFlipped([]);
          } else {
            setTimeout(() => {
              setTiles(prev => prev.map(t => nextFlipped.includes(t.id) ? {...t, flipped: false} : t));
              setFlipped([]);
            }, 800);
          }
        }
      };

      return (
        <div style={{ padding: '20px', color: '#fff' }}>
          {screen === 'menu' && (
            <div style={{ textAlign: 'center', paddingTop: '100px' }}>
              <h1 style={{ fontSize: '48px', color: '#ffe082' }}>MindSharp</h1>
              {!user ? (
                <input 
                  placeholder="Username" 
                  style={{ padding: 12, borderRadius: 10, width: '80%', marginBottom: 20 }}
                  onKeyDown={e => { if(e.key==='Enter') { setUser(e.target.value); localStorage.setItem('ms_user', e.target.value); }}}
                />
              ) : (
                <div>
                  <p>Welcome, {user}</p>
                  {Object.keys(GRID_CONFIGS).map(k => (
                    <button key={k} onClick={() => start(k)} style={{ width: '100%', padding: 15, marginBottom: 10, borderRadius: 10, background: '#e67e22', color: '#fff', border: 'none', fontWeight: 'bold' }}>
                      {GRID_CONFIGS[k].label} ({GRID_CONFIGS[k].difficulty})
                    </button>
                  ))}
                </div>
              )}
            </div>
          )}

          {screen === 'game' && (
            <div>
              <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 20 }}>
                <span>Moves: {moves}</span>
                <span>Time: {formatTime(time)}</span>
              </div>
              <div style={{ 
                display: 'grid', 
                gridTemplateColumns: `repeat(${GRID_CONFIGS[mode].cols}, 1fr)`, 
                gap: '5px' 
              }}>
                {tiles.map(t => (
                  <div key={t.id} onClick={() => handleTile(t.id)} style={{
                    aspectRatio: '1/1.4', background: t.matched ? 'transparent' : (t.flipped ? '#fff' : '#c8b98a'),
                    borderRadius: '5px', display: 'flex', alignItems: 'center', justifyContent: 'center',
                    fontSize: '20px', color: t.color, fontWeight: 'bold', border: '1px solid #999'
                  }}>
                    {(t.flipped || t.matched) ? t.num : ''}
                  </div>
                ))}
              </div>
            </div>
          )}

          {won && <WinModal moves={moves} time={time} mode={mode} score={score} user={user} onReplay={() => start(mode)} onMenu={() => setScreen('menu')} />}
          <div className="ms-menu-footer">© 2026 MindSharp. All rights reserved.</div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
