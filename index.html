  <script>
    window.MindSharpAds = {
      _initialized: false,
      _rewardedReady: false,
      AD_UNIT_ID: 'ca-app-pub-9758848686103243/3344380722',
      async init() {
        try {
          if (!window.Capacitor || !window.Capacitor.isNativePlatform()) return;
          const { AdMob } = window.CapacitorAdMob || {};
          if (!AdMob) return;
          await AdMob.initialize({ testingDevices: [], initializeForTesting: false });
          this._initialized = true;
          this.loadRewarded();
        } catch(e) {}
      },
      async loadRewarded() {
        try {
          if (!this._initialized) return;
          const { AdMob } = window.CapacitorAdMob || {};
          if (!AdMob) return;
          await AdMob.prepareRewardVideoAd({ adId: this.AD_UNIT_ID, isTesting: false });
          this._rewardedReady = true;
        } catch(e) { this._rewardedReady = false; }
      },
      isReady() { return this._initialized && this._rewardedReady; },
      async showRewarded(onReward) {
        try {
          if (!this.isReady()) { onReward && onReward(false); return; }
          const { AdMob } = window.CapacitorAdMob || {};
          if (!AdMob) { onReward && onReward(false); return; }
          const result = await AdMob.showRewardVideoAd();
          this._rewardedReady = false;
          this.loadRewarded();
          if (result && result.type === 'Rewarded') { onReward && onReward(true); }
          else { onReward && onReward(false); }
        } catch(e) { onReward && onReward(false); }
      }
    };
    document.addEventListener('deviceready', () => window.MindSharpAds.init(), false);
    window.addEventListener('load', () => { setTimeout(() => window.MindSharpAds.init(), 800); });
  </script>

    function trackEvent(name, params) {
      try {
        const p = { ...params, session_time_sec: Math.round((Date.now() - _sessionStart) / 1000) };
        if (typeof gtag !== 'undefined') gtag('event', name, p);
      } catch(e) {}

      window.__setGameActive = function(active, mode, type) { _gameActive = active; _gameMode = mode; _gameType = type||'regular'; };
      window.__updateGameProgress = function(pct, moves) { _gameProgress = pct; _gameMoves = moves; };
      function fireAbandoned() {
        if (!_gameActive) return;
        trackEvent('game_abandoned', {mode: _gameMode, progress_pct: _gameProgress, moves: _gameMoves, type: _gameType});
        _gameActive = false;

      window.addEventListener('beforeunload', function() { fireAbandoned(); });

    function loadStats() {
      try {
        const s = localStorage.getItem('ms_stats');
        return s ? JSON.parse(s) : { totalGames:0, totalWins:0, bestScores:{}, bestMoves:{}, bestTime:{}, totalMoves:0, totalTime:0, maxCombo:0, streak:[] };
      } catch { return { totalGames:0, totalWins:0, bestScores:{}, bestMoves:{}, bestTime:{}, totalMoves:0, totalTime:0, maxCombo:0, streak:[] }; }
    }
    function saveStats(stats) { try { localStorage.setItem('ms_stats', JSON.stringify(stats)); } catch {} }
    function recordGameStats({ mode, moves, time, score, comboBonus }) {
      const stats = loadStats();
      stats.totalGames = (stats.totalGames || 0) + 1;
      stats.totalWins  = (stats.totalWins  || 0) + 1;
      if (!stats.bestScores[mode] || score > stats.bestScores[mode]) stats.bestScores[mode] = score;
      if (!stats.bestMoves[mode]  || moves < stats.bestMoves[mode])  stats.bestMoves[mode]  = moves;
      if (!stats.bestTime[mode]   || time  < stats.bestTime[mode])   stats.bestTime[mode]   = time;
      stats.totalMoves = (stats.totalMoves || 0) + moves;
      stats.totalTime  = (stats.totalTime  || 0) + time;
      if (comboBonus > (stats.maxCombo || 0)) stats.maxCombo = comboBonus;
      stats.totalScore = (stats.totalScore || 0) + score;
      const today = new Date().toISOString().slice(0, 10);
      if (!stats.streak) stats.streak = [];
      if (!stats.streak.includes(today)) stats.streak.push(today);
      saveStats(stats);
      return stats;
    }
    function getStreakCount(streak) {
      if (!streak || streak.length === 0) return 0;
      const sorted = [...streak].sort().reverse();
      let count = 0;
      let cur = new Date();
      cur.setHours(0,0,0,0);
      for (const d of sorted) {
        const dd = new Date(d);
        dd.setHours(0,0,0,0);
        const diff = Math.round((cur - dd) / 86400000);
        if (diff === 0 || diff === count) { count++; cur = dd; }
        else break;
      }
      return count;
    }

    const TILE_COLORS = ['#E8000A', '#29B6F6', '#F9A825', '#212121'];
    const GRID_CONFIGS = {
      '8x4': { rows:4, cols:8, pairs:16, maxNum:4, difficulty:'Classic', tileCount:32 },
      '8x7': { rows:7, cols:8, pairs:28, maxNum:7, difficulty:'Hard',    tileCount:56 },
    };
    const PREVIEW_TILES = [
      { color:'#E8000A', number:1, rot:-8,  y: 4 },
      { color:'#29B6F6', number:4, rot: 4,  y:-6 },
      { color:'#F9A825', number:7, rot:-5,  y: 8 },
      { color:'#212121', number:9, rot: 7,  y:-3 },
    ];

    function generateTiles(pairs, maxNum) {
      const colorCount = TILE_COLORS.length;
      const uniquePairs = [];
      for (let n = 1; n <= maxNum; n++) {
        for (let c = 0; c < colorCount; c++) uniquePairs.push({ number:n, color:TILE_COLORS[c] });
      }
      for (let i = uniquePairs.length-1; i > 0; i--) {
        const j = Math.floor(Math.random()*(i+1));
        [uniquePairs[i],uniquePairs[j]] = [uniquePairs[j],uniquePairs[i]];
      }
      const selected = uniquePairs.slice(0,pairs);
      const allTiles = [...selected,...selected].map((p,idx) => ({ id:idx, number:p.number, color:p.color, flipped:false, matched:false }));
      for (let i = allTiles.length-1; i > 0; i--) {
        const j = Math.floor(Math.random()*(i+1));
        [allTiles[i],allTiles[j]] = [allTiles[j],allTiles[i]];
      }
      return allTiles;
    }

    function calcScore({ pairs, moves, time, comboBonus }) {
      const baseScore = pairs * 100;
      const movePenalty = Math.max(0,(moves-pairs)*8);
      const timePenalty = Math.floor(time*1.5);
      return Math.max(0, baseScore - movePenalty - timePenalty + comboBonus);
    }

    function mulberry32(seed) {
      return function() {
        seed |= 0; seed = seed + 0x6D2B79F5 | 0;
        let t = Math.imul(seed ^ seed >>> 15, 1|seed);
        t = t + Math.imul(t ^ t >>> 7, 61|t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
      };
    }
    function getDailyDateKey() {
      const d = new Date();
      return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
    }
    function getDailySeed() {
      const key = getDailyDateKey();
      let hash = 0;
      for (let i = 0; i < key.length; i++) hash = Math.imul(31,hash) + key.charCodeAt(i) | 0;
      return Math.abs(hash);
    }
    function generateDailyTiles(gridMode) {
      const m = gridMode || '8x4';
      const cfg = GRID_CONFIGS[m];
      const sharedKey = getDailyDateKey() + m;
      let sharedHash = 0;
      for (let i = 0; i < sharedKey.length; i++) sharedHash = Math.imul(31,sharedHash) + sharedKey.charCodeAt(i) | 0;
      const sharedRng = mulberry32(Math.abs(sharedHash));
      const colorCount = TILE_COLORS.length;
      const uniquePairs = [];
      for (let n = 1; n <= cfg.maxNum; n++) {
        for (let c = 0; c < colorCount; c++) uniquePairs.push({ number:n, color:TILE_COLORS[c] });
      }
      for (let i = uniquePairs.length-1; i > 0; i--) {
        const j = Math.floor(sharedRng()*(i+1));
        [uniquePairs[i],uniquePairs[j]] = [uniquePairs[j],uniquePairs[i]];
      }
      const selected = uniquePairs.slice(0,cfg.pairs);
      const uid = (() => {
        try {
          let id = localStorage.getItem('ms_uid');
          if (!id) { id = Math.random().toString(36).slice(2)+Date.now().toString(36); localStorage.setItem('ms_uid',id); }
          return id;
        } catch { return 'anon'; }
      })();
      const personalKey = getDailyDateKey()+m+uid;
      let personalHash = 0;
      for (let i = 0; i < personalKey.length; i++) personalHash = Math.imul(31,personalHash) + personalKey.charCodeAt(i) | 0;
      const personalRng = mulberry32(Math.abs(personalHash));
      const allTiles = [...selected,...selected].map((p,idx) => ({ id:idx, number:p.number, color:p.color, flipped:false, matched:false }));
      for (let i = allTiles.length-1; i > 0; i--) {
        const j = Math.floor(personalRng()*(i+1));
        [allTiles[i],allTiles[j]] = [allTiles[j],allTiles[i]];
      }
      return allTiles;
    }

    function loadDailyStreak() {
      try { const raw = localStorage.getItem('ms_daily_streak'); return raw ? JSON.parse(raw) : { count:0, lastDate:null }; }
      catch { return { count:0, lastDate:null }; }
    }
    function saveDailyStreak(streak) { try { localStorage.setItem('ms_daily_streak', JSON.stringify(streak)); } catch {} }
    function updateStreak() {
      const today = getDailyDateKey();
      const streak = loadDailyStreak();
      if (streak.lastDate === today) return streak;
      const yesterday = (() => {
        const d = new Date(); d.setDate(d.getDate()-1);
        return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
      })();
      const newCount = streak.lastDate === yesterday ? streak.count+1 : 1;
      const newStreak = { count:newCount, lastDate:today };
      saveDailyStreak(newStreak);
      return newStreak;
    }
    function hasDoneToday() { return loadDailyStreak().lastDate === getDailyDateKey(); }

    function useSound() {
      const ctx = useRef(null);
      const getCtx = () => {
        if (!ctx.current) { try { ctx.current = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {} }
        return ctx.current;
      };
      const play = (type) => {
        const ac = getCtx(); if (!ac) return;
        if (type === 'win') {
          [523,659,784,1047].forEach((f,i) => {
            const o2=ac.createOscillator(); const g2=ac.createGain();
            o2.connect(g2); g2.connect(ac.destination); o2.frequency.value=f;
            g2.gain.setValueAtTime(0.12,ac.currentTime+i*0.12);
            g2.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+i*0.12+0.3);
            o2.start(ac.currentTime+i*0.12); o2.stop(ac.currentTime+i*0.12+0.3);
          }); return;
        }
        if (type === 'combo3') {
          [523,659,784,880,1047].forEach((f,i) => {
            const o2=ac.createOscillator(); const g2=ac.createGain();
            o2.connect(g2); g2.connect(ac.destination); o2.type='sine'; o2.frequency.value=f;
            g2.gain.setValueAtTime(0.18,ac.currentTime+i*0.07);
            g2.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+i*0.07+0.25);
            o2.start(ac.currentTime+i*0.07); o2.stop(ac.currentTime+i*0.07+0.25);
          }); return;
        }
        if (type === 'combo') {
          [660,880].forEach((f,i) => {
            const o2=ac.createOscillator(); const g2=ac.createGain();
            o2.connect(g2); g2.connect(ac.destination); o2.type='sine'; o2.frequency.value=f;
            g2.gain.setValueAtTime(0.14,ac.currentTime+i*0.1);
            g2.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+i*0.1+0.25);
            o2.start(ac.currentTime+i*0.1); o2.stop(ac.currentTime+i*0.1+0.25);
          }); return;
        }
        const o = ac.createOscillator(); const g = ac.createGain();
        o.connect(g); g.connect(ac.destination);
        if (type==='flip')  { o.frequency.value=440; g.gain.setValueAtTime(0.1,ac.currentTime); g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.1); }
        else if (type==='match') { o.frequency.value=660; o.frequency.setValueAtTime(880,ac.currentTime+0.1); g.gain.setValueAtTime(0.15,ac.currentTime); g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.3); }
        else if (type==='fail')  { o.frequency.value=220; g.gain.setValueAtTime(0.08,ac.currentTime); g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.2); }
        o.start(); o.stop(ac.currentTime+0.3);
      };
      return play;
    }

    // Ardışık Guest ID — session boyunca sabit, localStorage'da tutulur
    async function getOrCreateGuestId() {
      try {
        const stored = localStorage.getItem('memotiles_user');
        if (stored) return stored; // Kullanıcı zaten isim seçmiş veya Guest ID var
        // Firestore'dan atomic increment ile unique numara al
        const counterRef = db.collection('counters').doc('guestId');
        let guestNum = 1;
        await db.runTransaction(async (tx) => {
          const doc = await tx.get(counterRef);
          if (doc.exists) {
            guestNum = (doc.data().next || 1);
            tx.update(counterRef, { next: guestNum + 1 });
          } else {
            tx.set(counterRef, { next: 2 });
          }
        });
        const guestName = `Guest${guestNum}`;
        try { localStorage.setItem('memotiles_user', guestName); } catch {}
        return guestName;
      } catch(e) {
        return 'Guest';
      }
    }

    function ScoreBoard({ scores, sortBy, onSortChange, activeCategory, onCategoryChange, onClearCategory }) {
      const [confirmClear, setConfirmClear] = React.useState(false);
      const categories = Object.entries(GRID_CONFIGS).map(([key,val]) => ({ key, label:tDiff(val.difficulty) }));
      const filtered = scores.filter(s => s.mode === activeCategory);
      const sortedScores = [...filtered].sort((a,b) => {
        if (sortBy==='score') return b.score-a.score;
        if (sortBy==='time')  return a.time-b.time;
        if (sortBy==='moves') return a.moves-b.moves;
        if (sortBy==='date') {
          const ta = a.createdAt ? (a.createdAt.toDate ? a.createdAt.toDate().getTime() : new Date(a.createdAt).getTime()) : 0;
          const tb = b.createdAt ? (b.createdAt.toDate ? b.createdAt.toDate().getTime() : new Date(b.createdAt).getTime()) : 0;
          return tb - ta;
        }
        return 0;
      });
      const tabStyle = (key) => ({
        flex:1, padding:'7px 2px', border:'none', borderRadius:8, cursor:'pointer', fontSize:11, fontWeight:700,
        background: activeCategory===key ? 'linear-gradient(135deg,#f39c12,#e67e22)' : 'rgba(255,255,255,0.08)',
        color: activeCategory===key ? '#fff' : '#ffe082',
        boxShadow: activeCategory===key ? '0 2px 8px rgba(243,156,18,0.4)' : 'none',
        transition:'all 0.2s',
      });
      const sortBtnStyle = (key) => ({
        background:'none', border:'none', color:sortBy===key?'#fff':'#ffe082',
        cursor:'pointer', fontSize:11, fontWeight:sortBy===key?900:600,
        textDecoration:sortBy===key?'underline':'none', padding:'0 4px',
      });
      return (
        <div style={{ width:'100%' }}>
          <div style={{ display:'flex', gap:4, marginBottom:10 }}>
            {categories.map(cat => (
              <button key={cat.key} style={tabStyle(cat.key)} onClick={() => onCategoryChange(cat.key)}>{cat.label}</button>
            ))}
          </div>
          <div style={{ display:'flex', justifyContent:'flex-end', gap:2, marginBottom:6, paddingRight:4 }}>
            <span style={{ color:'#ffe082', fontSize:11, alignSelf:'center', marginRight:4 }}>{t("sort_label")}</span>
            <button style={sortBtnStyle('score')} onClick={() => onSortChange('score')}>{t("sort_score")}</button>
            <button style={sortBtnStyle('moves')} onClick={() => onSortChange('moves')}>{t("sort_moves")}</button>
            <button style={sortBtnStyle('time')}  onClick={() => onSortChange('time')}>{t("sort_time")}</button>
            <button style={sortBtnStyle('date')}  onClick={() => onSortChange('date')}>{t("sort_date")}</button>
          </div>
          {sortedScores.length === 0
            ? <p style={{ color:'#ffe082', textAlign:'center', fontSize:13, margin:'16px 0' }}>{t("no_games_category")}</p>
            : (
              <div style={{ maxHeight:396, overflowY:'auto' }}>

                  <div key={i} style={{ display:'flex', alignItems:'center', padding:'6px 8px', marginBottom:4, gap:4,
                    background: i===0 ? 'rgba(241,196,15,0.25)' : 'rgba(255,255,255,0.1)',
                    borderRadius:8, fontSize:11,
                    border: i===0 ? '1px solid rgba(255,200,0,0.4)' : '1px solid rgba(255,255,255,0.05)' }}>

                    <span style={{ color:'#fff', fontWeight:600, flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{s.user || t('guest')}</span>
                    <span style={{ color:'#ffe082', fontWeight:800, minWidth:44, textAlign:'right', flexShrink:0 }}>{s.score ? s.score.toLocaleString() : '-'}</span>
                    <span style={{ color:'#ffe082', minWidth:36, textAlign:'right', flexShrink:0 }}>{s.moves}mv</span>

    function HallOfFame({ scores }) {
      const [hofCategory, setHofCategory] = React.useState('8x4');
      const categories = Object.entries(GRID_CONFIGS).map(([key,val]) => ({ key, label:tDiff(val.difficulty) }));
      // Her oyuncu için en yüksek skoru hesapla (client-side)
      const filtered = scores.filter(s => s.mode === hofCategory);
      const bestByUser = {};
      filtered.forEach(s => {
        const name = s.user || 'Guest';
        if (!bestByUser[name] || s.score > bestByUser[name].score) {
          bestByUser[name] = s;
        }
      });
      const hofList = Object.values(bestByUser)
        .sort((a,b) => b.score - a.score)
        .slice(0, 50);

      const tabStyle = (key) => ({
        flex:1, padding:'7px 2px', border:'none', borderRadius:8, cursor:'pointer', fontSize:11, fontWeight:700,
        background: hofCategory===key ? 'linear-gradient(135deg,#f1c40f,#e67e22)' : 'rgba(255,255,255,0.08)',
        color: hofCategory===key ? '#fff' : '#ffe082',
        boxShadow: hofCategory===key ? '0 2px 8px rgba(241,196,15,0.4)' : 'none',
        transition:'all 0.2s',
      });

      const medalColor = (i) => i===0 ? '#FFD700' : i===1 ? '#C0C0C0' : i===2 ? '#CD7F32' : '#fff';
      const medalLabel = (i) => i===0 ? '🥇' : i===1 ? '🥈' : i===2 ? '🥉' : `#${i+1}`;

      return (
        <div style={{ width:'100%' }}>
          <div>
            <div style={{ display:'flex', gap:4, marginBottom:10 }}>
              {categories.map(cat => (
                <button key={cat.key} style={tabStyle(cat.key)} onClick={() => setHofCategory(cat.key)}>{cat.label}</button>
              ))}
            </div>
            {hofList.length === 0

                      borderRadius:8, fontSize:11,
                      border: i<3 ? `1px solid ${medalColor(i)}44` : '1px solid rgba(255,255,255,0.05)'
                    }}>
                      <span style={{ fontWeight:700, color:medalColor(i), minWidth:36, flexShrink:0, fontSize:i<3?13:11 }}>{medalLabel(i)}</span>
                      <span style={{ color:'#fff', fontWeight:600, flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{s.user || 'Guest'}</span>
                      <span style={{ color:'#ffe082', fontWeight:800, minWidth:44, textAlign:'right', flexShrink:0 }}>{s.score ? s.score.toLocaleString() : '-'}</span>
                      <span style={{ color:'rgba(255,224,130,0.7)', minWidth:36, textAlign:'right', flexShrink:0 }}>{s.moves}mv</span>
                      <span style={{ color:'rgba(255,224,130,0.7)', minWidth:36, textAlign:'right', flexShrink:0 }}>{formatTime(s.time)}</span>
                    </div>
                  ))}
                </div>
              )
            }
          </div>
        </div>
      );
    }

        const cardGrad=ctx.createLinearGradient(cx,cy,cx,cy+ch);
        cardGrad.addColorStop(0,'#fdf6e3');cardGrad.addColorStop(0.5,'#fef9ed');cardGrad.addColorStop(1,'#f5e6c8');
        ctx.fillStyle=cardGrad;ctx.fill();ctx.restore();
        rr(cx,cy,cw,ch,cr);ctx.lineWidth=10;ctx.strokeStyle='#c8a96e';ctx.stroke();

        // Gold top bar
        ctx.fillStyle='#b8860b';
        for(let i=0;i<W;i+=3){const g=ctx.createLinearGradient(0,cy,0,cy+12);g.addColorStop(0,'#f0c040');g.addColorStop(1,'#b8860b');ctx.fillStyle=g;}
        ctx.fillRect(cx+10,cy,cw-20,12);

        // MindSharp başlık
        ctx.save();ctx.textAlign='center';
        ctx.font='900 110px Georgia,serif';
        const tg=ctx.createLinearGradient(W/2-250,0,W/2+250,0);
        tg.addColorStop(0,'#8B4513');tg.addColorStop(0.5,'#c8860a');tg.addColorStop(1,'#8B4513');
        ctx.fillStyle=tg;ctx.shadowColor='rgba(0,0,0,0.2)';ctx.shadowBlur=8;
        ctx.fillText('MindSharp',W/2,cy+150);ctx.restore();

        // Achievement banner
        const bx=cx+80,by=cy+178,bw=cw-160,bh=68,br=12;
        rr(bx,by,bw,bh,br);
        const bg2=ctx.createLinearGradient(bx,by,bx+bw,by);
        bg2.addColorStop(0,'#b8860b');bg2.addColorStop(0.5,'#f0c040');bg2.addColorStop(1,'#b8860b');
        ctx.fillStyle=bg2;ctx.fill();
        ctx.save();ctx.textAlign='center';ctx.font='800 34px Segoe UI,Arial';ctx.fillStyle='#5a2d00';
        ctx.fillText(lang==='tr'?'T E B R İ K L E R !':'C O N G R A T U L A T I O N S !',W/2,by+46);ctx.restore();

        // Rank — only for top 3
        if(rank && rank<=3){
          const rankColor=rank===1?'#f1c40f':rank<=3?'#e67e22':'#27ae60';
          const rankLabel=rank===1?(lang==='tr'?'YENİ REKOR!':'NEW RECORD!'):(lang==='tr'?'İLK 3 — Harika!':'TOP 3 — Amazing!');
          ctx.save();ctx.textAlign='center';ctx.font='900 42px Segoe UI';ctx.fillStyle=rankColor;
          ctx.fillText(rankLabel,W/2,cy+298);ctx.restore();
        }

        // Kullanıcı adı
        ctx.save();ctx.textAlign='center';
        ctx.font='900 80px Segoe UI,Arial';ctx.fillStyle='#3d1a00';ctx.shadowColor='rgba(0,0,0,0.15)';ctx.shadowBlur=8;
        ctx.fillText((user||t('guest')).trim(),W/2,cy+468);ctx.restore();

        // character image removed

        // Karakter ismi pill
        const pillX=W/2-200, pillY=cy+830, pillW=400, pillH=70;
        rr(pillX,pillY,pillW,pillH,35);
        ctx.fillStyle=character.labelBg||'#3a6aff';ctx.fill();
        ctx.save();ctx.textAlign='center';ctx.font='800 32px Segoe UI,Arial';ctx.fillStyle='#fff';
        ctx.fillText(charName,W/2,pillY+46);ctx.restore();

        // Skor bloğu
        const spx=cx+70,spy=cy+1020,spw=cw-140,sph=220,spr=28;
        rr(spx,spy,spw,sph,spr);
        ctx.save();ctx.shadowColor='rgba(200,120,0,0.4)';ctx.shadowBlur=28;ctx.shadowOffsetY=10;
        const sg=ctx.createLinearGradient(spx,spy,spx+spw,spy+sph);
        sg.addColorStop(0,'#e67e22');sg.addColorStop(1,'#c0392b');ctx.fillStyle=sg;ctx.fill();ctx.restore();
        ctx.save();ctx.textAlign='center';
        ctx.font='800 30px Segoe UI';ctx.fillStyle='rgba(255,255,255,0.85)';ctx.fillText(t('score_label'),W/2,spy+58);
        ctx.font='900 140px Segoe UI,Arial';ctx.fillStyle='#fff';ctx.fillText(score.toLocaleString(),W/2,spy+188);ctx.restore();
        if(comboBonus>0){ctx.save();ctx.textAlign='center';ctx.font='700 28px Segoe UI';ctx.fillStyle='rgba(255,255,200,0.9)';ctx.fillText(`🔥 +${comboBonus} ${lang==='tr'?'Kombo Bonusu':'Combo Bonus'}`,W/2,spy+216);ctx.restore();}

        // Stats
        const statsY=cy+1290;
        [{label:t('moves_label'),value:moves,color:'#e74c3c'},{label:t('time_label'),value:formatTime(time),color:'#3498db'},{label:t('rank_label'),value:rank?`#${rank}`:'-',color:rank===1?'#f1c40f':rank<=3?'#e67e22':'#27ae60'}].forEach((col,i)=>{
          const colX=cx+70+i*((cw-140)/3)+((cw-140)/3)/2;
          if(i>0){ctx.save();ctx.strokeStyle='rgba(180,140,80,0.35)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(cx+70+i*(cw-140)/3,statsY-20);ctx.lineTo(cx+70+i*(cw-140)/3,statsY+120);ctx.stroke();ctx.restore();}
          ctx.save();ctx.textAlign='center';ctx.font='700 28px Segoe UI';ctx.fillStyle='rgba(100,60,10,0.6)';ctx.fillText(col.label,colX,statsY);
          ctx.font='900 72px Segoe UI,Arial';ctx.fillStyle=col.color;ctx.fillText(String(col.value),colX,statsY+88);ctx.restore();
        });

        // Footer
        ctx.save();ctx.strokeStyle='rgba(180,140,80,0.3)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(cx+100,cy+ch-130);ctx.lineTo(cx+cw-100,cy+ch-130);ctx.stroke();
        ctx.textAlign='center';ctx.font='600 28px Segoe UI';ctx.fillStyle='rgba(100,60,10,0.5)';ctx.fillText(`✦  ${dateStr}  ✦`,W/2,cy+ch-90);
        ctx.font='700 26px Segoe UI';ctx.fillStyle='rgba(100,60,10,0.45)';ctx.fillText('mindsharp.co',W/2,cy+ch-50);ctx.restore();

        return canvas.toDataURL('image/png');
      };

      const handleShare = async () => {
        trackEvent('share_click',{mode,score,character:character.key});
        try {
          setSharing(true);
          const dataUrl = await buildCertificate();
          const res = await fetch(dataUrl);
          const blob = await res.blob();
          const file = new File([blob],'mindsharp-certificate.png',{type:'image/png'});
          if (navigator.share && navigator.canShare && navigator.canShare({files:[file]})) {
            await navigator.share({title:t('share_certificate_title'),text:t('share_certificate_text',{score:score}),files:[file]});
            trackEvent('share_completed',{method:'native',mode,score,character:character.key});
            return;
          }
          const a = document.createElement('a');
          a.href=dataUrl; a.download='mindsharp-certificate.png';
          document.body.appendChild(a); a.click(); a.remove();
          trackEvent('share_completed',{method:'download',mode,score,character:character.key});
        } catch(e) { console.warn(e); }
        finally { setSharing(false); }
      };
      const diffLabel = tDiff(GRID_CONFIGS[mode]?.difficulty || mode);

      return (
        <div style={{ position:'fixed', inset:0, zIndex:200, background:'rgba(0,0,0,0.72)',
          display:'flex', alignItems:'flex-start', justifyContent:'center', overflowY:'auto',
          padding:'12px 0 24px', WebkitOverflowScrolling:'touch', overscrollBehavior:'contain' }}>

          {/* İsim Giriş Popup Overlay */}
          {showNamePopup && (
            <div style={{ position:'fixed', inset:0, zIndex:500, display:'flex', alignItems:'center', justifyContent:'center', background:'rgba(0,0,0,0.55)' }}
              onClick={(e) => { if(e.target===e.currentTarget) handlePopupSkip(); }}>
              <div style={{ background:'linear-gradient(160deg,#fdf8ec,#fef5da,#f5e6c3)', borderRadius:20, border:'3px solid #c8a96e',
                boxShadow:'0 0 0 6px rgba(200,169,110,0.2),0 20px 60px rgba(0,0,0,0.6)',
                padding:'28px 24px 24px', width:'88%', maxWidth:320, position:'relative',
                animation:'cardSlideUp 0.35s cubic-bezier(.22,1.2,.36,1) both' }}>
                <div style={{ height:4, background:'linear-gradient(90deg,#b8860b,#f0c040,#b8860b)', borderRadius:4, marginBottom:18 }}/>
                <button onClick={handlePopupSkip} style={{ position:'absolute', top:12, right:12, width:28, height:28,
                  background:'rgba(200,169,110,0.18)', border:'1.5px solid rgba(200,169,110,0.4)', borderRadius:'50%',
                  color:'#7a5c2e', fontSize:15, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', fontWeight:700 }}>✕</button>
                <div style={{ textAlign:'center', marginBottom:14 }}>
                  <div style={{ fontSize:28, marginBottom:4 }}>🏆</div>
                  <div style={{ fontFamily:'Georgia,serif', fontSize:18, fontWeight:900, color:'#7a3e00', marginBottom:4 }}>
                    {getLang()==='tr' ? 'Adını listeye ekle!' : 'Add your name to the board!'}
                  </div>
                  <div style={{ fontSize:12, color:'#b8860b', fontWeight:600 }}>
                    {getLang()==='tr' ? 'Skorun kaydedildi. Adını gir!' : 'Your score is saved. Enter your name!'}
                  </div>
                </div>
                <div style={{ display:'flex', gap:8, animation: nameInputShake ? 'nameShake 0.5s ease' : 'none' }}>
                  <input type="text" value={popupNameInput} onChange={e => setPopupNameInput(e.target.value)}
                    onKeyDown={e => { if(e.key==='Enter') handlePopupSave(); }}
                    onFocus={() => { window.scrollTo(0,0); document.body.style.overflow='hidden'; }}
                    onBlur={() => { document.body.style.overflow=''; }}
                    placeholder={getLang()==='tr' ? 'Adın...' : 'Your name...'}
                    maxLength={20} autoFocus
                    style={{ flex:1, padding:'10px 12px', borderRadius:10,
                      border: nameInputShake ? '2px solid #e74c3c' : '2px solid #e67e22',
                      background:'rgba(255,255,255,0.95)', fontSize:16, fontWeight:700, color:'#3d1a00',
                      outline:'none', textAlign:'center',
                      boxShadow: nameInputShake ? '0 0 0 3px rgba(231,76,60,0.3)' : '0 0 0 3px rgba(230,126,34,0.2)' }}/>
                  <button onClick={handlePopupSave} style={{ padding:'10px 16px', borderRadius:10, border:'none',
                    background: popupNameInput.trim() ? 'linear-gradient(135deg,#f39c12,#e67e22)' : 'rgba(200,169,110,0.3)',
                    color:'#fff', fontWeight:800, fontSize:16, cursor:'pointer',
                    boxShadow: popupNameInput.trim() ? '0 2px 8px rgba(230,126,34,0.4)' : 'none' }}>✓</button>
                </div>
                <div style={{ textAlign:'center', marginTop:10, fontSize:11, color:'rgba(120,80,20,0.55)' }}>
                  {getLang()==='tr' ? 'Bir kez gir, hep hatırlayalım 🧠' : "Enter once, we'll remember you 🧠"}
                </div>
              </div>
            </div>
          )}
          <style>{`
            @keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(380px) rotate(var(--rot));opacity:0}}
            @keyframes cardSlideUp{from{transform:translateY(40px) scale(0.94);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}
            @keyframes scorePop{0%{transform:scale(0.6);opacity:0}70%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
            @keyframes rankGlow{0%,100%{box-shadow:0 0 8px currentColor}50%{box-shadow:0 0 22px currentColor,0 0 40px rgba(241,196,15,0.4)}}
            @keyframes nameGlow{0%,100%{box-shadow:0 0 0 3px rgba(230,126,34,0.25)}50%{box-shadow:0 0 0 5px rgba(230,126,34,0.55),0 0 16px rgba(230,126,34,0.3)}}
            @keyframes nameShake{0%,100%{transform:translateX(0)}15%{transform:translateX(-8px)}35%{transform:translateX(8px)}55%{transform:translateX(-6px)}75%{transform:translateX(6px)}90%{transform:translateX(-3px)}}
            @keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
          `}</style>
          {confetti.map(p => (
            <div key={p.id} style={{ position:'fixed', left:`${p.left}%`, top:'-10px',
              color:p.color, fontSize:p.size, animation:`confettiFall ${p.duration}s ${p.delay}s ease-in forwards`,
              '--rot':`${p.rotate}deg`, pointerEvents:'none', zIndex:300, userSelect:'none' }}>{p.shape}</div>
          ))}
          <div style={{ position:'relative', width:'92%', maxWidth:360, margin:'auto 0',
            background:'linear-gradient(160deg,#fdf8ec 0%,#fef5da 50%,#f5e6c3 100%)',
            borderRadius:24, border:'3px solid #c8a96e',
            boxShadow:'0 0 0 6px rgba(200,169,110,0.2),0 24px 64px rgba(0,0,0,0.55)',
            animation:'cardSlideUp 0.45s cubic-bezier(.22,1.2,.36,1) both',
            overflow:'hidden', maxHeight:'calc(100vh - 32px)', overflowY:'auto' }}>
            <div style={{ height:5, background:'linear-gradient(90deg,#b8860b,#f0c040,#b8860b)' }}/>
            <button onClick={onMenu} style={{ position:'absolute', top:12, right:12, zIndex:10, width:30, height:30,
              background:'rgba(200,169,110,0.18)', border:'1.5px solid rgba(200,169,110,0.4)', borderRadius:'50%',
              color:'#7a5c2e', fontSize:16, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center',
              fontWeight:700, lineHeight:1 }}>✕</button>
            <div style={{ position:'absolute', inset:8, borderRadius:18, border:'1.5px solid rgba(200,169,110,0.35)', pointerEvents:'none', zIndex:1 }}/>
            {[{top:14,left:14},{top:14,right:14},{bottom:14,left:14},{bottom:14,right:14}].map((pos,i) => (
              <div key={i} style={{ position:'absolute', ...pos, color:'#c8a96e', fontSize:18, pointerEvents:'none', zIndex:2 }}>✦</div>
            ))}
            <div style={{ padding:'8px 12px 8px', position:'relative', zIndex:3 }}>
              {/* Header */}
              <div style={{ textAlign:'center', marginBottom:6 }}>
                <h2 style={{ margin:'0 0 4px', fontFamily:'Georgia,serif', fontSize:30, fontWeight:900,
                  background:'linear-gradient(135deg,#7a3e00 0%,#c8860a 50%,#7a3e00 100%)',
                  backgroundSize:'200% auto', WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent',
                  animation:'shimmer 3s linear infinite' }}>MindSharp</h2>
                <div style={{ display:'inline-block', background:'linear-gradient(90deg,#b8860b,#f0c040,#b8860b)',
                  borderRadius:20, padding:'2px 14px' }}>
                  <span style={{ fontSize:9, fontWeight:800, color:'#5a2d00', letterSpacing:2 }}>{lang==='tr' ? 'T E B R İ K L E R !' : 'C O N G R A T U L A T I O N S !'}</span>
                </div>
              </div>

              {/* Rank badge — only for top ranks */}
              {rank && rank<=3 && (
                <div style={{ textAlign:'center', marginBottom:6, background:rankInfo.bg,
                  border:`1.5px solid ${rankInfo.color}`, borderRadius:12, padding:'5px 12px',
                  animation:rank===1?'rankGlow 1.8s ease infinite':'none' }}>
                  <span style={{ color:rankInfo.color, fontWeight:900, fontSize:13 }}>{rankInfo.label}</span>
                </div>
              )}

              {/* Name */}
              <div style={{ textAlign:'center', marginBottom:10 }}>
                <div style={{ color:'#3d1a00', fontWeight:900, fontSize:22, fontFamily:'Georgia,serif' }}>{displayName}</div>
                <div style={{ color:'rgba(120,80,20,0.5)', fontSize:10, marginTop:2 }}>{diffLabel} · {dateStr}</div>
              </div>

              {/* Character — centered */}
              <div style={{ textAlign:'center', marginBottom:4 }}>
                
                <div>
                  <span style={{ display:'inline-block', marginTop:6, background:'rgba(80,50,20,0.12)',
                    border:'1.5px solid rgba(200,169,110,0.5)', borderRadius:20, padding:'4px 16px',
                    fontSize:13, fontWeight:900, color:character.labelBg||'#5a4030', letterSpacing:0.8 }}>
                    {charName}
                  </span>
                </div>
              </div>

              {/* Character quote */}
              <div style={{ textAlign:'center', fontSize:11, color:'rgba(100,60,10,0.6)', fontStyle:'italic',
                marginBottom:4 }}>
                "{charQuote}"
              </div>

              {/* Score block — centered */}
              <div style={{ background:character.bgGrad||'linear-gradient(135deg,#e67e22,#c0392b)',
                borderRadius:12, padding:'7px 12px 6px', textAlign:'center',
                marginBottom:6, boxShadow:'0 4px 14px rgba(200,80,20,0.4)',
                animation:'scorePop 0.5s 0.2s cubic-bezier(.22,1.2,.36,1) both' }}>
                <div style={{ color:'rgba(255,255,255,0.9)', fontSize:8, fontWeight:800, letterSpacing:2 }}>{t('score_label')}</div>
                <div style={{ color:'#fff', fontSize:40, fontWeight:900, lineHeight:1.1,
                  textShadow:'0 2px 12px rgba(0,0,0,0.4)' }}>
                  {score.toLocaleString()}
                </div>
                {comboBonus > 0 && (
                  <div style={{ color:'rgba(255,255,200,0.95)', fontSize:11, marginTop:2, fontWeight:700 }}>
                    🔥 +{comboBonus} {lang==='tr'?'Kombo':'Combo'}
                  </div>
                )}
              </div>

              {/* Stats */}
              <div style={{ display:'flex', background:'rgba(200,169,110,0.12)', borderRadius:12,
                padding:'7px 0', marginBottom:8, border:'1px solid rgba(200,169,110,0.25)' }}>
                {[
                  { label:t('moves_label'), value:moves, color:'#e74c3c' },
                  { label:t('time_label'),  value:formatTime(time), color:'#2980b9' },
                  { label:t('rank_label'),  value:rank?`#${rank}`:'-',
                    color:rank===1?'#f1c40f':rank<=3?'#e67e22':rank<=10?'#27ae60':'#7f8c8d' },
                ].map((s,i) => (
                  <React.Fragment key={s.label}>
                    {i>0 && <div style={{ width:1, background:'rgba(200,169,110,0.4)', margin:'0 4px' }}/>}
                    <div style={{ flex:1, textAlign:'center' }}>
                      <div style={{ fontSize:9, color:'rgba(100,60,10,0.55)', fontWeight:700, marginBottom:1 }}>{s.label}</div>
                      <div style={{ fontSize:18, fontWeight:900, color:s.color }}>{s.value}</div>
                    </div>
                  </React.Fragment>
                ))}
              </div>

              {/* Ad button */}
              {(adAvailable||adWatched) && (
                <button onClick={handleWatchAd} disabled={adWatched||adLoading}
                  style={{ width:'100%', padding:'10px 0', borderRadius:12, border:'none', marginBottom:7,
                    background: adWatched?'linear-gradient(135deg,#27ae60,#2ecc71)':adLoading?'rgba(155,89,182,0.5)':'linear-gradient(135deg,#8e44ad,#9b59b6)',
                    color:'#fff', fontWeight:900, fontSize:13, cursor:adWatched?'default':'pointer',
                    display:'flex', alignItems:'center', justifyContent:'center', gap:8 }}>
                  {adWatched ? t('ad_earned') : adLoading ? t('ad_loading') : t('ad_watch')}
                </button>
              )}

              {/* Buttons — hiyerarşik */}
              {(() => {
                const isGoodScore = score >= 1000 || (rank && rank <= 10);
                if (isGoodScore) {
                  return (
                    <div>
                      <style>{`
                        @keyframes pulseGlow {
                          0%,100% { box-shadow: 0 0 0 0 rgba(243,156,18,0.7), 0 4px 20px rgba(243,156,18,0.5); transform: scale(1); }
                          50% { box-shadow: 0 0 0 8px rgba(243,156,18,0), 0 6px 28px rgba(243,156,18,0.7); transform: scale(1.02); }
                        }
                      `}</style>
                      <div style={{ textAlign:'center', fontSize:11, fontWeight:800, color:'#c8860a',
                        marginBottom:6, letterSpacing:0.5 }}>
                        {lang==='tr' ? '🔥 Arkadaşlarına meydan oku!' : '🔥 Challenge your friends!'}
                      </div>
                      <button onClick={() => { handleShare(); }} disabled={sharing} style={{ width:'100%', padding:'15px 0',
                        borderRadius:14, border:'none', marginBottom:8,
                        background: sharing ? 'rgba(243,156,18,0.5)' : 'linear-gradient(135deg,#f39c12,#e67e22,#d35400)',
                        color:'#fff', fontWeight:900, fontSize:17, cursor:'pointer', letterSpacing:0.5,
                        animation: sharing ? 'none' : 'pulseGlow 1.8s ease-in-out infinite' }}>
                        {sharing ? (lang==='tr' ? 'Paylaşılıyor...' : 'Sharing...') : (lang==='tr' ? '📤 Paylaş — Skoru Gönder!' : '📤 Share — Send Your Score!')}
                      </button>
                      <button onClick={() => { onReplay(); }} style={{ width:'100%', padding:'11px 0', borderRadius:12,
                        border:'none', marginBottom:6,
                        background:'linear-gradient(135deg,#27ae60,#2ecc71)', color:'#fff', fontWeight:900,
                        fontSize:14, cursor:'pointer' }}>{t('play_again')}</button>
                      <div style={{ display:'flex', gap:6, marginBottom:6 }}>
                        <button onClick={() => { onScores(); }} style={{ flex:1, padding:'8px 0', borderRadius:10, border:'none',
                          background:'rgba(41,128,185,0.15)', color:'#2980b9', fontWeight:700, fontSize:11, cursor:'pointer' }}>
                          🏆 {t('high_scores')}
                        </button>
                        <button onClick={() => { onMenu(); }} style={{ flex:1, padding:'8px 0', borderRadius:10,
                          border:'1.5px solid rgba(200,169,110,0.4)', background:'transparent',
                          color:'rgba(120,80,20,0.55)', fontWeight:600, fontSize:11, cursor:'pointer' }}>
                          {t('menu_button')}
                        </button>
                      </div>
                    </div>
                  );
                } else {
                  return (
                    <div>
                      <button onClick={() => { onReplay(); }} style={{ width:'100%', padding:'14px 0', borderRadius:14,
                        border:'none', marginBottom:7,
                        background:'linear-gradient(135deg,#27ae60,#2ecc71)', color:'#fff', fontWeight:900,
                        fontSize:16, cursor:'pointer', boxShadow:'0 4px 16px rgba(46,204,113,0.4)' }}>
                        {t('play_again')}
                      </button>
                      <button onClick={() => { handleShare(); }} disabled={sharing} style={{ width:'100%', padding:'11px 0',
                        borderRadius:12, border:'none', marginBottom:7,
                        background: sharing ? 'rgba(230,126,34,0.5)' : 'linear-gradient(135deg,#f39c12,#e67e22)',
                        color:'#fff', fontWeight:800, fontSize:13, cursor:'pointer' }}>
                        {sharing ? (lang==='tr' ? 'Paylaşılıyor...' : 'Sharing...') : t('share_button')}
                      </button>
                      <div style={{ display:'flex', gap:6, marginBottom:6 }}>
                        <button onClick={() => { onScores(); }} style={{ flex:1, padding:'8px 0', borderRadius:10, border:'none',
                          background:'rgba(41,128,185,0.15)', color:'#2980b9', fontWeight:700, fontSize:11, cursor:'pointer' }}>
                          🏆 {t('high_scores')}
                        </button>
                        <button onClick={() => { onMenu(); }} style={{ flex:1, padding:'8px 0', borderRadius:10,
                          border:'1.5px solid rgba(200,169,110,0.4)', background:'transparent',
                          color:'rgba(120,80,20,0.55)', fontWeight:600, fontSize:11, cursor:'pointer' }}>
                          {t('menu_button')}
                        </button>
                      </div>
                    </div>
                  );
                }
              })()}
              <div style={{ textAlign:'center', fontSize:9, color:'rgba(120,80,20,0.45)', fontStyle:'italic' }}>
                {t("share_certificate_hint")}
              </div>
            </div>
          </div>
        </div>
      );
    }


    function useSettings() {
      const load = (key,def) => {
        try { const v=localStorage.getItem('ms_'+key); return v===null?def:JSON.parse(v); } catch { return def; }
      };
      const [sfx,setSfxRaw]             = React.useState(() => load('sfx',true));
      const [music,setMusicRaw]         = React.useState(() => load('music',true));

    function FingerHint({ show, tile0Ref, tile1Ref, onPress0, onPress1 }) {
      const [pos, setPos] = React.useState({ x: -999, y: -999 });
      const [opacity, setOpacity] = React.useState(0);
      const [scale, setScale] = React.useState(1);

      // Parmak ucunu taşın tam ortasına hizala
      // 👆 emojisinde parmak ucu yaklaşık %20 solda, %85 üstte
      const getCenter = (ref) => {
        if (!ref || !ref.current) return null;
        const r = ref.current.getBoundingClientRect();
        // Parmak ucunun taş merkezine denk gelmesi için:
        // fontSize 44 → emoji kutusu ~44x44
        // Parmak ucu emoji kutusunun yaklaşık x:50%, y:0% noktasında
        const emojiSize = 44;
        return { 
          x: r.left + r.width / 2 - emojiSize / 2, 
          y: r.top + r.height / 2 - 4
        };
      };

      const press = () => {
        setScale(0.78);
        setTimeout(() => setScale(1), 300);
      };

      React.useEffect(() => {
        if (!show) {
          setOpacity(0);
          return;
        }
        const timers = [];

        // 1650ms: pozisyonu ayarla (hâlâ görünmez)
        timers.push(setTimeout(() => {
          const c = getCenter(tile0Ref);
          if (c) setPos(c);
        }, 1650));

        // 1750ms: belir
        timers.push(setTimeout(() => {
          setOpacity(1);
        }, 1750));

        // 1800ms: press + tile0 aç (senkron)
        timers.push(setTimeout(() => {
          press();
          if (onPress0) onPress0();
        }, 1800));

        // 2400ms: tile1'e kay
        timers.push(setTimeout(() => {
          const c = getCenter(tile1Ref);
          if (c) setPos(c);
        }, 2400));

        // 2500ms: press + tile1 aç (senkron)
        timers.push(setTimeout(() => {
          press();
          if (onPress1) onPress1();
        }, 2500));

        // 3400ms: kaybol
        timers.push(setTimeout(() => {
          setOpacity(0);
        }, 3400));

        return () => timers.forEach(clearTimeout);
      }, [show]);

      if (!show) return null;
      return (
        <div style={{
          position: 'fixed',
          left: pos.x,
          top: pos.y,
          fontSize: 44,
          lineHeight: '44px',
          width: 44,
          height: 44,
          textAlign: 'center',
          zIndex: 9999,
          pointerEvents: 'none',
          filter: 'drop-shadow(0 3px 8px rgba(0,0,0,0.7))',
          transform: `scale(${scale})`,
          transformOrigin: 'center top',
          opacity: opacity,
          transition: 'left 0.30s cubic-bezier(0.4,0,0.2,1), top 0.30s cubic-bezier(0.4,0,0.2,1), transform 0.18s ease, opacity 0.2s ease',

        const source = ctx.createBufferSource();
        source.buffer = bgBufferRef.current;
        source.loop = true;
        const gainNode = ctx.createGain();
        gainNode.gain.value = 0.18;

        source.start(0);
        bgSourceRef.current = source;

      const stopBgMusic = () => {

          bgBufferRef.current = buffer;

              ctx.resume().then(() => { if (musicEnabledRef.current && !bgPlayingRef.current) startBgMusic(); });
            } else {

        }).catch(() => {});

              onMenu={() => { trackEvent('menu_return',{source:'daily_modal'}); setShowDailyModal(false); setScreen('menu'); }}
              onShare={async () => {
                trackEvent('daily_share',{mode:dailyModeKey,score:dailyResult.score,rank:dailyRank});
                const lang = getLang();
                const shareText = lang==='tr'
                  ? `🎯 MindSharp Günlük Yarışması'nda ${dailyResult.score.toLocaleString()} puan aldım! 🧠 Beni geçebilir misin? 🏆\nBu linkten ücretsiz oynanıyor: https://mindsharp.co`
                  : `🎯 I scored ${dailyResult.score.toLocaleString()} in MindSharp Daily Challenge! 🧠 Can you beat me? 🏆\nPlay for free: https://mindsharp.co`;
                try {
                  const character = getCharacter(dailyResult.score);
                  const charName  = lang==='tr' ? character.tr : character.en;
                  const today     = new Date();
                  const dateStr   = String(today.getDate()).padStart(2,'0')+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+today.getFullYear();
                  const fmtT      = s => String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
                  const rankNum   = dailyRank;
                  const rankTxt   = rankNum ? (rankNum===1?'🥇 #1 — '+( lang==='tr'?'Lider!':'Leader!') : rankNum===2?'🥈 #2' : rankNum===3?'🥉 #3' : '#'+rankNum) : null;
                  const rankColor = rankNum===1?'#f1c40f':rankNum<=3?'#e67e22':'#27ae60';

                  const W=1080, H=1920;
                  const canvas = document.createElement('canvas');
                  canvas.width=W; canvas.height=H;
                  const ctx = canvas.getContext('2d');
                  const rr=(x,y,w,h,r)=>{ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();};

                  // Arka plan
                  const bgImg = new Image(); bgImg.crossOrigin='anonymous'; bgImg.src='./wood_bg.png';
                  await new Promise(r=>{bgImg.onload=r;bgImg.onerror=r;});
                  ctx.fillStyle='#2b1a10'; ctx.fillRect(0,0,W,H);
                  try { const sc=Math.max(W/bgImg.width,H/bgImg.height); ctx.drawImage(bgImg,(W-bgImg.width*sc)/2,(H-bgImg.height*sc)/2,bgImg.width*sc,bgImg.height*sc); } catch(e){}
                  const vg=ctx.createRadialGradient(W/2,H*0.4,50,W/2,H*0.4,H*0.7);
                  vg.addColorStop(0,'rgba(0,0,0,0.15)'); vg.addColorStop(1,'rgba(0,0,0,0.75)');
                  ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);

                  // Kart
                  const cx=60, cy=120, cw=W-120, ch=H-260, cr=48;
                  ctx.save(); ctx.shadowColor='rgba(0,0,0,0.6)'; ctx.shadowBlur=60; ctx.shadowOffsetY=20;
                  rr(cx,cy,cw,ch,cr);
                  const cg=ctx.createLinearGradient(cx,cy,cx,cy+ch);
                  cg.addColorStop(0,'#fdf6e3'); cg.addColorStop(0.5,'#fef9ed'); cg.addColorStop(1,'#f5e6c8');
                  ctx.fillStyle=cg; ctx.fill(); ctx.restore();
                  rr(cx,cy,cw,ch,cr); ctx.lineWidth=10; ctx.strokeStyle='#c8a96e'; ctx.stroke();

                  // Altın üst şerit
                  rr(cx+10,cy,cw-20,14,0);
                  const gs=ctx.createLinearGradient(cx,cy,cx+cw,cy);
                  gs.addColorStop(0,'#b8860b'); gs.addColorStop(0.5,'#f0c040'); gs.addColorStop(1,'#b8860b');
                  ctx.fillStyle=gs; ctx.fill();

                  // MindSharp başlık
                  ctx.save(); ctx.textAlign='center';
                  const tg=ctx.createLinearGradient(W/2-300,0,W/2+300,0);
                  tg.addColorStop(0,'#8B4513'); tg.addColorStop(0.5,'#c8860a'); tg.addColorStop(1,'#8B4513');
                  ctx.font='900 110px Georgia,serif'; ctx.fillStyle=tg;
                  ctx.shadowColor='rgba(0,0,0,0.2)'; ctx.shadowBlur=8;
                  ctx.fillText('MindSharp',W/2,cy+148); ctx.restore();

                  // Günlük Yarışma banner
                  const bx=cx+70, by=cy+168, bw=cw-140, bh=72, br=14;
                  rr(bx,by,bw,bh,br);
                  const bg2=ctx.createLinearGradient(bx,by,bx+bw,by);
                  bg2.addColorStop(0,'#b8860b'); bg2.addColorStop(0.5,'#f0c040'); bg2.addColorStop(1,'#b8860b');
                  ctx.fillStyle=bg2; ctx.fill();
                  ctx.save(); ctx.textAlign='center'; ctx.font='800 34px Segoe UI,Arial'; ctx.fillStyle='#5a2d00';
                  ctx.fillText(lang==='tr'?'🎯 GÜNLÜK YARIŞMA':'🎯 DAILY CHALLENGE',W/2,by+48); ctx.restore();

                  // Sıralama — büyük ve belirgin, BANNER hemen altında
                  if (rankTxt) {
                    const rx=cx+70, ry=by+bh+20, rw=cw-140, rh=100, rbr=16;
                    rr(rx,ry,rw,rh,rbr);
                    ctx.save();
                    const rankBg = rankNum===1 ? 'rgba(241,196,15,0.22)' : rankNum<=3 ? 'rgba(230,126,34,0.18)' : 'rgba(39,174,96,0.15)';
                    ctx.fillStyle=rankBg; ctx.fill();
                    rr(rx,ry,rw,rh,rbr); ctx.lineWidth=3; ctx.strokeStyle=rankColor; ctx.stroke();
                    ctx.textAlign='center'; ctx.font='900 62px Segoe UI,Arial'; ctx.fillStyle=rankColor;
                    ctx.shadowColor=rankColor; ctx.shadowBlur=20;
                    ctx.fillText(rankTxt,W/2,ry+70); ctx.restore();
                  }

                  // Kullanıcı adı
                  const nameY = rankTxt ? cy+450 : cy+320;
                  ctx.save(); ctx.textAlign='center';
                  ctx.font='900 80px Segoe UI,Arial'; ctx.fillStyle='#3d1a00';
                  ctx.shadowColor='rgba(0,0,0,0.12)'; ctx.shadowBlur=6;
                  ctx.fillText((user||( lang==='tr'?'Misafir':'Guest')).trim(),W/2,nameY); ctx.restore();

                  // character image removedcatch(e2){} }

                  // Karakter ismi pill
                  const pillY = imgY+340;
                  const pillX=W/2-180, pillW=360, pillH=66;
                  rr(pillX,pillY,pillW,pillH,33);
                  ctx.fillStyle='rgba(80,50,20,0.12)'; ctx.fill();
                  rr(pillX,pillY,pillW,pillH,33); ctx.lineWidth=3; ctx.strokeStyle='rgba(200,169,110,0.6)'; ctx.stroke();
                  ctx.save(); ctx.textAlign='center'; ctx.font='800 34px Segoe UI,Arial'; ctx.fillStyle='#5a4030';
                  ctx.fillText(charName,W/2,pillY+46); ctx.restore();

                  // Skor bloğu
                  const spx=cx+70, spy=pillY+90, spw=cw-140, sph=220, spr=28;
                  rr(spx,spy,spw,sph,spr);
                  ctx.save(); ctx.shadowColor='rgba(200,120,0,0.4)'; ctx.shadowBlur=28; ctx.shadowOffsetY=10;
                  const sg2=ctx.createLinearGradient(spx,spy,spx+spw,spy+sph);
                  sg2.addColorStop(0,'#e67e22'); sg2.addColorStop(1,'#c0392b');
                  ctx.fillStyle=sg2; ctx.fill(); ctx.restore();
                  ctx.save(); ctx.textAlign='center';
                  ctx.font='800 30px Segoe UI'; ctx.fillStyle='rgba(255,255,255,0.85)';
                  ctx.fillText(lang==='tr'?'S K O R':'S C O R E',W/2,spy+56);
                  ctx.font='900 140px Segoe UI,Arial'; ctx.fillStyle='#fff';
                  ctx.shadowColor='rgba(0,0,0,0.3)'; ctx.shadowBlur=12;
                  ctx.fillText(dailyResult.score.toLocaleString(),W/2,spy+190); ctx.restore();

                  // Stats: Süre | Hamle
                  const statsY = spy+sph+50;
                  [{label:lang==='tr'?'SÜRE':'TIME',value:fmtT(dailyResult.time),color:'#3498db'},
                   {label:lang==='tr'?'HAMLE':'MOVES',value:String(dailyResult.moves),color:'#e74c3c'}
                  ].forEach((col,i)=>{
                    const colX = cx+70+(i+0.5)*((cw-140)/2);
                    if(i>0){ ctx.save(); ctx.strokeStyle='rgba(180,140,80,0.3)'; ctx.lineWidth=2;
                      ctx.beginPath(); ctx.moveTo(cx+70+(cw-140)/2,statsY-20); ctx.lineTo(cx+70+(cw-140)/2,statsY+120); ctx.stroke(); ctx.restore(); }
                    ctx.save(); ctx.textAlign='center';
                    ctx.font='700 28px Segoe UI'; ctx.fillStyle='rgba(100,60,10,0.6)'; ctx.fillText(col.label,colX,statsY);
                    ctx.font='900 80px Segoe UI,Arial'; ctx.fillStyle=col.color; ctx.fillText(col.value,colX,statsY+90); ctx.restore();
                  });

                  // Tarih + footer
                  const footerY = cy+ch-110;
                  ctx.save(); ctx.strokeStyle='rgba(180,140,80,0.3)'; ctx.lineWidth=2;
                  ctx.beginPath(); ctx.moveTo(cx+100,footerY-20); ctx.lineTo(cx+cw-100,footerY-20); ctx.stroke();
                  ctx.textAlign='center'; ctx.font='600 28px Segoe UI'; ctx.fillStyle='rgba(100,60,10,0.5)';
                  ctx.fillText('✦  '+dateStr+'  ✦',W/2,footerY+20);
                  ctx.font='700 28px Segoe UI'; ctx.fillStyle='rgba(100,60,10,0.45)';
                  ctx.fillText('mindsharp.co',W/2,footerY+60); ctx.restore();

                  const dataUrl = canvas.toDataURL('image/png');
                  const res = await fetch(dataUrl);
                  const blob = await res.blob();
                  const file = new File([blob],'mindsharp-daily.png',{type:'image/png'});
                  if (navigator.share && navigator.canShare && navigator.canShare({files:[file]})) {
                    await navigator.share({title:'MindSharp',text:shareText,files:[file]});
                    return;
                  }
                  const a=document.createElement('a'); a.href=dataUrl; a.download='mindsharp-daily.png';
                  document.body.appendChild(a); a.click(); a.remove();
                } catch(e) {
                  if (navigator.share) navigator.share({text:shareText}).catch(()=>{});
                  else navigator.clipboard.writeText(shareText).catch(()=>{});
                }
              }}
            />
          )}

          {showExitConfirm && (
            <ConfirmDialog title={t("quit_title")} message={t("quit_message")} confirmLabel={t("quit_confirm")}
              onConfirm={() => {
                setShowExitConfirm(false);
                trackEvent('game_quit',{mode,time,moves,matched,total_pairs:totalPairs,type:isDailyRef.current?'daily':'regular'});
                if (window.__setGameActive) window.__setGameActive(false);
                setRunning(false); setWon(false); setScreen('menu');
              }}
              onCancel={() => setShowExitConfirm(false)} />
          )}

          {toast && <div className="ms-toast">{toast}</div>}

          {showOnboarding && (
            <OnboardingModal
              onDone={() => setShowOnboarding(false)}
              playSound={play}
              sfxEnabled={settings.sfx}
              unlockMusic={() => {
                if (!musicEnabledRef.current) return;
                try {
                  const ctx = getAudioCtx();
                  if (ctx.state === 'suspended') {
                    ctx.resume().then(() => {
                      if (musicEnabledRef.current && !bgPlayingRef.current && bgBufferRef.current) startBgMusic();
                    });
                  } else {
                    if (!bgPlayingRef.current && bgBufferRef.current) startBgMusic();
                  }
                } catch(e) {}
              }}
            />
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        const loader = document.getElementById('ms-loader');
        if (loader) loader.style.display = 'none';
      });
    });
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').then(() => console.log('[SW] Registered')).catch(err => console.warn('[SW] Failed:', err));
    }
  </script>
  <script>
    window.__installPromptEvent = null;
    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      window.__installPromptEvent = e;
      if (window.__onInstallPromptReady) window.__onInstallPromptReady();
    });
    window.addEventListener('appinstalled', function() {
      window.__installPromptEvent = null;
      try { localStorage.setItem('ms_pwa_installed','1'); } catch {}
      if (window.__onAppInstalled) window.__onAppInstalled();
    });
  </script>
</body>
</html>
