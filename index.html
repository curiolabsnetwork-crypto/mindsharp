    function App() {
      const [screen, setScreen]     = useState('menu');
      const [showHint, setShowHint] = useState(false);
      const [mode, setMode]         = useState('8x4');

      // Onboarding — tek seferlik
      const [showOnboarding, setShowOnboarding] = useState(() => {
        try { return !localStorage.getItem('ms_onboarded'); } catch { return false; }
      });
      const [scores, setScores]     = useState([]);
      const [rank, setRank]         = useState(null);
      const scoresRef               = useRef([]);

      useEffect(() => { scoresRef.current = scores; }, [scores]);

      const [tiles, setTiles]         = useState([]);
      const [flipped, setFlipped]     = useState([]);
      const [moves, setMoves]         = useState(0);
      const [matched, setMatched]     = useState(0);
      const [time, setTime]           = useState(0);
      const [running, setRunning]     = useState(false);
      const [won, setWon]             = useState(false);
      const [shake, setShake]         = useState(null);
      const [matchAnim, setMatchAnim] = useState([]);
      const [score, setScore]         = useState(0);
      const [comboBonus, setComboBonus] = useState(0);
      const [combo, setCombo]         = useState(0);
      const [sortBy, setSortBy]       = useState('score');
      const [scoreCategory, setScoreCategory] = useState('8x4');
      const [user, setUser]           = useState(() => { try { return localStorage.getItem('memotiles_user') || ''; } catch { return ''; } });
      const [tempUser, setTempUser]   = useState('');
      const [scoreDocId, setScoreDocId] = useState(null);
      const [toast, setToast]         = useState(null);
      const [showExitConfirm, setShowExitConfirm] = useState(false);
      const settings   = useSettings();
      const [showSettings, setShowSettings] = React.useState(false);

      const comboBonusRef = useRef(0);
      const comboRef      = useRef(0);
      const lockRef       = useRef(false);
      const play          = useSound();

      useEffect(() => {
        if (screen !== 'game') return;
        setShowHint(true);
        const t = setTimeout(() => setShowHint(false), 5000);
        return () => clearTimeout(t);
      }, [screen]);

      // BUG FIX #9: Tek bir realtime listener yeterli, ayrıca fetchScoresFromCloud kaldırıldı
      useEffect(() => {
        if (!db) return;
        const unsub = db
          .collection('scores')
          .orderBy('score', 'desc')
          .limit(500)
          .onSnapshot(
            (snap) => {
              const list = snap.docs.map(d => ({ id: d.id, ...d.data() }));
              setScores(list);
            },
            (err) => console.log('Firestore read error:', err)
          );
        return () => unsub();
      }, []);

      const boardRef = useRef(null);
      const [boardWidth, setBoardWidth] = useState(330);

      useEffect(() => {
        if (screen !== 'game') return;
        const el = boardRef.current;
        if (!el) return;
        const update = () => setBoardWidth(el.clientWidth || 330);
        update();
        let ro;
        try {
          ro = new ResizeObserver(update);
          ro.observe(el);
        } catch (e) {
          window.addEventListener('resize', update);
        }
        return () => {
          if (ro) ro.disconnect();
          window.removeEventListener('resize', update);
        };
      }, [screen, mode]);

      useEffect(() => {
        if (!running) return;
        const id = setInterval(() => setTime(t => t + 1), 1000);
        return () => clearInterval(id);
      }, [running]);

      const showToast = useCallback((msg) => {
        setToast(msg);
        setTimeout(() => setToast(null), 2400);
      }, []);

      const startGame = useCallback((m) => {
        const cfg = GRID_CONFIGS[m];
        setTiles(generateTiles(cfg.pairs, cfg.maxNum));
        setFlipped([]); setMoves(0); setMatched(0); setTime(0);
        setRunning(false); setWon(false); lockRef.current = false;
        setMode(m); setScreen('game');
        setScore(0); setComboBonus(0); setCombo(0);
        setScoreDocId(null);
        comboBonusRef.current = 0; comboRef.current = 0;
      }, []);

      const handleTile = useCallback((id) => {
        if (lockRef.current) return;
        if (!running) setRunning(true);

        // BUG FIX #1: SFX kontrolü tek yerde, doğru şekilde
        if (settings.sfx) play('flip');

        setTiles(prev => prev.map(t => t.id === id ? { ...t, flipped: true } : t));
        setFlipped(prev => {
          const next = [...prev, id];
          if (next.length === 2) {
            lockRef.current = true;
            setMoves(m => m + 1);
            setTimeout(() => {
              setTiles(cur => {
                const [a, b] = next.map(fid => cur.find(t => t.id === fid));
                if (a && b && a.number === b.number && a.color === b.color) {
                  const newCombo = comboRef.current + 1;
                  comboRef.current = newCombo;
                  setCombo(newCombo);

                  let bonusPts = 0;
                  // BUG FIX #1 & #2: if/else zinciri düzeltildi, ses tek çağrılıyor
                  if (newCombo >= 3) {
                    bonusPts = 60;
                    if (settings.sfx) play('combo3');
                  } else if (newCombo === 2) {
                    bonusPts = 25;
                    if (settings.sfx) play('combo');
                  } else {
                    if (settings.sfx) play('match');
                  }

                  if (settings.vibration && navigator.vibrate) navigator.vibrate(40);
                  comboBonusRef.current += bonusPts;
                  setComboBonus(b => b + bonusPts);
                  setMatchAnim([a.id, b.id]);
                  setTimeout(() => setMatchAnim([]), 600);

                  const newTiles = cur.map(t => next.includes(t.id) ? { ...t, matched: true, flipped: false } : t);
                  const newMatchedCount = newTiles.filter(t => t.matched).length / 2;
                  setMatched(newMatchedCount);

                  const cfg = GRID_CONFIGS[mode];
                  if (newMatchedCount === cfg.pairs) {
                    setRunning(false);
                    setWon(true);
                    if (settings.sfx) play('win');

                    setMoves((mv) => {
                      setTime((tm) => {
                        // BUG FIX #3: moves zaten mv (setMoves'dan gelen güncel değer),
                        // +1 eklemiyoruz çünkü setMoves(m => m+1) zaten çağrıldı
                        const finalScore = calcScore({
                          pairs: cfg.pairs,
                          moves: mv,
                          time: tm,
                          comboBonus: comboBonusRef.current,
                        });
                        setScore(finalScore);

                        const myEntry = {
                          user: user || 'Guest',
                          mode,
                          moves: mv,
                          time: tm,
                          score: finalScore,
                        };
                        const sameMode = (scoresRef.current || []).filter(s => s.mode === mode);
                        const merged = [...sameMode, myEntry].sort((a,b) => (b.score||0) - (a.score||0));
                        const myRank = merged.findIndex(s =>
                          s.user === myEntry.user &&
                          s.score === myEntry.score &&
                          s.time === myEntry.time &&
                          s.moves === myEntry.moves
                        ) + 1;
                        setRank(myRank);

                        submitScoreToCloud({
                          user: user || "Guest",
                          mode,
                          moves: mv,
                          time: tm,
                          score: finalScore,
                        }).then(docId => {
                          if (docId) setScoreDocId(docId);
                        });

                        // İstatistikleri kaydet
                        recordGameStats({
                          mode,
                          moves: mv,
                          time: tm,
                          score: finalScore,
                          comboBonus: comboBonusRef.current,
                        });

                        // BUG FIX #6: Firebase'den kesin rank al (race condition azaltıldı)
                        setTimeout(async () => {
                          if (!db) return;
                          try {
                            const snap = await db
                              .collection("scores")
                              .where("mode", "==", mode)
                              .orderBy("score", "desc")
                              .get();
                            const scoresList = snap.docs.map(d => d.data());
                            const position = scoresList.findIndex(s =>
                              s.score === finalScore && s.user === (user || 'Guest')
                            );
                            if (position >= 0) setRank(position + 1);
                          } catch(e) { console.warn(e); }
                        }, 1200);

                        return tm;
                      });
                      return mv;
                    });
                  }
                  lockRef.current = false;
                  return newTiles;
                } else {
                  comboRef.current = 0;
                  setCombo(0);
                  // BUG FIX #1: SFX kontrolü doğru
                  if (settings.sfx) play('fail');
                  if (settings.vibration && navigator.vibrate) navigator.vibrate([30, 20, 30]);
                  setShake(next);
                  setTimeout(() => setShake(null), 400);
                  const reset = cur.map(t => next.includes(t.id) ? { ...t, flipped: false } : t);
                  lockRef.current = false;
                  return reset;
                }
              });
              setFlipped([]);
            }, 900);
          }
          return next;
        });
      }, [running, mode, play, user, settings.sfx, settings.vibration]);

      const cfg        = GRID_CONFIGS[mode];
      const totalPairs = cfg ? cfg.pairs : 0;
      const GAP        = (typeof window !== 'undefined' && window.innerWidth < 380) ? 6 : 5;
      const BOARD_PAD  = 8;
      const innerW     = Math.max(0, boardWidth - BOARD_PAD * 2);
      const tileW      = Math.max(22, Math.floor((innerW - GAP * (cfg.cols - 1)) / cfg.cols));

      const woodBg = {
        backgroundImage: "url('/wood_bg.png')",
        backgroundSize: 'cover',
        backgroundPosition: 'center',
        backgroundRepeat: 'no-repeat',
        backgroundColor: '#2b1a10',
      };

      return (
        <div style={{ minHeight: '100vh', width: '100%', maxWidth: 430, margin: '0 auto', ...woodBg,
          display: 'flex', flexDirection: 'column', alignItems: 'center',
          fontFamily: "'Segoe UI', sans-serif", userSelect: 'none', position: 'relative', overflow: 'hidden' }}>
          <style>{`
            .contentWrap { padding: 50px 46px 40px; }
            @media (max-width: 420px) {
              .contentWrap { padding: 44px 18px 32px; }
            }
            /* BUG FIX #4 CSS: "f\nrom" → "from" düzeltildi */
            @keyframes popIn {
              from { transform: scale(0.5); opacity: 0; }
              to   { transform: scale(1);   opacity: 1; }
            }
            @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }
            @keyframes matchPop { 0%{transform:scale(1)} 50%{transform:scale(1.18)} 100%{transform:scale(1)} }
            @keyframes comboBanner { 0%{transform:scaleX(0);opacity:0} 20%{transform:scaleX(1);opacity:1} 80%{opacity:1} 100%{opacity:0} }
            @keyframes cardSlideUp {
              from { transform: translateY(40px) scale(0.94); opacity:0; }
              to   { transform: translateY(0) scale(1); opacity:1; }
            }
            .shake-tile { animation: shake 0.35s ease; }
            .match-tile { animation: matchPop 0.5s ease; }
          `}</style>

          <div style={{ position: 'absolute', inset: 0, zIndex: 2, pointerEvents: 'none',
            background: 'radial-gradient(circle at 50% 30%, rgba(0,0,0,0.15), rgba(0,0,0,0.55))' }} />

          <div className="contentWrap" style={{ position: 'relative', zIndex: 5, width: '100%', minHeight: '100vh',
            boxSizing: 'border-box', display: 'flex', flexDirection: 'column', alignItems: 'center' }}>

            {/* MENU */}
            {screen === 'menu' && (
              <div style={{ width: '100%', display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
                <div style={{ width:'100%', position:'relative', display:'flex', justifyContent:'center', alignItems:'center', marginBottom:6 }}>
                  <h1 style={{ margin: 0, fontFamily: "'Georgia', serif", fontSize: 44, fontWeight: 900,
                    background: 'linear-gradient(160deg, #fff9c4 0%, #ffe066 40%, #ffb300 70%, #ff8f00 100%)',
                    WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent',
                    filter: 'drop-shadow(0 3px 6px rgba(0,0,0,0.8))', textAlign: 'center' }}>MindSharp</h1>
                  <button onClick={() => setShowSettings(true)} style={{
                    position:'absolute', right:0,
                    background:'rgba(0,0,0,0.35)',
                    border:'1px solid rgba(255,255,255,0.2)',
                    borderRadius:10, width:36, height:36,
                    display:'flex', alignItems:'center', justifyContent:'center',
                    cursor:'pointer', fontSize:18,
                  }}>⚙️</button>
                </div>
                <p style={{ color: '#fff', fontSize: 12, margin: '0 0 20px',
                  textShadow: '0 1px 6px rgba(0,0,0,0.9)', fontWeight: 700, letterSpacing: 2, textTransform: 'uppercase',
                  background: 'rgba(0,0,0,0.35)', padding: '3px 14px', borderRadius: 20, border: '1px solid rgba(255,255,255,0.15)' }}>
                  Memory and Focus Workout
                </p>

                {/* Preview Tiles */}
                <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'center', gap: 10, marginBottom: 22, height: 76 }}>
                  {PREVIEW_TILES.map((pt, idx) => {
                    const tw = 44, th = 63, ds = 13;
                    return (
                      <div key={idx} style={{ width: tw, height: th, borderRadius: 7,
                        background: 'linear-gradient(160deg, #FDFAF0 60%, #EDE5C8 100%)',
                        border: '1.5px solid #c8b98a',
                        boxShadow: '0 5px 12px rgba(0,0,0,0.5), inset 0 1px 2px rgba(255,255,255,0.9)',
                        display: 'flex', flexDirection: 'column', alignItems: 'center',
                        justifyContent: 'flex-start', paddingTop: 5, boxSizing: 'border-box',
                        transform: `rotate(${pt.rot}deg) translateY(${pt.y}px)`, flexShrink: 0 }}>
                        <span style={{ color: pt.color, fontWeight: 900, fontSize: 28, fontFamily: 'Georgia, serif', lineHeight: 1,
                          textShadow: '0 2px 4px rgba(0,0,0,0.2)', WebkitTextStroke: '0.5px rgba(0,0,0,0.15)' }}>{pt.number}</span>
                        <div style={{ flex: 1 }} />
                        <div style={{ width: ds, height: ds, borderRadius: '50%',
                          background: 'radial-gradient(circle at 40% 35%, #d8cfa8, #b8a870)',
                          boxShadow: 'inset 0 2px 4px rgba(0,0,0,0.35)',
                          display: 'flex', alignItems: 'center', justifyContent: 'center', marginBottom: 6 }}>
                          <span style={{ color: pt.color, fontSize: 7, lineHeight: 1 }}>♥</span>
                        </div>
                      </div>
                    );
                  })}
                </div>

                {/* Username section */}
                {user ? (
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                    background: 'rgba(0,0,0,0.3)', borderRadius: 10, padding: '8px 12px',
                    border: '1px solid rgba(200,169,110,0.3)', marginBottom: 10 }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'nowrap', minWidth: 0 }}>
                      <span style={{ color: '#ffe082', fontSize: 13, fontWeight: 700, whiteSpace: 'nowrap' }}>👤 {user}</span>
                      {(() => {
                        const s = loadStats(); const streak = getStreakCount(s.streak || []);
                        return streak > 0 ? (
                          <span style={{
                            color: 'rgba(255,224,130,0.6)', fontSize: 11, fontWeight: 700,
                            background: 'rgba(255,150,0,0.15)', borderRadius: 6,
                            padding: '2px 7px', whiteSpace: 'nowrap',
                          }}>🔥 {streak} day streak</span>
                        ) : null;
                      })()}
                    </div>
                    <button onClick={() => { setUser(''); try { localStorage.removeItem('memotiles_user'); } catch {} }}
                      style={{ background: 'none', border: '1px solid rgba(255,255,255,0.2)', borderRadius: 6,
                        color: 'rgba(255,255,255,0.45)', fontSize: 11, cursor: 'pointer',
                        padding: '3px 8px', whiteSpace: 'nowrap', flexShrink: 0, marginLeft: 8 }}>Change</button>
                  </div>
                ) : (
                  <div style={{ marginBottom: 10 }}>
                    <div style={{ color: 'rgba(255,224,130,0.6)', fontSize: 11, fontWeight: 700, marginBottom: 6, textAlign: 'center' }}>
                      Enter your name for the leaderboard
                    </div>
                    <div style={{ display: 'flex', gap: 7 }}>
                      <input
                        type="text"
                        value={tempUser}
                        onChange={e => setTempUser(e.target.value)}
                        onKeyDown={e => {
                          if (e.key === 'Enter' && tempUser.trim()) {
                            const n = tempUser.trim();
                            setUser(n);
                            try { localStorage.setItem('memotiles_user', n); } catch {}
                            setTempUser('');
                            showToast('✓ Name saved!');
                          }
                        }}
                        placeholder="Your name…"
                        maxLength={20}
                        className="ms-username-input"
                      />
                      <button
                        onClick={() => {
                          const n = tempUser.trim();
                          if (!n) return;
                          setUser(n);
                          try { localStorage.setItem('memotiles_user', n); } catch {}
                          setTempUser('');
                          showToast('✓ Name saved!');
                        }}
                        style={{
                          padding: '0 16px', borderRadius: 11, border: 'none',
                          background: tempUser.trim() ? 'linear-gradient(135deg,#f39c12,#e67e22)' : 'rgba(255,255,255,0.1)',
                          color: '#fff', fontWeight: 800, fontSize: 13, cursor: 'pointer',
                          flexShrink: 0, transition: 'background 0.2s',
                        }}
                      >Save</button>
                    </div>
                  </div>
                )}

                {/* Board seçimi — her zaman görünür */}
                <div style={{ width: '100%', display: 'flex', flexDirection: 'column', gap: 10 }}>
                  <div style={{ background: 'rgba(0,0,0,0.4)', borderRadius: 16, padding: 15, border: '1px solid rgba(255,255,255,0.15)' }}>
                    <p style={{ color: '#ffe082', fontWeight: 800, margin: '0 0 10px', textAlign: 'center', fontSize: 14 }}>Select Board</p>
                    {Object.entries(GRID_CONFIGS).map(([key, val]) => (
                      <button key={key} onClick={() => setMode(key)} style={{
                        width: '100%', padding: '12px 14px', marginBottom: 7, borderRadius: 10,
                        border: `2px solid ${mode === key ? '#ffb300' : 'rgba(255,255,255,0.2)'}`,
                        background: mode === key ? 'linear-gradient(135deg,#f39c12,#e67e22)' : 'rgba(255,255,255,0.1)',
                        color: '#fff', fontWeight: 700, fontSize: 14, cursor: 'pointer',
                        display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                        boxShadow: mode === key ? '0 4px 14px rgba(243,156,18,0.4)' : 'none',
                      }}>
                        <span>{val.label}</span>
                        <span style={{ fontSize: 11, background: 'rgba(0,0,0,0.25)', borderRadius: 6, padding: '2px 8px' }}>{val.difficulty}</span>
                      </button>
                    ))}
                  </div>
                  <button onClick={() => startGame(mode)} style={{ width: '100%', padding: '15px', borderRadius: 14, border: 'none',
                    background: 'linear-gradient(135deg,#27ae60,#2ecc71)', color: '#fff', fontWeight: 800, fontSize: 17, cursor: 'pointer',
                    boxShadow: '0 5px 18px rgba(46,204,113,0.4)' }}>▶ Start Game</button>
                  <div style={{ display:'flex', gap:8 }}>
                    <button onClick={() => setScreen('scores')} style={{ flex:1, padding: '12px', borderRadius: 14,
                      border: '2px solid rgba(255,255,255,0.3)', background: 'rgba(0,0,0,0.3)',
                      color: '#fff', fontWeight: 700, fontSize: 14, cursor: 'pointer' }}>🏆 Scores</button>
                    <button onClick={() => setScreen('profile')} style={{ flex:1, padding: '12px', borderRadius: 14,
                      border: '2px solid rgba(255,255,255,0.3)', background: 'rgba(0,0,0,0.3)',
                      color: '#fff', fontWeight: 700, fontSize: 14, cursor: 'pointer' }}>👤 Profile</button>
                  </div>
                </div>
              </div>
            )}

            {/* PROFILE */}
            {screen === 'profile' && (
              <ProfileScreen
                user={user}
                scores={scores}
                onBack={() => setScreen('menu')}
              />
            )}

            {/* SCORES */}
            {screen === 'scores' && (
              <div style={{ width: '100%', display: 'flex', flexDirection: 'column', gap: 10 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 4 }}>
                  <button onClick={() => setScreen('menu')} style={{ background: 'rgba(0,0,0,0.35)', border: '1px solid rgba(255,255,255,0.2)',
                    color: '#ffe082', borderRadius: 10, padding: '7px 13px', cursor: 'pointer', fontSize: 16 }}>←</button>
                  <h2 style={{ color: '#ffe082', fontFamily: 'Georgia,serif', margin: 0, fontSize: 20,
                    textShadow: '0 2px 6px rgba(0,0,0,0.8)' }}>🏆 High Scores</h2>
                </div>
                <div style={{ background: 'rgba(0,0,0,0.5)', borderRadius: 16, padding: '14px 10px',
                  border: '1px solid rgba(255,255,255,0.15)', backdropFilter: 'blur(4px)' }}>
                  <ScoreBoard
                    scores={scores}
                    sortBy={sortBy}
                    onSortChange={setSortBy}
                    activeCategory={scoreCategory}
                    onCategoryChange={setScoreCategory}
                    // BUG FIX #4: Firebase'den de siliniyor artık
                    onClearCategory={async (cat) => {
                      await clearScoresFromCloud(cat);
                      setScores(prev => prev.filter(s => s.mode !== cat));
                    }}
                  />
                </div>
              </div>
            )}

            {/* GAME */}
            {screen === 'game' && (
              <div style={{ width: '100%', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8 }}>
                <div style={{ width: '100%', padding: '8px 12px', display: 'flex', alignItems: 'center',
                  justifyContent: 'space-between', background: 'rgba(0,0,0,0.4)', borderRadius: 10 }}>
                  <button onClick={() => { if (running || moves > 0) setShowExitConfirm(true); else { setRunning(false); setScreen('menu'); } }}
                    style={{ background: 'none', border: 'none', color: '#ffe082', fontSize: 20, cursor: 'pointer', padding: '0 4px' }}>←</button>
                  <div style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
                    <div style={{ textAlign: 'center' }}>
                      <div style={{ color: '#ffe082', fontWeight: 900, fontSize: 16 }}>{score.toLocaleString()}</div>
                      <div style={{ color: '#c8a96e', fontSize: 9, letterSpacing: 0.5 }}>SCORE</div>
                    </div>
                    <div style={{ width: 1, background: '#7a5c2e' }} />
                    <div style={{ textAlign: 'center' }}>
                      <div style={{ color: '#f5d78e', fontWeight: 800, fontSize: 16 }}>{moves}</div>
                      <div style={{ color: '#c8a96e', fontSize: 9 }}>MOVES</div>
                    </div>
                    <div style={{ width: 1, background: '#7a5c2e' }} />
                    <div style={{ textAlign: 'center' }}>
                      <div style={{ color: '#f5d78e', fontWeight: 800, fontSize: 16 }}>{formatTime(time)}</div>
                      <div style={{ color: '#c8a96e', fontSize: 9 }}>TIME</div>
                    </div>
                    <div style={{ width: 1, background: '#7a5c2e' }} />
                    <div style={{ textAlign: 'center' }}>
                      <div style={{ color: '#f5d78e', fontWeight: 800, fontSize: 16 }}>{matched}/{totalPairs}</div>
                      <div style={{ color: '#c8a96e', fontSize: 9 }}>PAIRS</div>
                    </div>
                  </div>
                  <button onClick={() => startGame(mode)}
                    style={{ background: 'none', border: 'none', color: '#ffe082', fontSize: 20, cursor: 'pointer', padding: '0 4px' }}>↺</button>
                </div>

                {/* Progress bar */}
                <div style={{ width: '100%', height: 4, background: 'rgba(255,255,255,0.1)', borderRadius: 2 }}>
                  <div style={{ height: '100%', background: 'linear-gradient(90deg,#27ae60,#2ecc71)',
                    width: `${(matched/totalPairs)*100}%`, transition: 'width 0.4s ease', borderRadius: 2 }} />
                </div>

                {/* Combo banner */}
                {combo >= 2 && (
                  <div style={{ width: '100%', padding: '4px 0', textAlign: 'center',
                    background: combo >= 3 ? 'linear-gradient(90deg,rgba(243,156,18,0.9),rgba(230,126,34,0.9))' : 'linear-gradient(90deg,rgba(39,174,96,0.85),rgba(46,204,113,0.85))',
                    color: '#fff', fontWeight: 900, fontSize: combo >= 3 ? 14 : 12, letterSpacing: 1,
                    animation: 'comboBanner 0.4s ease' }}>
                    {combo >= 3 ? `🔥 COMBO x${combo} — AMAZING!` : `⚡ Combo x${combo}!`}
                  </div>
                )}

                {/* Hint */}
                <div className={"ms-hint" + (showHint ? "" : " hide")}>
                  Match all pairs with minimum moves and maximum speed.
                </div>

                {/* Board */}
                <div ref={boardRef} style={{ padding: '8px', width: '100%', maxWidth: '100%',
                  boxSizing: 'border-box', overflow: 'hidden',
                  boxShadow: 'inset 0 2px 10px rgba(0,0,0,0.5)', borderRadius: 12, border: '2px solid rgba(90,54,32,0.6)' }}>
                  <div style={{ display: 'grid', gridTemplateColumns: `repeat(${cfg.cols}, ${tileW}px)`, gap: `${GAP}px`, justifyContent: 'center' }}>
                    {tiles.map(tile => (
                      <div key={tile.id} className={(shake && shake.includes(tile.id) ? 'shake-tile ' : '') + (matchAnim.includes(tile.id) ? 'match-tile' : '')}>
                        <Tile tile={tile} onClick={handleTile} size={tileW} />
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}
          </div>

          {won && (
            <WinModal
              moves={moves}
              time={time}
              mode={mode}
              score={score}
              comboBonus={comboBonus}
              rank={rank}
              user={user}
              scoreDocId={scoreDocId}
              onReplay={() => startGame(mode)}
              onMenu={() => { setWon(false); setScreen('menu'); }}
              onScores={() => { setWon(false); setScreen('scores'); }}
              onSaveName={(name) => {
                setUser(name);
                try { localStorage.setItem('memotiles_user', name); } catch {}
                showToast('✓ Name saved!');
              }}
            />
          )}
          {showSettings && (
            <SettingsModal
              onClose={() => setShowSettings(false)}
              settings={settings}
            />
          )}

          {showExitConfirm && (
            <ConfirmDialog
              title="Quit Game?"
              message="Your current progress will be lost. Are you sure you want to return to the menu?"
              confirmLabel="Quit"
              onConfirm={() => { setShowExitConfirm(false); setRunning(false); setWon(false); setScreen('menu'); }}
              onCancel={() => setShowExitConfirm(false)}
            />
          )}

          {toast && <div className="ms-toast">{toast}</div>}

          {showOnboarding && (
            <OnboardingModal
              onDone={() => setShowOnboarding(false)}
              playSound={play}
              sfxEnabled={settings.sfx}
            />
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    // Hide loader after React paints first frame
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        const loader = document.getElementById('ms-loader');
        if (loader) loader.style.display = 'none';
      });
    });
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js')
        .then(() => console.log('[SW] Registered'))
        .catch(err => console.warn('[SW] Failed:', err));
    }
  </script>
</body>
</html>
