<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>MindSharp — Memory & Focus Game</title>
  <meta name="description" content="Train your memory with MindSharp! Flip tiles, find matching pairs, beat the leaderboard." />
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#2b1a10" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png">
  <link rel="shortcut icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MindSharp" />
  <style>
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, -apple-system, Arial, sans-serif;
      background: #2b1a10 url("./wood_bg.png") center / cover no-repeat fixed;
      overflow-x: hidden;
    }
    body::before{
      content:"";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle at 50% 25%, rgba(0,0,0,0.10), rgba(0,0,0,0.58));
      z-index: 0;
    }
    #root{
      position: relative;
      z-index: 1;
      min-height: 100vh;
      width: 100%;
      max-width: 430px;
      margin: 0 auto;
    }
    body::after{
      content:"© 2026 Mendebur Studios. All rights reserved.";
      position: fixed;
      left: 0;
      right: 0;
      bottom: 10px;
      text-align: center;
      font-size: 12px;
      color: rgba(255, 224, 130, 0.75);
      text-shadow: 0 1px 2px rgba(0,0,0,0.6);
      z-index: 2;
      pointer-events: none;
      user-select: none;
    }
    /* BUG FIX #7: margin: 6 → 6px */
    .ms-hint {
      width: calc(100% - 24px);
      margin: 0px 12px 6px;
      padding: 8px 12px;
      border-radius: 12px;
      text-align: center;
      font-size: 16px;
      font-weight: 700;
      color: #ffffff;
      text-shadow: 0 0 12px rgba(255,255,255,0.6), 0 1px 3px rgba(0,0,0,0.8);
      background: rgba(0, 0, 0, 0.28);
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow: 0 8px 18px rgba(0,0,0,0.25);
      backdrop-filter: blur(4px);
      opacity: 1;
      transform: translateY(0);
      transition: opacity .35s ease, transform .35s ease;
      pointer-events: none;
      z-index: 50;
    }
    .ms-hint.hide {
      opacity: 0;
      transform: translateY(-6px);
    }
    /* Confirmation dialog */
    .ms-confirm-overlay {
      position: fixed; inset: 0; z-index: 700;
      background: rgba(0,0,0,0.65);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      animation: fadeIn 0.15s ease;
    }
    .ms-confirm-box {
      width: 100%; max-width: 300px;
      background: linear-gradient(160deg, #fdf8ec, #f5e6c3);
      border-radius: 20px; border: 2px solid #c8a96e;
      box-shadow: 0 20px 60px rgba(0,0,0,0.55);
      padding: 22px 20px 16px;
      text-align: center;
      animation: cardSlideUp 0.25s cubic-bezier(.22,1.2,.36,1);
    }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    /* Username input in menu */
    .ms-username-input {
      width: 100%; padding: 11px 14px; border-radius: 11px;
      border: 2px solid rgba(200,169,110,0.5);
      background: rgba(255,255,255,0.12);
      color: #fff; font-size: 14px; font-weight: 700;
      outline: none; box-sizing: border-box;
      backdrop-filter: blur(4px);
      transition: border-color 0.2s;
    }
    .ms-username-input::placeholder { color: rgba(255,224,130,0.45); }
    .ms-username-input:focus { border-color: #ffe082; }
    /* Toast notification */
    .ms-toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: rgba(39,174,96,0.95); color: #fff;
      padding: 10px 22px; border-radius: 30px;
      font-weight: 800; font-size: 13px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      z-index: 800; white-space: nowrap;
      animation: toastIn 0.3s cubic-bezier(.22,1.2,.36,1);
    }
    @keyframes toastIn {
      from { opacity:0; transform: translateX(-50%) translateY(20px) scale(0.9); }
      to   { opacity:1; transform: translateX(-50%) translateY(0) scale(1); }
    }
    /* Scrollbar styling */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 2px; }
    ::-webkit-scrollbar-thumb { background: rgba(200,169,110,0.5); border-radius: 2px; }
  </style>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
</head>
<body>
  <div id="root">
    <!-- Loading spinner shown while Babel compiles JSX (2-5 sec) -->
    <div id="ms-loader" style="
      position:fixed; inset:0; z-index:9999;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      gap:16px;
    ">
      <div style="
        width:52px; height:52px; border-radius:50%;
        border:4px solid rgba(200,169,110,0.2);
        border-top-color:#ffe082;
        animation:spin 0.9s linear infinite;
      "></div>
      <div style="color:#ffe082; font-family:Georgia,serif; font-size:22px; font-weight:900;
        text-shadow:0 2px 8px rgba(0,0,0,0.8);">MindSharp</div>
      <div style="color:rgba(255,224,130,0.55); font-size:12px; font-weight:600;">Loading…</div>

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <script>
    // Global error handler — shows friendly message if React/Babel crashes
    window.addEventListener('error', function(e) {
      const loader = document.getElementById('ms-loader');
      if (loader) {
        loader.innerHTML = `
          <div style="text-align:center;padding:24px;max-width:320px;">
            <div style="font-size:40px;margin-bottom:12px;">⚠️</div>
            <div style="color:#ffe082;font-family:Georgia,serif;font-size:20px;font-weight:900;margin-bottom:8px;">MindSharp</div>
            <div style="color:rgba(255,224,130,0.7);font-size:13px;line-height:1.6;margin-bottom:20px;">
              Yüklenirken bir hata oluştu.<br>Sayfayı yenilemeyi deneyin.
            </div>
            <button onclick="location.reload()" style="
              padding:12px 28px;border-radius:12px;border:none;
              background:linear-gradient(135deg,#f39c12,#e67e22);
              color:#fff;font-weight:800;font-size:14px;cursor:pointer;
            ">🔄 Yenile</button>
          </div>`;
      }
    });
  </script>
  <script type="text/babel">
    // === Firebase Init ===
    const firebaseConfig = {
      apiKey: ["AIzaSyBqtoU6Drecy", "hCvjYoWOtOcCyadNMDu5dY"].join(""),
      authDomain: "mindsharp-af404.firebaseapp.com",
      projectId: "mindsharp-af404",
      storageBucket: "mindsharp-af404.firebasestorage.app",
      messagingSenderId: "520056575924",
      appId: "1:520056575924:web:4aff3dbee97a38650cc4e1",
      measurementId: "G-9HCMNEQBF6"
    };
    let db = null;
    try {
      if (typeof firebase !== 'undefined') {
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        db = firebase.firestore();
        console.log("Firebase connected");
      } else {
        console.warn("Firebase not loaded — offline mode");
      }
    } catch (e) {
      console.warn("Firebase error:", e);
    }

    const { useState, useEffect, useCallback, useRef } = React;

    // ── STATS HELPERS ─────────────────────────────────────────
    function loadStats() {
      try {
        const s = localStorage.getItem('ms_stats');
        return s ? JSON.parse(s) : {
          totalGames: 0,
          totalWins: 0,
          bestScores: {},      // { '8x4': n, '8x5': n, '8x7': n }
          bestMoves: {},       // { mode: n }
          bestTime: {},        // { mode: n }
          totalMoves: 0,
          totalTime: 0,
          maxCombo: 0,
          streak: [],          // ['2025-03-01', ...] günlük oynama günleri
        };
      } catch { return { totalGames:0, totalWins:0, bestScores:{}, bestMoves:{}, bestTime:{}, totalMoves:0, totalTime:0, maxCombo:0, streak:[] }; }
    }

    function saveStats(stats) {
      try { localStorage.setItem('ms_stats', JSON.stringify(stats)); } catch {}
    }

    function recordGameStats({ mode, moves, time, score, comboBonus }) {
      const stats = loadStats();
      stats.totalGames = (stats.totalGames || 0) + 1;
      stats.totalWins  = (stats.totalWins  || 0) + 1;
      if (!stats.bestScores[mode] || score > stats.bestScores[mode]) stats.bestScores[mode] = score;
      if (!stats.bestMoves[mode]  || moves < stats.bestMoves[mode])  stats.bestMoves[mode]  = moves;
      if (!stats.bestTime[mode]   || time  < stats.bestTime[mode])   stats.bestTime[mode]   = time;
      stats.totalMoves = (stats.totalMoves || 0) + moves;
      stats.totalTime  = (stats.totalTime  || 0) + time;
      if (comboBonus > (stats.maxCombo || 0)) stats.maxCombo = comboBonus;
      // streak — bugünün tarihini ekle
      const today = new Date().toISOString().slice(0, 10);
      if (!stats.streak) stats.streak = [];
      if (!stats.streak.includes(today)) stats.streak.push(today);
      saveStats(stats);
      return stats;
    }

    function getStreakCount(streak) {
      if (!streak || streak.length === 0) return 0;
      const sorted = [...streak].sort().reverse();
      let count = 0;
      let cur = new Date();
      cur.setHours(0,0,0,0);
      for (const d of sorted) {
        const dd = new Date(d);
        dd.setHours(0,0,0,0);
        const diff = Math.round((cur - dd) / 86400000);
        if (diff === 0 || diff === count) { count++; cur = dd; }
        else break;
      }
      return count;
    }

    // ── ONBOARDING ────────────────────────────────────────────
    // Örnek taş verisi — görsel demo için
    const OB_PAIRS = [
      { number: 3, color: '#E8000A' },
      { number: 7, color: '#29B6F6' },
      { number: 3, color: '#E8000A' }, // eşi
      { number: 7, color: '#29B6F6' }, // eşi
    ];

    function ObTile({ number, color, flipped, matched, onClick, pulse }) {
      const s = 52, tileH = s * 1.45, dimple = s * 0.28;
      return (
        <div onClick={onClick} style={{
          width: s, height: tileH, perspective: 600, cursor: 'pointer', flexShrink: 0,
        }}>
          <div style={{
            width:'100%', height:'100%', position:'relative', transformStyle:'preserve-3d',
            transform: flipped ? 'rotateY(180deg)' : 'rotateY(0deg)',
            transition: 'transform 0.4s cubic-bezier(.4,2,.6,1)',
          }}>
            {/* Arka yüz */}
            <div style={{
              position:'absolute', width:'100%', height:'100%', backfaceVisibility:'hidden',
              borderRadius:8, background:'linear-gradient(160deg,#F8F3E2 60%,#EDE5C8 100%)',
              border:'2px solid #c8b98a', boxShadow:'0 4px 10px rgba(0,0,0,0.35)',
            }}/>
            {/* Ön yüz */}
            <div style={{
              position:'absolute', width:'100%', height:'100%', backfaceVisibility:'hidden',
              transform:'rotateY(180deg)', borderRadius:8,
              background: matched ? 'linear-gradient(160deg,#e8f5e9,#c8e6c9)' : 'linear-gradient(160deg,#FDFAF0 60%,#EDE5C8 100%)',
              border:`2px solid ${matched ? '#66bb6a' : color}`,
              boxShadow: matched
                ? `0 0 14px ${color}66, 0 4px 10px rgba(0,0,0,0.2)`
                : '0 5px 12px rgba(0,0,0,0.28)',
              display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'flex-start',
              paddingTop: s * 0.06, boxSizing:'border-box', overflow:'hidden',
            }}>
              <span style={{
                color, fontWeight:900, fontSize: s * 0.72, fontFamily:'Georgia,serif',
                lineHeight:1, textShadow:'0 2px 4px rgba(0,0,0,0.2)',
              }}>{number}</span>
              <div style={{ flex:1 }}/>
              <div style={{
                width: dimple * 1.08, height: dimple * 1.08, borderRadius:'50%',
                background:'radial-gradient(circle at 40% 35%,#d8cfa8,#b8a870)',
                display:'flex', alignItems:'center', justifyContent:'center', marginBottom: s * 0.11,
              }}>
                <span style={{ color, fontSize: dimple * 0.6, lineHeight:1 }}>♥</span>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function OnboardingModal({ onDone, playSound, sfxEnabled }) {
      const [demoStep, setDemoStep] = React.useState(0);
      const [audioUnlocked, setAudioUnlocked] = React.useState(false);
      const prevStepRef = React.useRef(0);

      // Unlock AudioContext on first tap anywhere on the modal
      const handleUnlockAudio = React.useCallback(() => {
        if (!audioUnlocked && sfxEnabled) {
          playSound('flip'); // silent unlock tap — very short, just opens the context
          setAudioUnlocked(true);
        }
      }, [audioUnlocked, sfxEnabled, playSound]);

      // step → tile states: [t0_flip, t0_match, t1_flip, t1_match, t2_flip, t2_match, t3_flip, t3_match]
      const tileStates = [
        [false,false, false,false, false,false, false,false], // 0 all closed
        [true, false, false,false, false,false, false,false], // 1 flip #1
        [true, false, true, false, false,false, false,false], // 2 flip #2 — wrong pair
        [false,false, false,false, false,false, false,false], // 3 close all
        [true, false, false,false, false,false, false,false], // 4 flip #1 again
        [true, true,  false,false, true, true,  false,false], // 5 match! pair A
        [true, true,  true, false, true, true,  false,false], // 6 flip #3
        [true, true,  true, true,  true, true,  true, true ], // 7 match! pair B — all done
        [true, true,  true, true,  true, true,  true, true ], // 8 hold → restart
      ];

      const delays = [900, 850, 950, 650, 850, 950, 850, 950, 1800];
      const shakeSteps = new Set([2]);

      // Ses çalma — hangi adımda ne çalacak
      const soundMap = {
        1: 'flip',
        2: 'flip',
        3: 'fail',
        4: 'flip',
        5: 'match',
        6: 'flip',
        7: 'match',
      };

      React.useEffect(() => {
        let t;
        const next = (step) => {
          t = setTimeout(() => {
            const nextStep = (step + 1) % delays.length;
            if (sfxEnabled && audioUnlocked && soundMap[nextStep]) {
              playSound(soundMap[nextStep]);
            }
            setDemoStep(nextStep);
            next(nextStep);
          }, delays[step]);
        };
        next(demoStep);
        return () => clearTimeout(t);
      }, [sfxEnabled, audioUnlocked]);

      const ts    = tileStates[demoStep] || tileStates[0];
      const tiles = [
        { number: OB_PAIRS[0].number, color: OB_PAIRS[0].color, flipped: ts[0], matched: ts[1] },
        { number: OB_PAIRS[1].number, color: OB_PAIRS[1].color, flipped: ts[2], matched: ts[3] },
        { number: OB_PAIRS[2].number, color: OB_PAIRS[2].color, flipped: ts[4], matched: ts[5] },
        { number: OB_PAIRS[3].number, color: OB_PAIRS[3].color, flipped: ts[6], matched: ts[7] },
      ];

      const wrongPair  = shakeSteps.has(demoStep);
      const allMatched = demoStep >= 7;
      const firstMatch = demoStep === 5 || demoStep === 6;

      const handleDone = () => {
        try { localStorage.setItem('ms_onboarded', '1'); } catch {}
        onDone();
      };

      return (
        <div onClick={handleUnlockAudio} style={{
          position:'fixed', inset:0, zIndex:600,
          background:'rgba(0,0,0,0.90)',
          display:'flex', alignItems:'center', justifyContent:'center',
          padding:20,
        }}>
          <style>{`
            @keyframes obIn {
              from { opacity:0; transform:scale(0.92) translateY(20px); }
              to   { opacity:1; transform:scale(1) translateY(0); }
            }
            @keyframes obShake {
              0%,100%{transform:translateX(0)}
              20%{transform:translateX(-6px)}
              40%{transform:translateX(6px)}
              60%{transform:translateX(-4px)}
              80%{transform:translateX(4px)}
            }
          `}</style>

          <div style={{
            width:'100%', maxWidth:340,
            background:'linear-gradient(160deg,#fdf8ec 0%,#fef5da 50%,#f5e6c3 100%)',
            borderRadius:28,
            border:'3px solid #c8a96e',
            boxShadow:'0 0 0 6px rgba(200,169,110,0.15), 0 32px 80px rgba(0,0,0,0.7)',
            overflow:'hidden',
            animation:'obIn 0.45s cubic-bezier(.22,1.2,.36,1)',
          }}>
            {/* Gold top bar */}
            <div style={{ height:5, background:'linear-gradient(90deg,#b8860b,#f0c040,#b8860b)' }}/>

            <div style={{ padding:'22px 24px 20px', textAlign:'center' }}>

              {/* Title */}
              <div style={{
                fontFamily:'Georgia,serif', fontSize:28, fontWeight:900,
                color:'#3d1a00',
                marginBottom:6,
                letterSpacing:-0.3,
              }}>How to Play</div>

              {/* Subtitle */}
              <div style={{
                fontSize:13, fontWeight:600, lineHeight:1.55,
                color:'rgba(70,35,5,0.60)',
                marginBottom:18,
              }}>
                Flip tiles — find the matching pair!
              </div>

              {/* ── LIVE DEMO ── */}
              <div style={{
                background:'rgba(43,26,16,0.55)',
                borderRadius:16,
                border:'2px solid rgba(200,169,110,0.3)',
                padding:'18px 12px 14px',
                marginBottom:16,
                position:'relative',
              }}>
                {/* DEMO watermark label */}
                <div style={{
                  position:'absolute', bottom:8, right:10,
                  background:'rgba(200,169,110,0.2)',
                  border:'1px solid rgba(200,169,110,0.35)',
                  color:'rgba(255,224,130,0.6)',
                  fontSize:9, fontWeight:800, letterSpacing:2,
                  padding:'2px 8px', borderRadius:6,
                  textTransform:'uppercase', pointerEvents:'none',
                }}>DEMO</div>

                {/* Status badge */}
                {wrongPair && (
                  <div style={{
                    position:'absolute', top:-13, left:'50%', transform:'translateX(-50%)',
                    background:'linear-gradient(135deg,#e74c3c,#c0392b)',
                    color:'#fff', fontWeight:800, fontSize:11,
                    padding:'3px 14px', borderRadius:20, whiteSpace:'nowrap',
                    boxShadow:'0 2px 8px rgba(231,76,60,0.5)',
                  }}>✗ Different color!</div>
                )}
                {firstMatch && (
                  <div style={{
                    position:'absolute', top:-13, left:'50%', transform:'translateX(-50%)',
                    background:'linear-gradient(135deg,#27ae60,#2ecc71)',
                    color:'#fff', fontWeight:800, fontSize:11,
                    padding:'3px 14px', borderRadius:20, whiteSpace:'nowrap',
                    boxShadow:'0 2px 8px rgba(46,204,113,0.5)',
                  }}>✓ Match!</div>
                )}
                {allMatched && (
                  <div style={{
                    position:'absolute', top:-13, left:'50%', transform:'translateX(-50%)',
                    background:'linear-gradient(135deg,#f39c12,#e67e22)',
                    color:'#fff', fontWeight:800, fontSize:11,
                    padding:'3px 14px', borderRadius:20, whiteSpace:'nowrap',
                    boxShadow:'0 2px 8px rgba(243,156,18,0.5)',
                  }}>🎉 All matched!</div>
                )}

                {/* Tile grid */}
                <div style={{
                  display:'grid', gridTemplateColumns:'repeat(4,52px)',
                  gap:8, justifyContent:'center',
                  animation: wrongPair ? 'obShake 0.4s ease' : 'none',
                }}>
                  {tiles.map((t, i) => (
                    <ObTile
                      key={i}
                      number={t.number}
                      color={t.color}
                      flipped={t.flipped}
                      matched={t.matched}
                    />
                  ))}
                </div>

                {/* Legend */}
                <div style={{
                  marginTop:12, display:'flex', justifyContent:'center', gap:16,
                }}>
                  {[
                    { color:'#E8000A', label:'3  ×  2' },
                    { color:'#29B6F6', label:'7  ×  2' },
                  ].map(({ color, label }) => (
                    <div key={color} style={{ display:'flex', alignItems:'center', gap:6 }}>
                      <div style={{
                        width:13, height:13, borderRadius:3,
                        background:color, flexShrink:0,
                        boxShadow:`0 0 6px ${color}88`,
                      }}/>
                      <span style={{ color:'rgba(255,224,130,0.65)', fontSize:11, fontWeight:700 }}>
                        {label}
                      </span>
                    </div>
                  ))}
                </div>
              </div>

              {/* Rule summary */}
              <div style={{
                display:'flex', justifyContent:'center', alignItems:'center', gap:8,
                marginBottom: audioUnlocked ? 20 : 8,
                padding:'10px 14px',
                background:'rgba(200,169,110,0.12)',
                borderRadius:12,
                border:'1px solid rgba(200,169,110,0.2)',
              }}>
                {[
                  { icon:'🔢', text:'Same number' },
                  { icon:'+', text:null },
                  { icon:'🎨', text:'Same color' },
                  { icon:'=', text:null },
                  { icon:'✅', text:'Match' },
                ].map((item, i) =>
                  item.text === null ? (
                    <div key={i} style={{ color:'rgba(200,169,110,0.6)', fontSize:14, fontWeight:900 }}>{item.icon}</div>
                  ) : (
                    <div key={i} style={{ textAlign:'center' }}>
                      <div style={{ fontSize:20 }}>{item.icon}</div>
                      <div style={{ fontSize:9, color:'rgba(80,40,10,0.6)', fontWeight:800, marginTop:2, whiteSpace:'nowrap' }}>{item.text}</div>
                    </div>
                  )
                )}
              </div>

              {/* Tap for sound nudge — only shown before audio unlocked */}
              {!audioUnlocked && sfxEnabled && (
                <div style={{
                  textAlign:'center', marginBottom:14,
                  color:'rgba(70,35,5,0.45)', fontSize:10, fontWeight:700,
                  letterSpacing:0.5,
                }}>🔊 Tap anywhere to enable sound</div>
              )}

              {/* CTA button */}
              <button onClick={handleDone} style={{
                width:'100%', padding:'16px 0', borderRadius:16, border:'none',
                background:'linear-gradient(135deg,#27ae60,#2ecc71)',
                color:'#fff', fontWeight:900, fontSize:18, cursor:'pointer',
                boxShadow:'0 6px 20px rgba(46,204,113,0.45)',
                letterSpacing:0.5,
              }}>▶ Let's Play!</button>

            </div>
          </div>
        </div>
      );

    function generateTiles(pairs, maxNum) {
      const colorCount = TILE_COLORS.length;
      const uniquePairs = [];
      for (let n = 1; n <= maxNum; n++) {
        for (let c = 0; c < colorCount; c++) {
          uniquePairs.push({ number: n, color: TILE_COLORS[c] });
        }
      }
      for (let i = uniquePairs.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [uniquePairs[i], uniquePairs[j]] = [uniquePairs[j], uniquePairs[i]];
      }
      const selected = uniquePairs.slice(0, pairs);
      const allTiles = [...selected, ...selected].map((p, idx) => ({
        id: idx, number: p.number, color: p.color, flipped: false, matched: false,
      }));
      for (let i = allTiles.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [allTiles[i], allTiles[j]] = [allTiles[j], allTiles[i]];
      }
      return allTiles;
    }

    function calcScore({ pairs, moves, time, comboBonus }) {
      const baseScore = pairs * 100;
      const movePenalty = Math.max(0, (moves - pairs) * 8);
      const timePenalty = Math.floor(time * 1.5);
      return Math.max(0, baseScore - movePenalty - timePenalty + comboBonus);
    }

    function useSound() {
      const ctx = useRef(null);
      const getCtx = () => {
        if (!ctx.current) { try { ctx.current = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {} }
        return ctx.current;
      };
      const play = (type) => {
        const ac = getCtx(); if (!ac) return;
        if (type === 'win') {
          [523,659,784,1047].forEach((f,i) => {
            const o2=ac.createOscillator(); const g2=ac.createGain();
            o2.connect(g2); g2.connect(ac.destination); o2.frequency.value=f;
            g2.gain.setValueAtTime(0.12,ac.currentTime+i*0.12);
            g2.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+i*0.12+0.3);
            o2.start(ac.currentTime+i*0.12); o2.stop(ac.currentTime+i*0.12+0.3);
          }); return;
        }
        if (type === 'combo3') {
          [523,659,784,880,1047].forEach((f,i) => {
            const o2=ac.createOscillator(); const g2=ac.createGain();
            o2.connect(g2); g2.connect(ac.destination);
            o2.type='sine'; o2.frequency.value=f;
            g2.gain.setValueAtTime(0.18,ac.currentTime+i*0.07);
            g2.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+i*0.07+0.25);
            o2.start(ac.currentTime+i*0.07); o2.stop(ac.currentTime+i*0.07+0.25);
          }); return;
        }
        if (type === 'combo') {
          [660,880].forEach((f,i) => {
            const o2=ac.createOscillator(); const g2=ac.createGain();
            o2.connect(g2); g2.connect(ac.destination);
            o2.type='sine'; o2.frequency.value=f;
            g2.gain.setValueAtTime(0.14,ac.currentTime+i*0.1);
            g2.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+i*0.1+0.25);
            o2.start(ac.currentTime+i*0.1); o2.stop(ac.currentTime+i*0.1+0.25);
          }); return;
        }
        const o = ac.createOscillator(); const g = ac.createGain();
        o.connect(g); g.connect(ac.destination);
        if (type === 'flip')  { o.frequency.value=440; g.gain.setValueAtTime(0.1,ac.currentTime); g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.1); }
        else if (type === 'match') { o.frequency.value=660; o.frequency.setValueAtTime(880,ac.currentTime+0.1); g.gain.setValueAtTime(0.15,ac.currentTime); g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.3); }
        else if (type === 'fail')  { o.frequency.value=220; g.gain.setValueAtTime(0.08,ac.currentTime); g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.2); }
        o.start(); o.stop(ac.currentTime+0.3);
      };
      return play;
    }

      const yr  = String(d.getFullYear()).slice(-2);
      return `${day}-${mon}-${yr}`;

      const needsName = !user || user.trim() === '';
      const displayName = needsName ? (nameSaved ? nameInput : 'You') : user;

      const handleSaveName = () => {
        const n = nameInput.trim();
        if (!n) return;
        onSaveName(n);
        // Also update the already-submitted cloud score document
        if (scoreDocId) updateScoreUsername(scoreDocId, n);
        setNameSaved(true);
      };

      React.useEffect(() => {
        const colors = ['#f39c12','#e74c3c','#2ecc71','#3498db','#9b59b6','#f1c40f','#1abc9c','#e67e22'];
        const shapes = ['■','●','▲','★','◆'];
        const pieces = Array.from({ length: 38 }, (_, i) => ({
          id: i,
          color: colors[Math.floor(Math.random() * colors.length)],
          shape: shapes[Math.floor(Math.random() * shapes.length)],
          left: Math.random() * 100,
          delay: Math.random() * 2.5,
          duration: 2.5 + Math.random() * 2,
          size: 8 + Math.random() * 10,
          rotate: Math.random() * 720,
        }));
        setConfetti(pieces);
      }, []);

      const getRankInfo = () => {
        if (!rank) return { label: 'Well Played!', color: '#95a5a6', bg: 'rgba(149,165,166,0.15)' };
        if (rank === 1) return { label: '👑 NEW RECORD!', color: '#f1c40f', bg: 'rgba(241,196,15,0.2)', glow: true };
        if (rank <= 3) return { label: '🥈 TOP 3 — Amazing!', color: '#e67e22', bg: 'rgba(230,126,34,0.18)' };
        if (rank <= 10) return { label: '⭐ Top 10 — Great Job!', color: '#27ae60', bg: 'rgba(39,174,96,0.15)' };
        return { label: `Rank #${rank}`, color: '#7f8c8d', bg: 'rgba(127,140,141,0.12)' };
      };
      const rankInfo = getRankInfo();

      const today = new Date();
      const dateStr = `${String(today.getDate()).padStart(2,'0')}-${String(today.getMonth()+1).padStart(2,'0')}-${today.getFullYear()}`;

      const buildCertificate = async () => {
        const W = 1080, H = 1920;
        const canvas = document.createElement('canvas');
        canvas.width = W; canvas.height = H;
        const ctx = canvas.getContext('2d');

        const bgImg = new Image();
        bgImg.crossOrigin = 'anonymous';
        bgImg.src = './wood_bg.png';
        await new Promise(r => { bgImg.onload = r; bgImg.onerror = r; });
        ctx.fillStyle = '#2b1a10';
        ctx.fillRect(0, 0, W, H);
        try {
          const r = Math.max(W / bgImg.width, H / bgImg.height);
          ctx.drawImage(bgImg, (W - bgImg.width*r)/2, (H - bgImg.height*r)/2, bgImg.width*r, bgImg.height*r);
        } catch(e) {}

        const vg = ctx.createRadialGradient(W/2, H*0.4, 50, W/2, H*0.4, H*0.7);
        vg.addColorStop(0, 'rgba(0,0,0,0.15)');
        vg.addColorStop(1, 'rgba(0,0,0,0.75)');
        ctx.fillStyle = vg;
        ctx.fillRect(0, 0, W, H);

        const cx = 60, cy = 180, cw = W-120, ch = H-380, cr = 48;
        const rr = (x,y,w,h,r) => {
          ctx.beginPath();
          ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
          ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
        };

        ctx.save();
        ctx.shadowColor = 'rgba(0,0,0,0.6)'; ctx.shadowBlur = 60; ctx.shadowOffsetY = 20;
        rr(cx,cy,cw,ch,cr);
        const cardGrad = ctx.createLinearGradient(cx, cy, cx, cy+ch);
        cardGrad.addColorStop(0, '#fdf6e3');
        cardGrad.addColorStop(0.5, '#fef9ed');
        cardGrad.addColorStop(1, '#f5e6c8');
        ctx.fillStyle = cardGrad; ctx.fill();
        ctx.restore();

        rr(cx,cy,cw,ch,cr);
        ctx.lineWidth = 10; ctx.strokeStyle = '#c8a96e'; ctx.stroke();
        rr(cx+14,cy+14,cw-28,ch-28,cr-8);
        ctx.lineWidth = 3; ctx.strokeStyle = 'rgba(200,169,110,0.5)'; ctx.stroke();

        const corners = [[cx+40,cy+40],[cx+cw-40,cy+40],[cx+40,cy+ch-40],[cx+cw-40,cy+ch-40]];
        corners.forEach(([x,y]) => {
          ctx.save();
          ctx.fillStyle = '#c8a96e'; ctx.font = 'bold 52px serif';
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.fillText('✦', x, y); ctx.restore();
        });

        ctx.save();
        ctx.textAlign='center';
        ctx.font = '900 96px Georgia, serif';
        const titleGrad = ctx.createLinearGradient(W/2-200, 0, W/2+200, 0);
        titleGrad.addColorStop(0,'#8B4513'); titleGrad.addColorStop(0.5,'#c8860a'); titleGrad.addColorStop(1,'#8B4513');
        ctx.fillStyle = titleGrad;
        ctx.shadowColor='rgba(0,0,0,0.2)'; ctx.shadowBlur=8;
        ctx.fillText('MindSharp', W/2, cy+130);
        ctx.restore();

        const bx=cx+80, by=cy+178, bw=cw-160, bh=68, br=12;
        rr(bx,by,bw,bh,br);
        const bannerG=ctx.createLinearGradient(bx,by,bx+bw,by);
        bannerG.addColorStop(0,'#b8860b'); bannerG.addColorStop(0.5,'#f0c040'); bannerG.addColorStop(1,'#b8860b');
        ctx.fillStyle=bannerG; ctx.fill();
        ctx.save();
        ctx.textAlign='center'; ctx.font='800 32px Segoe UI, Arial';
        ctx.fillStyle='#5a2d00';
        ctx.fillText('A C H I E V E M E N T', W/2, by+44);
        ctx.restore();

        if (rank) {
          const rankColor = rank===1?'#f1c40f':rank<=3?'#e67e22':rank<=10?'#27ae60':'#7f8c8d';
          const rankLabel = rank===1?'NEW RECORD!':rank<=3?'TOP 3 — Amazing!':rank<=10?`Top 10!`:`Rank #${rank}`;
          ctx.save();
          ctx.textAlign='center'; ctx.font='900 36px Segoe UI';
          ctx.fillStyle=rankColor;
          ctx.shadowColor='rgba(0,0,0,0.3)'; ctx.shadowBlur=6;
          ctx.fillText(rankLabel, W/2, cy+298);
          ctx.restore();
        }

        ctx.save();
        ctx.textAlign='center';
        ctx.font='700 36px Segoe UI, Arial'; ctx.fillStyle='rgba(100,60,10,0.8)';
        ctx.fillText('Congratulations!', W/2, cy+368);
        ctx.font='900 72px Segoe UI, Arial'; ctx.fillStyle='#3d1a00';
        ctx.shadowColor='rgba(0,0,0,0.15)'; ctx.shadowBlur=8;
        ctx.fillText((user||'Guest').trim(), W/2, cy+458);
        ctx.restore();

        ctx.save();
        ctx.strokeStyle='rgba(180,140,80,0.4)'; ctx.lineWidth=2;
        ctx.beginPath(); ctx.moveTo(cx+100,cy+492); ctx.lineTo(cx+cw-100,cy+492); ctx.stroke();
        ctx.restore();

        const spx=cx+70, spy=cy+524, spw=cw-140, sph=240, spr=28;
        rr(spx,spy,spw,sph,spr);
        ctx.save();
        ctx.shadowColor='rgba(200,120,0,0.4)'; ctx.shadowBlur=28; ctx.shadowOffsetY=10;
        const scoreG=ctx.createLinearGradient(spx,spy,spx+spw,spy+sph);
        scoreG.addColorStop(0,'#e67e22'); scoreG.addColorStop(1,'#c0392b');
        ctx.fillStyle=scoreG; ctx.fill();
        ctx.restore();
        rr(spx,spy,spw,sph,spr);
        ctx.lineWidth=3; ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.stroke();
        ctx.save();
        ctx.textAlign='center';
        ctx.font='800 28px Segoe UI'; ctx.fillStyle='rgba(255,255,255,0.85)';
        ctx.fillText('S C O R E', W/2, spy+60);
        ctx.font='900 148px Segoe UI, Arial'; ctx.fillStyle='#fff';
        ctx.shadowColor='rgba(0,0,0,0.3)'; ctx.shadowBlur=12;
        ctx.fillText(score.toLocaleString(), W/2, spy+190);
        ctx.restore();
        if (comboBonus>0) {
          ctx.save();
          ctx.textAlign='center'; ctx.font='700 30px Segoe UI'; ctx.fillStyle='rgba(255,255,200,0.9)';
          ctx.fillText(`🔥 +${comboBonus} Combo Bonus`, W/2, spy+228);
          ctx.restore();
        }

        const statsY=cy+820;
        const cols3=[
          { label:'MOVES', value:moves, color:'#e74c3c' },
          { label:'TIME',  value:formatTime(time), color:'#3498db' },
          { label:'RANK',  value:rank?`#${rank}`:'-', color:rank===1?'#f1c40f':rank<=3?'#e67e22':'#27ae60' },
        ];
        const colW=(cw-140)/3;
        cols3.forEach((col,i) => {
          const colX=cx+70+i*(colW)+colW/2;
          if(i>0){ ctx.save(); ctx.strokeStyle='rgba(180,140,80,0.35)'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(cx+70+i*colW,statsY-30); ctx.lineTo(cx+70+i*colW,statsY+140); ctx.stroke(); ctx.restore(); }
          ctx.save();
          ctx.textAlign='center';
          ctx.font='700 26px Segoe UI'; ctx.fillStyle='rgba(100,60,10,0.6)';
          ctx.fillText(col.label, colX, statsY);
          ctx.font='900 72px Segoe UI, Arial'; ctx.fillStyle=col.color;
          ctx.shadowColor='rgba(0,0,0,0.15)'; ctx.shadowBlur=6;
          ctx.fillText(col.value, colX, statsY+90);
          ctx.restore();
        });

        ctx.save();
        ctx.strokeStyle='rgba(180,140,80,0.3)'; ctx.lineWidth=2;
        ctx.beginPath(); ctx.moveTo(cx+100,statsY+160); ctx.lineTo(cx+cw-100,statsY+160); ctx.stroke();
        ctx.textAlign='center'; ctx.font='600 28px Segoe UI'; ctx.fillStyle='rgba(100,60,10,0.55)';
        ctx.fillText(`✦  ${dateStr}  ✦`, W/2, statsY+210);
        ctx.restore();

        ctx.save();
        ctx.textAlign='center'; ctx.font='italic 700 28px Georgia, serif';
        ctx.fillStyle='rgba(100,60,10,0.65)';
        ctx.fillText('"Train your mind — 1 minute a day."', W/2, statsY+278);
        ctx.restore();

        ctx.save();
        ctx.textAlign='center'; ctx.font='700 26px Segoe UI'; ctx.fillStyle='rgba(100,60,10,0.5)';
        ctx.fillText('mindsharpgame.netlify.app', W/2, H-100);
        ctx.restore();

        const confColors=['#f39c12','#e74c3c','#2ecc71','#3498db','#9b59b6','#f1c40f'];
        for(let i=0;i<60;i++){
          ctx.save(); ctx.fillStyle=confColors[i%confColors.length]; ctx.globalAlpha=0.65;
          ctx.fillRect(Math.random()*W, cy+Math.random()*160, 8+Math.random()*10, 4+Math.random()*6);
          ctx.restore();
        }

        return canvas.toDataURL('image/png');
      };

      const handleShare = async () => {
        try {
          setSharing(true);
          const dataUrl = await buildCertificate();
          const res = await fetch(dataUrl);
          const blob = await res.blob();
          const file = new File([blob], 'mindsharp-certificate.png', { type:'image/png' });
          if (navigator.share && navigator.canShare && navigator.canShare({ files:[file] })) {
            await navigator.share({ title:'MindSharp Certificate', text:`I scored ${score.toLocaleString()} on MindSharp! 🧠`, files:[file] });
            return;
          }
          const a = document.createElement('a');
          a.href = dataUrl; a.download = 'mindsharp-certificate.png';
          document.body.appendChild(a); a.click(); a.remove();
        } catch(e) { console.warn(e); }
        finally { setSharing(false); }
      };

      const diffLabel = GRID_CONFIGS[mode]?.difficulty || mode;

      return (
        <div style={{
          position:'fixed', inset:0, zIndex:200,
          background:'rgba(0,0,0,0.72)',
          display:'flex', alignItems:'center', justifyContent:'center',
          overflowY:'auto', padding:'12px 0',
        }}>
          <style>{`
            @keyframes confettiFall {
              0%   { transform: translateY(-20px) rotate(0deg); opacity:1; }
              100% { transform: translateY(380px) rotate(var(--rot)); opacity:0; }
            }
            @keyframes cardSlideUp {
              from { transform: translateY(40px) scale(0.94); opacity:0; }
              to   { transform: translateY(0) scale(1); opacity:1; }
            }
            @keyframes scorePop {
              0%   { transform: scale(0.6); opacity:0; }
              70%  { transform: scale(1.08); }
              100% { transform: scale(1); opacity:1; }
            }
            @keyframes rankGlow {
              0%,100% { box-shadow: 0 0 8px currentColor; }
              50%     { box-shadow: 0 0 22px currentColor, 0 0 40px rgba(241,196,15,0.4); }
            }
            @keyframes shimmer {
              0%   { background-position: -200% center; }
              100% { background-position: 200% center; }
            }
          `}</style>

          {confetti.map(p => (
            <div key={p.id} style={{
              position:'fixed',
              left:`${p.left}%`, top:'-10px',
              color:p.color, fontSize:p.size,
              animation:`confettiFall ${p.duration}s ${p.delay}s ease-in forwards`,
              '--rot':`${p.rotate}deg`,
              pointerEvents:'none', zIndex:300, userSelect:'none',
            }}>{p.shape}</div>
          ))}

          <div style={{
            position:'relative',
            width:'92%', maxWidth:360,
            background:'linear-gradient(160deg, #fdf8ec 0%, #fef5da 50%, #f5e6c3 100%)',
            borderRadius:24,
            border:'3px solid #c8a96e',
            boxShadow:'0 0 0 6px rgba(200,169,110,0.2), 0 24px 64px rgba(0,0,0,0.55)',
            animation:'cardSlideUp 0.45s cubic-bezier(.22,1.2,.36,1) both',
            overflow:'hidden',
          }}>
            <div style={{ position:'absolute', inset:8, borderRadius:18, border:'1.5px solid rgba(200,169,110,0.35)', pointerEvents:'none', zIndex:1 }}/>

            {[
              { top:14, left:14 }, { top:14, right:14 },
              { bottom:14, left:14 }, { bottom:14, right:14 }
            ].map((pos,i) => (
              <div key={i} style={{ position:'absolute', ...pos, color:'#c8a96e', fontSize:18, pointerEvents:'none', zIndex:2 }}>✦</div>
            ))}

            <div style={{ padding:'20px 18px 16px', position:'relative', zIndex:3 }}>
              <div style={{ textAlign:'center', marginBottom:8 }}>
                <div style={{ fontSize:34, marginBottom:2 }}>🎉</div>
                <h2 style={{
                  margin:'0 0 4px', fontFamily:'Georgia, serif', fontSize:28, fontWeight:900,
                  background:'linear-gradient(135deg, #7a3e00 0%, #c8860a 50%, #7a3e00 100%)',
                  backgroundSize:'200% auto',
                  WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent',
                  animation:'shimmer 3s linear infinite',
                }}>MindSharp</h2>
                <div style={{
                  display:'inline-block',
                  background:'linear-gradient(90deg, #b8860b, #f0c040, #b8860b)',
                  borderRadius:20, padding:'2px 14px',
                }}>
                  <span style={{ fontSize:9, fontWeight:800, color:'#5a2d00', letterSpacing:2 }}>A C H I E V E M E N T</span>
                </div>
              </div>

              {rank && (
                <div style={{
                  textAlign:'center', marginBottom:8,
                  background:rankInfo.bg,
                  border:`1.5px solid ${rankInfo.color}`,
                  borderRadius:12, padding:'5px 12px',
                  animation: rank===1 ? 'rankGlow 1.8s ease infinite' : 'none',
                }}>
                  <span style={{ color:rankInfo.color, fontWeight:900, fontSize:13 }}>{rankInfo.label}</span>
                </div>
              )}

              <div style={{ textAlign:'center', marginBottom:10 }}>
                <div style={{ color:'rgba(100,60,10,0.65)', fontSize:11, fontWeight:700 }}>Congratulations!</div>

                {/* İsim yoksa küçük input göster */}
                {needsName && !nameSaved ? (
                  <div style={{ marginTop:6, marginBottom:2 }}>
                    <div style={{ color:'rgba(100,60,10,0.55)', fontSize:11, marginBottom:6 }}>
                      Save your score — enter a name:
                    </div>
                    <div style={{ display:'flex', gap:6 }}>
                      <input
                        type="text"
                        value={nameInput}
                        onChange={e => setNameInput(e.target.value)}
                        onKeyDown={e => e.key === 'Enter' && handleSaveName()}
                        placeholder="Your name…"
                        maxLength={20}
                        autoFocus
                        style={{
                          flex:1, padding:'8px 10px', borderRadius:9,
                          border:'1.5px solid #c8a96e',
                          background:'rgba(255,255,255,0.9)',
                          fontSize:14, fontWeight:700, color:'#3d1a00',
                          outline:'none', textAlign:'center',
                        }}
                      />
                      <button onClick={handleSaveName} style={{
                        padding:'8px 12px', borderRadius:9, border:'none',
                        background:'linear-gradient(135deg,#f39c12,#e67e22)',

                        flexShrink:0,
                      }}>Save</button>
                    </div>
                    <div
                      onClick={() => { setNameSaved(true); }}
                      style={{ color:'rgba(120,80,20,0.4)', fontSize:10, marginTop:6, cursor:'pointer', textDecoration:'underline' }}

                      Skip for now

                  </div>
                ) : (
                  <div style={{ color:'#3d1a00', fontWeight:900, fontSize:19, fontFamily:'Georgia, serif' }}>
                    {displayName}
                  </div>
                )}

                <div style={{ color:'rgba(120,80,20,0.55)', fontSize:10, marginTop:1 }}>{diffLabel} Board</div>
              </div>

              <div style={{
                background:'linear-gradient(135deg, #e67e22, #c0392b)',
                borderRadius:14, padding:'10px 0 8px',
                textAlign:'center',
                boxShadow:'0 6px 20px rgba(200,80,20,0.38)',
                marginBottom:10,
                animation:'scorePop 0.5s 0.2s cubic-bezier(.22,1.2,.36,1) both',
              }}>
                <div style={{ color:'rgba(255,255,255,0.85)', fontSize:9, fontWeight:800, letterSpacing:2 }}>S C O R E</div>
                <div style={{ color:'#fff', fontSize:40, fontWeight:900, lineHeight:1.05, textShadow:'0 2px 8px rgba(0,0,0,0.25)' }}>
                  {score.toLocaleString()}
                </div>
                {comboBonus>0 && (
                  <div style={{ color:'rgba(255,255,200,0.9)', fontSize:10, marginTop:2, fontWeight:700 }}>
                    🔥 +{comboBonus} Combo Bonus
                  </div>
                )}
              </div>

              <div style={{
                display:'flex', justifyContent:'center',
                background:'rgba(200,169,110,0.12)',
                borderRadius:12, padding:'8px 0',
                marginBottom:10,
                border:'1px solid rgba(200,169,110,0.25)',
              }}>
                {[
                  { label:'MOVES', value:moves, color:'#e74c3c' },
                  { label:'TIME',  value:formatTime(time), color:'#2980b9' },
                  { label:'RANK',  value:rank?`#${rank}`:'-',
                    color:rank===1?'#f1c40f':rank<=3?'#e67e22':rank<=10?'#27ae60':'#7f8c8d' },
                ].map((s,i) => (
                  <React.Fragment key={s.label}>
                    {i>0 && <div style={{ width:1, background:'rgba(200,169,110,0.4)', margin:'0 4px' }}/>}
                    <div style={{ flex:1, textAlign:'center' }}>
                      <div style={{ fontSize:9, color:'rgba(100,60,10,0.55)', fontWeight:700, marginBottom:1 }}>{s.label}</div>
                      <div style={{
                        fontSize:19, fontWeight:900, color:s.color,
                        textShadow: s.label==='RANK'&&rank===1 ? '0 0 10px rgba(241,196,15,0.7)' : 'none',
                      }}>{s.value}</div>
                    </div>
                  </React.Fragment>
                ))}
              </div>

              <div style={{ textAlign:'center', color:'rgba(120,80,20,0.5)', fontSize:10, marginBottom:10, fontWeight:600 }}>
                ✦ {dateStr} ✦
              </div>

              <div style={{ display:'flex', gap:7, marginBottom:7 }}>
                <button onClick={onScores} style={{
                  flex:1, padding:'9px 0', borderRadius:11, border:'none',
                  background:'linear-gradient(135deg,#2980b9,#3498db)',
                  color:'#fff', fontWeight:800, fontSize:12, cursor:'pointer',
                  boxShadow:'0 3px 10px rgba(52,152,219,0.35)',
                }}>🏆 High Scores</button>
                <button onClick={handleShare} disabled={sharing} style={{
                  flex:1, padding:'9px 0', borderRadius:11, border:'none',
                  background:sharing?'rgba(230,126,34,0.5)':'linear-gradient(135deg,#f39c12,#e67e22)',
                  color:'#fff', fontWeight:800, fontSize:12, cursor:'pointer',
                  boxShadow:'0 3px 10px rgba(230,126,34,0.35)',
                }}>{sharing?'⏳ Wait...':'📤 Share'}</button>
              </div>
              <div style={{ display:'flex', gap:7, marginBottom:8 }}>
                <button onClick={onMenu} style={{
                  flex:1, padding:'9px 0', borderRadius:11,
                  border:'2px solid #c8a96e', background:'transparent',
                  color:'#7a5c2e', fontWeight:800, fontSize:12, cursor:'pointer',
                }}>← Menu</button>
                <button onClick={onReplay} style={{
                  flex:1, padding:'9px 0', borderRadius:11, border:'none',
                  background:'linear-gradient(135deg,#27ae60,#2ecc71)',
                  color:'#fff', fontWeight:800, fontSize:12, cursor:'pointer',
                  boxShadow:'0 3px 10px rgba(46,204,113,0.35)',
                }}>▶ Play Again</button>
              </div>

              <div style={{ textAlign:'center', fontSize:9, color:'rgba(120,80,20,0.45)', fontStyle:'italic' }}>
                Share your certificate to challenge friends ✨
              </div>
            </div>
          </div>
        </div>
      );
    }

    function useSettings() {
      const load = (key, def) => {
        try { const v = localStorage.getItem('ms_' + key); return v === null ? def : JSON.parse(v); }
        catch { return def; }
      };
      const [sfx,       setSfxRaw]       = React.useState(() => load('sfx', true));
      const [music,     setMusicRaw]     = React.useState(() => load('music', false));
      const [vibration, setVibrationRaw] = React.useState(() => load('vibration', false));
      const save = (key, val) => { try { localStorage.setItem('ms_' + key, JSON.stringify(val)); } catch {} };

      const setSfx       = v => { setSfxRaw(v);       save('sfx', v); };
      const setMusic     = v => { setMusicRaw(v);     save('music', v); };
      const setVibration = v => { setVibrationRaw(v); save('vibration', v); };

      return { sfx, setSfx, music, setMusic, vibration, setVibration };
    }
