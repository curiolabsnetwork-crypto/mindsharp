    const { useState, useEffect, useCallback, useRef } = React;

    const TILE_COLORS = ['#E8000A', '#29B6F6', '#F9A825', '#212121'];
    const GRID_CONFIGS = {
      '8x4':  { rows: 4, cols: 8,  pairs: 16, maxNum: 4,  label: '32 Tiles (8×4)',  difficulty: 'Easy'      },

    const PREVIEW_TILES = [
      { color: '#E8000A', number: 1, rot: -8,  y:  4 },
      { color: '#29B6F6', number: 4, rot:  4,  y: -6 },
      { color: '#F9A825', number: 7, rot: -5,  y:  8 },
      { color: '#212121', number: 9, rot:  7,  y: -3 },
    ];

    function generateTiles(pairs, maxNum) {
      const colorCount = TILE_COLORS.length;
      const uniquePairs = [];
      for (let n = 1; n <= maxNum; n++) {
        for (let c = 0; c < colorCount; c++) {
          uniquePairs.push({ number: n, color: TILE_COLORS[c] });
        }
      }
      for (let i = uniquePairs.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [uniquePairs[i], uniquePairs[j]] = [uniquePairs[j], uniquePairs[i]];
      }
      const selected = uniquePairs.slice(0, pairs);
      const allTiles = [...selected, ...selected].map((p, idx) => ({
        id: idx, number: p.number, color: p.color, flipped: false, matched: false,
      }));
      for (let i = allTiles.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [allTiles[i], allTiles[j]] = [allTiles[j], allTiles[i]];
      }
      return allTiles;
    }

    function calcScore({ pairs, moves, time, comboBonus }) {
      const baseScore = pairs * 100;
      const movePenalty = Math.max(0, (moves - pairs) * 8);
      const timePenalty = Math.floor(time * 1.5);
      return Math.max(0, baseScore - movePenalty - timePenalty + comboBonus);
    }

    async function submitScoreToCloud({ user, mode, moves, time, score }) {
      if (!db) return;
      try {
        await db.collection("scores").add({
          user: user || "Guest",
          mode,
          moves,
          time,
          score,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        console.log("Score sent to cloud");
      } catch (e) {
        console.warn("Cloud submit failed:", e);
      }
    }

    async function fetchScoresFromCloud(mode) {
      if (!db) return [];
      try {
        const snap = await db
          .collection("scores")
          .where("mode", "==", mode)
          .orderBy("score", "desc")
          .limit(50)
          .get();
        return snap.docs.map(d => d.data());
      } catch (e) {
        console.warn("Fetch failed:", e);
        return [];
      }
    }

    function useSound() {
      const ctx = useRef(null);
      const getCtx = () => {
        if (!ctx.current) { try { ctx.current = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {} }
        return ctx.current;
      };
      const play = (type) => {
        const ac = getCtx(); if (!ac) return;
        if (type === 'win') {
          [523,659,784,1047].forEach((f,i) => {
            const o2=ac.createOscillator(); const g2=ac.createGain();
            o2.connect(g2); g2.connect(ac.destination); o2.frequency.value=f;
            g2.gain.setValueAtTime(0.12,ac.currentTime+i*0.12);
            g2.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+i*0.12+0.3);
            o2.start(ac.currentTime+i*0.12); o2.stop(ac.currentTime+i*0.12+0.3);
          }); return;
        }
        if (type === 'combo3') {
          [523,659,784,880,1047].forEach((f,i) => {
            const o2=ac.createOscillator(); const g2=ac.createGain();
            o2.connect(g2); g2.connect(ac.destination);
            o2.type='sine'; o2.frequency.value=f;
            g2.gain.setValueAtTime(0.18,ac.currentTime+i*0.07);
            g2.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+i*0.07+0.25);
            o2.start(ac.currentTime+i*0.07); o2.stop(ac.currentTime+i*0.07+0.25);
          }); return;
        }
        if (type === 'combo') {
          [660,880].forEach((f,i) => {
            const o2=ac.createOscillator(); const g2=ac.createGain();
            o2.connect(g2); g2.connect(ac.destination);
            o2.type='sine'; o2.frequency.value=f;
            g2.gain.setValueAtTime(0.14,ac.currentTime+i*0.1);
            g2.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+i*0.1+0.25);
            o2.start(ac.currentTime+i*0.1); o2.stop(ac.currentTime+i*0.1+0.25);
          }); return;
        }
        const o = ac.createOscillator(); const g = ac.createGain();
        o.connect(g); g.connect(ac.destination);
        if (type === 'flip')  { o.frequency.value=440; g.gain.setValueAtTime(0.1,ac.currentTime); g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.1); }
        else if (type === 'match') { o.frequency.value=660; o.frequency.setValueAtTime(880,ac.currentTime+0.1); g.gain.setValueAtTime(0.15,ac.currentTime); g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.3); }
        else if (type === 'fail')  { o.frequency.value=220; g.gain.setValueAtTime(0.08,ac.currentTime); g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.2); }
        o.start(); o.stop(ac.currentTime+0.3);
      };
      return play;
    }

    function formatTime(s) { const m = Math.floor(s/60); return `${m}:${String(s%60).padStart(2,'0')}`; }

    function formatDate(ts) {
      if (!ts) return "-";
      const d = ts.toDate ? ts.toDate() : new Date(ts);
      const day = String(d.getDate()).padStart(2,'0');
      const mon = String(d.getMonth()+1).padStart(2,'0');
      const yr  = String(d.getFullYear()).slice(-2);
      return `${day}-${mon}-${yr}`;
    }

    function Tile({ tile, onClick, size }) {
      const isVisible = tile.flipped || tile.matched;
      const s = size;
      const tileH = s * 1.45;
      const dimpleSize = s * 0.28;
      return (
        <div onClick={() => !tile.matched && !tile.flipped && onClick(tile.id)}
          style={{ width: s, height: tileH, perspective: '600px', cursor: tile.matched ? 'default' : 'pointer', flexShrink: 0 }}>
          <div style={{ width: '100%', height: '100%', position: 'relative', transformStyle: 'preserve-3d',
            transform: isVisible ? 'rotateY(180deg)' : 'rotateY(0deg)', transition: 'transform 0.35s cubic-bezier(.4,2,.6,1)' }}>
            <div style={{ position: 'absolute', width: '100%', height: '100%', backfaceVisibility: 'hidden',
              borderRadius: 8, background: 'linear-gradient(160deg, #F8F3E2 60%, #EDE5C8 100%)',

            <div style={{ position: 'absolute', width: '100%', height: '100%', backfaceVisibility: 'hidden',

                marginTop: s * 0.02, WebkitTextStroke: '0.5px rgba(0,0,0,0.15)' }}>{tile.number}</span>
              <div style={{ flex: 1 }} />
              <div style={{ width: dimpleSize * 1.08, height: dimpleSize * 1.08, borderRadius: '50%',
                background: 'radial-gradient(circle at 40% 35%, #d8cfa8, #b8a870)',
                boxShadow: 'inset 0 2px 5px rgba(0,0,0,0.35), inset 0 1px 3px rgba(0,0,0,0.25)',
                display: 'flex', alignItems: 'center', justifyContent: 'center', marginBottom: s * 0.11 }}>
                <span style={{ color: tile.color, fontSize: dimpleSize * 0.6, lineHeight: 1,
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  filter: 'drop-shadow(0 1px 1px rgba(0,0,0,0.3))' }}>♥</span>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function ScoreBoard({ scores, sortBy, onSortChange, activeCategory, onCategoryChange, onClearCategory }) {
      const categories = Object.entries(GRID_CONFIGS).map(([key, val]) => ({ key, label: val.difficulty }));
      const filtered = scores.filter(s => s.mode === activeCategory);
      const sortedScores = [...filtered].sort((a, b) => {
        if (sortBy === 'score') return b.score - a.score;
        if (sortBy === 'time')  return a.time - b.time;
        if (sortBy === 'moves') return a.moves - b.moves;
        return 0;
      });
      const tabStyle = (key) => ({
        flex: 1, padding: '7px 2px', border: 'none', borderRadius: 8, cursor: 'pointer', fontSize: 11, fontWeight: 700,
        background: activeCategory === key ? 'linear-gradient(135deg,#f39c12,#e67e22)' : 'rgba(255,255,255,0.08)',
        color: activeCategory === key ? '#fff' : '#ffe082',
        boxShadow: activeCategory === key ? '0 2px 8px rgba(243,156,18,0.4)' : 'none',
        transition: 'all 0.2s',
      });
      const sortBtnStyle = (key) => ({
        background: 'none', border: 'none',
        color: sortBy === key ? '#fff' : '#ffe082',
        cursor: 'pointer', fontSize: 11, fontWeight: sortBy === key ? 900 : 600,
        textDecoration: sortBy === key ? 'underline' : 'none', padding: '0 4px',
      });
      return (
        <div style={{ width: '100%' }}>
          <div style={{ display: 'flex', gap: 4, marginBottom: 10 }}>
            {categories.map(cat => (
              <button key={cat.key} style={tabStyle(cat.key)} onClick={() => onCategoryChange(cat.key)}>{cat.label}</button>
            ))}
          </div>
          <div style={{ display: 'flex', justifyContent: 'flex-end', gap: 2, marginBottom: 6, paddingRight: 4 }}>
            <span style={{ color: '#ffe082', fontSize: 11, alignSelf: 'center', marginRight: 4 }}>Sort:</span>
            <button style={sortBtnStyle('score')} onClick={() => onSortChange('score')}>Score</button>
            <button style={sortBtnStyle('moves')} onClick={() => onSortChange('moves')}>Moves</button>
            <button style={sortBtnStyle('time')}  onClick={() => onSortChange('time')}>Time</button>
          </div>
          {sortedScores.length === 0
            ? <p style={{ color: '#ffe082', textAlign: 'center', fontSize: 13, margin: '16px 0' }}>No games yet for this category</p>
            : (
              <div style={{ maxHeight: 340, overflowY: 'auto' }}>
                {sortedScores.map((s, i) => (
               <div key={i} style={{ display: 'flex', alignItems: 'center',
  padding: '6px 8px', marginBottom: 4, gap: 4,
  background: i === 0 ? 'rgba(241,196,15,0.25)' : 'rgba(255,255,255,0.1)',
  borderRadius: 8, fontSize: 11,
  border: i === 0 ? '1px solid rgba(255,200,0,0.4)' : '1px solid rgba(255,255,255,0.05)' }}>
  <span style={{ fontWeight: 700, color: i===0?'#ffe066':'#fff', minWidth: 36, flexShrink: 0 }}>#{i+1}</span>
  <span style={{ color: '#fff', fontWeight: 600, flex: 1, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{s.user || 'Guest'}</span>
  <span style={{ color: '#ffe082', fontWeight: 800, minWidth: 44, textAlign: 'right', flexShrink: 0 }}>{s.score ? s.score.toLocaleString() : '-'}</span>
  <span style={{ color: '#ffe082', minWidth: 36, textAlign: 'right', flexShrink: 0 }}>{s.moves}mv</span>
  <span style={{ color: '#ffe082', minWidth: 36, textAlign: 'right', flexShrink: 0 }}>{formatTime(s.time)}</span>
  <span style={{ color: 'rgba(255,224,130,0.7)', minWidth: 52, textAlign: 'right', flexShrink: 0, fontSize: 10 }}>
    {formatDate(s.createdAt)}
  </span>
</div>
                ))}
              </div>
            )
          }
          {filtered.length > 0 && (
            <button onClick={() => onClearCategory(activeCategory)}
              style={{ width: '100%', marginTop: 8, padding: '8px', borderRadius: 10, border: '1.5px solid #c0392b',
                background: 'rgba(0,0,0,0.3)', color: '#e74c3c', fontWeight: 600, fontSize: 12, cursor: 'pointer' }}>
              Clear {GRID_CONFIGS[activeCategory].difficulty} Scores
            </button>
          )}
        </div>
      );
    }

    // ✅ FIX 1: user prop eklendi WinModal'a
// ============================================================
// YENİ WinModal — Kodunuzdaki eski function WinModal() { }
// bloğunu tamamen SİLİP bu kodla değiştirin.
// Başka hiçbir şeye dokunmayın.
// ============================================================

function WinModal({ moves, time, mode, score, comboBonus, rank, user, onReplay, onMenu, onScores }) {
  const [sharing, setSharing] = React.useState(false);
  const [confetti, setConfetti] = React.useState([]);

  React.useEffect(() => {
    const colors = ['#f39c12','#e74c3c','#2ecc71','#3498db','#9b59b6','#f1c40f','#1abc9c','#e67e22'];
    const shapes = ['■','●','▲','★','◆'];
    const pieces = Array.from({ length: 38 }, (_, i) => ({
      id: i,
      color: colors[Math.floor(Math.random() * colors.length)],
      shape: shapes[Math.floor(Math.random() * shapes.length)],
      left: Math.random() * 100,
      delay: Math.random() * 2.5,
      duration: 2.5 + Math.random() * 2,
      size: 8 + Math.random() * 10,
      rotate: Math.random() * 720,
    }));
    setConfetti(pieces);
  }, []);

  const getRankInfo = () => {
    if (!rank) return { label: 'Well Played!', color: '#95a5a6', bg: 'rgba(149,165,166,0.15)' };
    if (rank === 1) return { label: '👑 NEW RECORD!', color: '#f1c40f', bg: 'rgba(241,196,15,0.2)', glow: true };
    if (rank <= 3) return { label: '🥈 TOP 3 — Amazing!', color: '#e67e22', bg: 'rgba(230,126,34,0.18)' };
    if (rank <= 10) return { label: '⭐ Top 10 — Great Job!', color: '#27ae60', bg: 'rgba(39,174,96,0.15)' };
    return { label: `Rank #${rank}`, color: '#7f8c8d', bg: 'rgba(127,140,141,0.12)' };
  };
  const rankInfo = getRankInfo();

  const today = new Date();
  const dateStr = `${String(today.getDate()).padStart(2,'0')}-${String(today.getMonth()+1).padStart(2,'0')}-${today.getFullYear()}`;

  const buildCertificate = async () => {
    const W = 1080, H = 1920;
    const canvas = document.createElement('canvas');
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');

    const bgImg = new Image();
    bgImg.crossOrigin = 'anonymous';
    bgImg.src = './wood_bg.png';
    await new Promise(r => { bgImg.onload = r; bgImg.onerror = r; });
    ctx.fillStyle = '#2b1a10';
    ctx.fillRect(0, 0, W, H);
    try {
      const r = Math.max(W / bgImg.width, H / bgImg.height);
      ctx.drawImage(bgImg, (W - bgImg.width*r)/2, (H - bgImg.height*r)/2, bgImg.width*r, bgImg.height*r);
    } catch(e) {}

    const vg = ctx.createRadialGradient(W/2, H*0.4, 50, W/2, H*0.4, H*0.7);
    vg.addColorStop(0, 'rgba(0,0,0,0.15)');
    vg.addColorStop(1, 'rgba(0,0,0,0.75)');
    ctx.fillStyle = vg;
    ctx.fillRect(0, 0, W, H);

    const cx = 60, cy = 180, cw = W-120, ch = H-380, cr = 48;
    const rr = (x,y,w,h,r) => {
      ctx.beginPath();
      ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
      ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
    };

    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.6)'; ctx.shadowBlur = 60; ctx.shadowOffsetY = 20;
    rr(cx,cy,cw,ch,cr);
    const cardGrad = ctx.createLinearGradient(cx, cy, cx, cy+ch);
    cardGrad.addColorStop(0, '#fdf6e3');
    cardGrad.addColorStop(0.5, '#fef9ed');
    cardGrad.addColorStop(1, '#f5e6c8');
    ctx.fillStyle = cardGrad; ctx.fill();
    ctx.restore();

    rr(cx,cy,cw,ch,cr);
    ctx.lineWidth = 10; ctx.strokeStyle = '#c8a96e'; ctx.stroke();
    rr(cx+14,cy+14,cw-28,ch-28,cr-8);
    ctx.lineWidth = 3; ctx.strokeStyle = 'rgba(200,169,110,0.5)'; ctx.stroke();

    const corners = [[cx+40,cy+40],[cx+cw-40,cy+40],[cx+40,cy+ch-40],[cx+cw-40,cy+ch-40]];
    corners.forEach(([x,y]) => {
      ctx.save();
      ctx.fillStyle = '#c8a96e'; ctx.font = 'bold 52px serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('✦', x, y); ctx.restore();
    });

    ctx.save();
    ctx.textAlign='center';
    ctx.font = '900 96px Georgia, serif';
    const titleGrad = ctx.createLinearGradient(W/2-200, 0, W/2+200, 0);
    titleGrad.addColorStop(0,'#8B4513'); titleGrad.addColorStop(0.5,'#c8860a'); titleGrad.addColorStop(1,'#8B4513');
    ctx.fillStyle = titleGrad;
    ctx.shadowColor='rgba(0,0,0,0.2)'; ctx.shadowBlur=8;
    ctx.fillText('MindSharp', W/2, cy+130);
    ctx.restore();

    const bx=cx+80, by=cy+178, bw=cw-160, bh=68, br=12;
    rr(bx,by,bw,bh,br);
    const bannerG=ctx.createLinearGradient(bx,by,bx+bw,by);
    bannerG.addColorStop(0,'#b8860b'); bannerG.addColorStop(0.5,'#f0c040'); bannerG.addColorStop(1,'#b8860b');
    ctx.fillStyle=bannerG; ctx.fill();
    ctx.save();
    ctx.textAlign='center'; ctx.font='800 32px Segoe UI, Arial';
    ctx.fillStyle='#5a2d00';
    ctx.fillText('A C H I E V E M E N T', W/2, by+44);
    ctx.restore();

    if (rank) {

function useSettings() {
  const load = (key, def) => {
    try { const v = localStorage.getItem('ms_' + key); return v === null ? def : JSON.parse(v); }
    catch { return def; }
  };
  const [sfx,       setSfxRaw]       = React.useState(() => load('sfx', true));
  const [music,     setMusicRaw]     = React.useState(() => load('music', false));
const [vibration, setVibrationRaw] = React.useState(() => load('vibration', false));
  const save = (key, val) => { try { localStorage.setItem('ms_' + key, JSON.stringify(val)); } catch {} };

  const setSfx       = v => { setSfxRaw(v);       save('sfx', v); };
  const setMusic     = v => { setMusicRaw(v);     save('music', v); };
  const setVibration = v => { setVibrationRaw(v); save('vibration', v); };

  return { sfx, setSfx, music, setMusic, vibration, setVibration };
}

                    color: '#fff', fontWeight: 900, fontSize: combo >= 3 ? 14 : 12, letterSpacing: 1,
                    animation: 'comboBanner 0.4s ease' }}>
                    {combo >= 3 ? `🔥 COMBO x${combo} — AMAZING!` : `⚡ Combo x${combo}!`}
                  </div>
                )}

                {/* Board */}
                <div className={"ms-hint" + (showHint ? "" : " hide")}>
                  Match all pairs with minimum moves and maximum speed.
                </div>
                <div ref={boardRef} style={{ padding: '8px', ...boardBg, width: '100%', maxWidth: '100%',
                  boxSizing: 'border-box', overflow: 'hidden',
                  boxShadow: 'inset 0 2px 10px rgba(0,0,0,0.5)', borderRadius: 12, border: '2px solid rgba(90,54,32,0.6)' }}>
                  <div style={{ display: 'grid', gridTemplateColumns: `repeat(${cfg.cols}, ${tileW}px)`, gap: `${GAP}px`, justifyContent: 'center' }}>
                    {tiles.map(tile => (
                      <div key={tile.id} className={(shake && shake.includes(tile.id) ? 'shake-tile ' : '') + (matchAnim.includes(tile.id) ? 'match-tile' : '')}>
                        <Tile tile={tile} onClick={handleTile} size={tileW} />
                      </div>
                    ))}
                  </div>
                </div>

              </div>
            )}
          </div>

          {/* ✅ FIX 4: user prop artık WinModal'a geçiliyor */}
          {won && (
        <WinModal
          moves={moves}
          time={time}
          mode={mode}
          score={score}
          comboBonus={comboBonus}
          rank={rank}
          user={user}
          onReplay={() => startGame(mode)}
          onMenu={() => { setWon(false); setScreen('menu'); }}
          onScores={() => { setWon(false); setScreen('scores'); }}
        />
      )}
      {showSettings && (
        <SettingsModal
          onClose={() => setShowSettings(false)}
          settings={settings}
        />
      )}
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
