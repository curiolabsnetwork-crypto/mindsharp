  <script>
    window.MindSharpAds = {
      _initialized: false,
      _rewardedReady: false,
      AD_UNIT_ID: 'ca-app-pub-9758848686103243/3344380722',
      async init() {
        try {
          if (!window.Capacitor || !window.Capacitor.isNativePlatform()) return;
          const { AdMob } = window.CapacitorAdMob || {};
          if (!AdMob) return;
          await AdMob.initialize({ testingDevices: [], initializeForTesting: false });
          this._initialized = true;
          this.loadRewarded();
        } catch(e) {}
      },
      async loadRewarded() {
        try {
          if (!this._initialized) return;
          const { AdMob } = window.CapacitorAdMob || {};
          if (!AdMob) return;
          await AdMob.prepareRewardVideoAd({ adId: this.AD_UNIT_ID, isTesting: false });
          this._rewardedReady = true;
        } catch(e) { this._rewardedReady = false; }
      },
      isReady() { return this._initialized && this._rewardedReady; },
      async showRewarded(onReward) {
        try {
          if (!this.isReady()) { onReward && onReward(false); return; }
          const { AdMob } = window.CapacitorAdMob || {};
          if (!AdMob) { onReward && onReward(false); return; }
          const result = await AdMob.showRewardVideoAd();
          this._rewardedReady = false;
          this.loadRewarded();
          if (result && result.type === 'Rewarded') { onReward && onReward(true); }
          else { onReward && onReward(false); }
        } catch(e) { onReward && onReward(false); }
      }
    };
    document.addEventListener('deviceready', () => window.MindSharpAds.init(), false);
    window.addEventListener('load', () => { setTimeout(() => window.MindSharpAds.init(), 800); });
  </script>

    function loadStats() {
      try {
        const s = localStorage.getItem('ms_stats');
        return s ? JSON.parse(s) : { totalGames:0, totalWins:0, bestScores:{}, bestMoves:{}, bestTime:{}, totalMoves:0, totalTime:0, maxCombo:0, streak:[] };
      } catch { return { totalGames:0, totalWins:0, bestScores:{}, bestMoves:{}, bestTime:{}, totalMoves:0, totalTime:0, maxCombo:0, streak:[] }; }
    }
    function saveStats(stats) { try { localStorage.setItem('ms_stats', JSON.stringify(stats)); } catch {} }
    function recordGameStats({ mode, moves, time, score, comboBonus }) {
      const stats = loadStats();
      stats.totalGames = (stats.totalGames || 0) + 1;
      stats.totalWins  = (stats.totalWins  || 0) + 1;
      if (!stats.bestScores[mode] || score > stats.bestScores[mode]) stats.bestScores[mode] = score;
      if (!stats.bestMoves[mode]  || moves < stats.bestMoves[mode])  stats.bestMoves[mode]  = moves;
      if (!stats.bestTime[mode]   || time  < stats.bestTime[mode])   stats.bestTime[mode]   = time;
      stats.totalMoves = (stats.totalMoves || 0) + moves;
      stats.totalTime  = (stats.totalTime  || 0) + time;
      if (comboBonus > (stats.maxCombo || 0)) stats.maxCombo = comboBonus;
      const today = new Date().toISOString().slice(0, 10);
      if (!stats.streak) stats.streak = [];
      if (!stats.streak.includes(today)) stats.streak.push(today);
      saveStats(stats);
      return stats;
    }
    function getStreakCount(streak) {
      if (!streak || streak.length === 0) return 0;
      const sorted = [...streak].sort().reverse();
      let count = 0;
      let cur = new Date();
      cur.setHours(0,0,0,0);
      for (const d of sorted) {
        const dd = new Date(d);
        dd.setHours(0,0,0,0);
        const diff = Math.round((cur - dd) / 86400000);
        if (diff === 0 || diff === count) { count++; cur = dd; }
        else break;
      }
      return count;
    }

    const TILE_COLORS = ['#E8000A', '#29B6F6', '#F9A825', '#212121'];
    const GRID_CONFIGS = {
      '8x4': { rows:4, cols:8, pairs:16, maxNum:4, difficulty:'Classic', tileCount:32 },
      '8x7': { rows:7, cols:8, pairs:28, maxNum:7, difficulty:'Hard',    tileCount:56 },

    function generateTiles(pairs, maxNum) {
      const colorCount = TILE_COLORS.length;
      const uniquePairs = [];
      for (let n = 1; n <= maxNum; n++) {
        for (let c = 0; c < colorCount; c++) uniquePairs.push({ number:n, color:TILE_COLORS[c] });
      }
      for (let i = uniquePairs.length-1; i > 0; i--) {
        const j = Math.floor(Math.random()*(i+1));
        [uniquePairs[i],uniquePairs[j]] = [uniquePairs[j],uniquePairs[i]];
      }
      const selected = uniquePairs.slice(0,pairs);
      const allTiles = [...selected,...selected].map((p,idx) => ({ id:idx, number:p.number, color:p.color, flipped:false, matched:false }));
      for (let i = allTiles.length-1; i > 0; i--) {
        const j = Math.floor(Math.random()*(i+1));
        [allTiles[i],allTiles[j]] = [allTiles[j],allTiles[i]];
      }
      return allTiles;
    }

    function calcScore({ pairs, moves, time, comboBonus }) {
      const baseScore = pairs * 100;
      const movePenalty = Math.max(0,(moves-pairs)*8);
      const timePenalty = Math.floor(time*1.5);
      return Math.max(0, baseScore - movePenalty - timePenalty + comboBonus);
    }

    function mulberry32(seed) {
      return function() {
        seed |= 0; seed = seed + 0x6D2B79F5 | 0;
        let t = Math.imul(seed ^ seed >>> 15, 1|seed);
        t = t + Math.imul(t ^ t >>> 7, 61|t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
      };
    }
    function getDailyDateKey() {
      const d = new Date();
      return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
    }
    function getDailySeed() {
      const key = getDailyDateKey();
      let hash = 0;
      for (let i = 0; i < key.length; i++) hash = Math.imul(31,hash) + key.charCodeAt(i) | 0;
      return Math.abs(hash);
    }
    function generateDailyTiles(gridMode) {
      const m = gridMode || '8x4';
      const cfg = GRID_CONFIGS[m];
      const sharedKey = getDailyDateKey() + m;
      let sharedHash = 0;
      for (let i = 0; i < sharedKey.length; i++) sharedHash = Math.imul(31,sharedHash) + sharedKey.charCodeAt(i) | 0;
      const sharedRng = mulberry32(Math.abs(sharedHash));
      const colorCount = TILE_COLORS.length;
      const uniquePairs = [];
      for (let n = 1; n <= cfg.maxNum; n++) {
        for (let c = 0; c < colorCount; c++) uniquePairs.push({ number:n, color:TILE_COLORS[c] });
      }
      for (let i = uniquePairs.length-1; i > 0; i--) {
        const j = Math.floor(sharedRng()*(i+1));
        [uniquePairs[i],uniquePairs[j]] = [uniquePairs[j],uniquePairs[i]];
      }
      const selected = uniquePairs.slice(0,cfg.pairs);
      const uid = (() => {
        try {
          let id = localStorage.getItem('ms_uid');
          if (!id) { id = Math.random().toString(36).slice(2)+Date.now().toString(36); localStorage.setItem('ms_uid',id); }
          return id;
        } catch { return 'anon'; }
      })();
      const personalKey = getDailyDateKey()+m+uid;
      let personalHash = 0;
      for (let i = 0; i < personalKey.length; i++) personalHash = Math.imul(31,personalHash) + personalKey.charCodeAt(i) | 0;
      const personalRng = mulberry32(Math.abs(personalHash));
      const allTiles = [...selected,...selected].map((p,idx) => ({ id:idx, number:p.number, color:p.color, flipped:false, matched:false }));
      for (let i = allTiles.length-1; i > 0; i--) {
        const j = Math.floor(personalRng()*(i+1));
        [allTiles[i],allTiles[j]] = [allTiles[j],allTiles[i]];
      }
      return allTiles;
    }

    function loadDailyStreak() {
      try { const raw = localStorage.getItem('ms_daily_streak'); return raw ? JSON.parse(raw) : { count:0, lastDate:null }; }
      catch { return { count:0, lastDate:null }; }
    }
    function saveDailyStreak(streak) { try { localStorage.setItem('ms_daily_streak', JSON.stringify(streak)); } catch {} }
    function updateStreak() {
      const today = getDailyDateKey();
      const streak = loadDailyStreak();
      if (streak.lastDate === today) return streak;
      const yesterday = (() => {
        const d = new Date(); d.setDate(d.getDate()-1);
        return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
      })();
      const newCount = streak.lastDate === yesterday ? streak.count+1 : 1;
      const newStreak = { count:newCount, lastDate:today };
      saveDailyStreak(newStreak);
      return newStreak;
    }
    function hasDoneToday() { return loadDailyStreak().lastDate === getDailyDateKey(); }

    function useSound() {
      const ctx = useRef(null);
      const getCtx = () => {
        if (!ctx.current) { try { ctx.current = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {} }
        return ctx.current;
      };
      const play = (type) => {
        const ac = getCtx(); if (!ac) return;
        if (type === 'win') {
          [523,659,784,1047].forEach((f,i) => {
            const o2=ac.createOscillator(); const g2=ac.createGain();
            o2.connect(g2); g2.connect(ac.destination); o2.frequency.value=f;
            g2.gain.setValueAtTime(0.12,ac.currentTime+i*0.12);
            g2.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+i*0.12+0.3);
            o2.start(ac.currentTime+i*0.12); o2.stop(ac.currentTime+i*0.12+0.3);
          }); return;
        }
        if (type === 'combo3') {
          [523,659,784,880,1047].forEach((f,i) => {
            const o2=ac.createOscillator(); const g2=ac.createGain();
            o2.connect(g2); g2.connect(ac.destination); o2.type='sine'; o2.frequency.value=f;
            g2.gain.setValueAtTime(0.18,ac.currentTime+i*0.07);
            g2.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+i*0.07+0.25);
            o2.start(ac.currentTime+i*0.07); o2.stop(ac.currentTime+i*0.07+0.25);
          }); return;
        }
        if (type === 'combo') {
          [660,880].forEach((f,i) => {
            const o2=ac.createOscillator(); const g2=ac.createGain();
            o2.connect(g2); g2.connect(ac.destination); o2.type='sine'; o2.frequency.value=f;
            g2.gain.setValueAtTime(0.14,ac.currentTime+i*0.1);
            g2.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+i*0.1+0.25);
            o2.start(ac.currentTime+i*0.1); o2.stop(ac.currentTime+i*0.1+0.25);
          }); return;
        }
        const o = ac.createOscillator(); const g = ac.createGain();
        o.connect(g); g.connect(ac.destination);
        if (type==='flip')  { o.frequency.value=440; g.gain.setValueAtTime(0.1,ac.currentTime); g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.1); }
        else if (type==='match') { o.frequency.value=660; o.frequency.setValueAtTime(880,ac.currentTime+0.1); g.gain.setValueAtTime(0.15,ac.currentTime); g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.3); }
        else if (type==='fail')  { o.frequency.value=220; g.gain.setValueAtTime(0.08,ac.currentTime); g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.2); }
        o.start(); o.stop(ac.currentTime+0.3);
      };
      return play;
    }

                    border: i===0 ? '1px solid rgba(255,200,0,0.4)' : '1px solid rgba(255,255,255,0.05)' }}>
                    <span style={{ fontWeight:700, color:i===0?'#ffe066':'#fff', minWidth:52, flexShrink:0 }}>#{i+1}</span>
                    <span style={{ color:'#fff', fontWeight:600, flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{s.user || t('guest')}</span>
                    <span style={{ color:'#ffe082', fontWeight:800, minWidth:44, textAlign:'right', flexShrink:0 }}>{s.score ? s.score.toLocaleString() : '-'}</span>
                    <span style={{ color:'#ffe082', minWidth:36, textAlign:'right', flexShrink:0 }}>{s.moves}mv</span>
                    <span style={{ color:'#ffe082', minWidth:36, textAlign:'right', flexShrink:0 }}>{formatTime(s.time)}</span>
                    <span style={{ color:'rgba(255,224,130,0.7)', minWidth:52, textAlign:'right', flexShrink:0, fontSize:10 }}>{formatDate(s.createdAt)}</span>
                  </div>
                ))}
              </div>
            )
          }
          {filtered.length > 0 && (
            <>
              <button onClick={() => setConfirmClear(true)}
                style={{ width:'100%', marginTop:8, padding:'8px', borderRadius:10, border:'1.5px solid #c0392b',
                  background:'rgba(0,0,0,0.3)', color:'#e74c3c', fontWeight:600, fontSize:12, cursor:'pointer' }}>
                {t('clear_scores', {difficulty: tDiff(GRID_CONFIGS[activeCategory].difficulty)})}
              </button>
              {confirmClear && (
                <ConfirmDialog
                  title={t("clear_confirm_title")}
                  message={t('clear_confirm_msg', {difficulty: tDiff(GRID_CONFIGS[activeCategory].difficulty)})}
                  confirmLabel={t("delete_all")}
                  onConfirm={() => { setConfirmClear(false); onClearCategory(activeCategory); }}
                  onCancel={() => setConfirmClear(false)}
                />
              )}
            </>
          )}
        </div>
      );
    }

    function DailyScoresScreen({ onBack, dateKey, gridMode, myScore }) {
      const [entries, setEntries] = React.useState([]);
      const [loading, setLoading] = React.useState(true);
      const fmtT = s => String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
      const modeLabel = { '8x4':t('difficulty_classic'), '8x7':t('difficulty_hard') }[gridMode] || gridMode;
      const today = new Date();
      const dateLabel = today.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
      React.useEffect(() => {
        if (!db) { setLoading(false); return; }
        db.collection('daily_scores').where('dateKey','==',dateKey).where('gridMode','==',gridMode).get()
          .then(snap => {
            const rows = snap.docs.map(d => d.data());
            rows.sort((a,b) => (b.score||0)-(a.score||0));
            setEntries(rows); setLoading(false);
          }).catch(() => setLoading(false));
      }, [dateKey, gridMode]);
      return (
        <div style={{ width:'100%', display:'flex', flexDirection:'column', gap:10 }}>
          {/* Header — ScoreBoard ile aynı */}
          <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:4 }}>
            <button onClick={onBack} style={{ background:'rgba(0,0,0,0.35)', border:'1px solid rgba(255,255,255,0.2)',
              color:'#ffe082', borderRadius:10, padding:'7px 13px', cursor:'pointer', fontSize:16 }}>←</button>
            <h2 style={{ color:'#ffe082', fontFamily:'Georgia,serif', margin:0, fontSize:20,
              textShadow:'0 2px 6px rgba(0,0,0,0.8)' }}>{t('daily_header',{mode:modeLabel})}</h2>
          </div>

          <div style={{ background:'rgba(0,0,0,0.5)', borderRadius:16, padding:'14px 10px',
            border:'1px solid rgba(255,255,255,0.15)', backdropFilter:'blur(4px)' }}>

            {/* Tarih + oyuncu sayısı satırı */}
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10, padding:'0 4px' }}>
              <span style={{ color:'#ffe082', fontSize:12, fontWeight:700 }}>{dateLabel}</span>
              <span style={{ color:'rgba(255,224,130,0.6)', fontSize:11 }}>

            {loading ? (
              <div style={{ color:'rgba(255,255,255,0.4)', textAlign:'center', padding:24 }}>{t('loading')}</div>

              <div style={{ color:'#ffe082', textAlign:'center', fontSize:13, margin:'16px 0' }}>{t("daily_no_scores")}</div>
            ) : (
              <div style={{ maxHeight:400, overflowY:'auto' }}>
                {entries.map((e,i) => {
                  const isMe = myScore > 0 && e.score === myScore;
                  const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
                  return (
                    <div key={i} style={{ display:'flex', alignItems:'center', padding:'6px 8px', marginBottom:4, gap:4,
                      background: isMe ? 'rgba(243,156,18,0.25)' : i===0 ? 'rgba(241,196,15,0.25)' : 'rgba(255,255,255,0.1)',
                      borderRadius:8, fontSize:11,
                      border: isMe ? '1.5px solid rgba(243,156,18,0.6)' : i===0 ? '1px solid rgba(255,200,0,0.4)' : '1px solid rgba(255,255,255,0.05)' }}>
                      {/* Sıra / madalya */}
                      <span style={{ fontWeight:700, color: medal ? '#ffe066' : isMe ? '#ffe066' : '#fff',
                        minWidth:52, flexShrink:0, fontSize:13 }}>
                        {medal || ('#'+(i+1))}
                      </span>
                      {/* İsim */}
                      <span style={{ color: isMe ? '#ffe066' : '#fff', fontWeight: isMe ? 800 : 600,
                        flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
                        {e.user||t('guest')}
                      </span>
                      {/* Sen badge */}
                      {isMe && (
                        <span style={{ background:'rgba(243,156,18,0.35)', border:'1px solid rgba(243,156,18,0.6)',
                          color:'#ffe082', fontSize:9, fontWeight:800, padding:'1px 6px', borderRadius:20, flexShrink:0, marginRight:2 }}>
                          {getLang()==='tr' ? 'sen' : 'you'}
                        </span>
                      )}
                      {/* Skor */}
                      <span style={{ color:'#ffe082', fontWeight:800, minWidth:44, textAlign:'right', flexShrink:0 }}>
                        {(e.score||0).toLocaleString()}
                      </span>
                      {/* Hamle */}
                      <span style={{ color:'#ffe082', minWidth:36, textAlign:'right', flexShrink:0 }}>
                        {(e.moves||0)}mv
                      </span>
                      {/* Süre */}
                      <span style={{ color:'#ffe082', minWidth:36, textAlign:'right', flexShrink:0 }}>
                        {fmtT(e.time||0)}
                      </span>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </div>
      );
    }

    function useSettings() {
      const load = (key,def) => {
        try { const v=localStorage.getItem('ms_'+key); return v===null?def:JSON.parse(v); } catch { return def; }
      };
      const [sfx,setSfxRaw]             = React.useState(() => load('sfx',true));
      const [music,setMusicRaw]         = React.useState(() => load('music',true));
      const [vibration,setVibrationRaw] = React.useState(() => load('vibration',false));
      const save = (key,val) => { try { localStorage.setItem('ms_'+key,JSON.stringify(val)); } catch {} };
      const setSfx       = v => { setSfxRaw(v);       save('sfx',v); };
      const setMusic     = v => { setMusicRaw(v);     save('music',v); };
      const setVibration = v => { setVibrationRaw(v); save('vibration',v); };
      return { sfx,setSfx,music,setMusic,vibration,setVibration };
    }

      const bgPlayingRef  = useRef(false);
      const musicEnabledRef = useRef(settings.music);
      useEffect(() => { musicEnabledRef.current = settings.music; }, [settings.music]);
      const getAudioCtx = () => {
        if (!bgAudioCtxRef.current) bgAudioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
        return bgAudioCtxRef.current;
      };
      const startBgMusic = () => {
        if (bgPlayingRef.current) return;
        const ctx = getAudioCtx();
        if (ctx.state === 'suspended') ctx.resume();
        if (!bgBufferRef.current) return;
        const source = ctx.createBufferSource();
        source.buffer = bgBufferRef.current;
        source.loop = true;
        const gainNode = ctx.createGain();
        gainNode.gain.value = 0.18;
        source.connect(gainNode);
        gainNode.connect(ctx.destination);
        source.start(0);
        bgSourceRef.current = source;
        bgPlayingRef.current = true;
      };
      const stopBgMusic = () => {
        if (!bgPlayingRef.current) return;
        try { bgSourceRef.current && bgSourceRef.current.stop(); } catch(e) {}
        bgSourceRef.current = null;
        bgPlayingRef.current = false;
      };
      useEffect(() => {
        if (bgLoadedRef.current) return;
        bgLoadedRef.current = true;
        fetch('./music.mp3').then(r => r.arrayBuffer()).then(ab => {
          const ctx = getAudioCtx();
          return ctx.decodeAudioData(ab);
        }).then(buffer => {
          bgBufferRef.current = buffer;
          if (musicEnabledRef.current) startBgMusic();
        }).catch(() => {});
      }, []);
      useEffect(() => {
        if (!bgBufferRef.current) return;
        if (settings.music) startBgMusic(); else stopBgMusic();
      }, [settings.music]);
      useEffect(() => {
        const tryStart = () => {
          const ctx = bgAudioCtxRef.current;
          if (ctx && ctx.state==='suspended') ctx.resume();
          if (musicEnabledRef.current && !bgPlayingRef.current && bgBufferRef.current) startBgMusic();
          document.removeEventListener('pointerdown', tryStart);
        };
        document.addEventListener('pointerdown', tryStart);
        return () => document.removeEventListener('pointerdown', tryStart);
      }, []);

      useEffect(() => {
        if (screen !== 'game') return;
        setShowHint(true);
        const timer = setTimeout(() => setShowHint(false), 5000);
        return () => clearTimeout(timer);
      }, [screen]);

      useEffect(() => {
        if (!db) return;
        const unsub = db.collection('scores').orderBy('score','desc').limit(500)
          .onSnapshot(snap => {
            setScores(snap.docs.map(d => ({ id:d.id, ...d.data() })));
          }, err => console.log('Firestore read error:', err));
        return () => unsub();
      }, []);

      const boardRef = useRef(null);
      const [boardWidth, setBoardWidth] = useState(330);
      useEffect(() => {
        if (screen !== 'game') return;
        const el = boardRef.current;
        if (!el) return;
        const update = () => setBoardWidth(el.clientWidth || 330);
        update();
        let ro;
        try { ro = new ResizeObserver(update); ro.observe(el); }
        catch(e) { window.addEventListener('resize', update); }
        return () => { if (ro) ro.disconnect(); window.removeEventListener('resize', update); };
      }, [screen, mode]);

      useEffect(() => {
        if (!running) return;
        const id = setInterval(() => setTime(t => t+1), 1000);
        return () => clearInterval(id);
      }, [running]);

      const showToast = useCallback((msg) => {
        setToast(msg);
        setTimeout(() => setToast(null), 2400);
      }, []);

      const startDailyChallenge = useCallback((m) => {
        const gm = m || mode;
        setTiles(generateDailyTiles(gm));
        setFlipped([]); setMoves(0); setMatched(0); setTime(0);
        setRunning(false); setWon(false); lockRef.current = false;
        setMode(gm); setScreen('game');
        trackEvent('game_start',{mode:gm,type:'daily'});
        setScore(0); setComboBonus(0); setCombo(0); setScoreDocId(null);
        comboBonusRef.current=0; comboRef.current=0;
        setIsDailyMode(true); isDailyRef.current=true;
        setDailyModeKey(gm); firstFlipTracked.current=false;
      }, [mode]);

      const startGame = useCallback((m) => {
        const cfg = GRID_CONFIGS[m];
        setTiles(generateTiles(cfg.pairs, cfg.maxNum));
        setFlipped([]); setMoves(0); setMatched(0); setTime(0);
        setRunning(false); setWon(false); lockRef.current = false;
        setMode(m); setScreen('game');
        trackEvent('game_start',{mode:m,type:'regular'});
        setScore(0); setComboBonus(0); setCombo(0); setScoreDocId(null);
        comboBonusRef.current=0; comboRef.current=0;
        setIsDailyMode(false); isDailyRef.current=false;
        firstFlipTracked.current=false;
      }, []);

      const firstFlipTracked = useRef(false);
      const handleTile = useCallback((id) => {
        if (lockRef.current) return;
        if (!running) {
          setRunning(true);
          if (!firstFlipTracked.current) {
            firstFlipTracked.current = true;
            trackEvent('game_first_flip',{mode,type:isDailyRef.current?'daily':'regular'});
          }
        }
        if (settings.sfx) play('flip');
        setTiles(prev => prev.map(t => t.id===id ? {...t,flipped:true} : t));
        setFlipped(prev => {
          const next = [...prev, id];
          if (next.length === 2) {
            lockRef.current = true;
            setMoves(m => m+1);
            setTimeout(() => {
              setTiles(cur => {
                const [a,b] = next.map(fid => cur.find(t => t.id===fid));
                if (a && b && a.number===b.number && a.color===b.color) {
                  const newCombo = comboRef.current+1;
                  comboRef.current = newCombo;
                  setCombo(newCombo);
                  let bonusPts = 0;
                  if (newCombo>=3) { bonusPts=60; if(settings.sfx)play('combo3'); trackEvent('combo_achieved',{combo:newCombo,mode}); }
                  else if (newCombo===2) { bonusPts=25; if(settings.sfx)play('combo'); trackEvent('combo_achieved',{combo:2,mode}); }
                  else { if(settings.sfx)play('match'); }
                  if (settings.vibration && navigator.vibrate) navigator.vibrate(40);
                  comboBonusRef.current += bonusPts;
                  setComboBonus(b => b+bonusPts);
                  setMatchAnim([a.id,b.id]);
                  setTimeout(() => setMatchAnim([]), 600);
                  const newTiles = cur.map(t => next.includes(t.id) ? {...t,matched:true,flipped:false} : t);
                  const newMatchedCount = newTiles.filter(t => t.matched).length/2;
                  setMatched(newMatchedCount);
                  const activeM = isDailyRef.current ? dailyModeKey : mode;
                  const cfgP = GRID_CONFIGS[activeM] || GRID_CONFIGS[mode];
                  const pct = Math.round((newMatchedCount/cfgP.pairs)*100);
                  if (pct===25||pct===50||pct===75) trackEvent('game_progress',{percent:pct,mode:activeM,type:isDailyRef.current?'daily':'regular'});
                  const activeMode = isDailyRef.current ? dailyModeKey : mode;
                  const cfg = GRID_CONFIGS[activeMode] || GRID_CONFIGS[mode];
                  if (newMatchedCount === cfg.pairs) {
                    setRunning(false);
                    if (!isDailyRef.current) setWon(true);
                    if (settings.sfx) play('win');
                    setMoves((mv) => {
                      setTime((tm) => {
                        const finalScore = calcScore({pairs:cfg.pairs,moves:mv,time:tm,comboBonus:comboBonusRef.current});
                        setScore(finalScore);
                        const myEntry = {user:user||t('guest'),mode,moves:mv,time:tm,score:finalScore};
                        const sameMode = (scoresRef.current||[]).filter(s => s.mode===mode);
                        const merged = [...sameMode,myEntry].sort((a,b)=>(b.score||0)-(a.score||0));
                        const myRank = merged.findIndex(s => s.user===myEntry.user&&s.score===myEntry.score&&s.time===myEntry.time&&s.moves===myEntry.moves)+1;
                        setRank(myRank);
                        if (isDailyRef.current) {
                          const result = {moves:mv,time:tm,score:finalScore,gridMode:dailyModeKey};
                          saveDailyResult(result,dailyModeKey);
                          setDailyDoneMap(prev => ({...prev,[dailyModeKey]:true}));
                          const newStreak = updateStreak();
                          setDailyStreak(newStreak);
                          setDailyResult(result);
                          submitDailyScore({user:user||t('guest'),moves:mv,time:tm,score:finalScore,gridMode:dailyModeKey})
                            .then(docId => { if(docId) setDailyDocId(docId); });
                          (async () => {
                            try {
                              if (db) {
                                const dateKey = getDailyDateKey();
                                const snap = await db.collection('daily_scores')
                                  .where('dateKey','==',dateKey).where('gridMode','==',dailyModeKey).get();
                                const allScores = snap.docs.map(d => d.data().score||0).sort((a,b)=>b-a);
                                const total = allScores.length;
                                const rankPos = allScores.findIndex(s => s<=finalScore)+1||total;
                                setDailyRank(rankPos); setDailyTotal(total);
                                try {
                                  const stats = JSON.parse(localStorage.getItem('ms_stats')||'{}');
                                  const pb = stats.bestScores&&stats.bestScores[dailyModeKey];
                                  setDailyPersonalBest(pb||0);
                                } catch {}
                              }
                            } catch(e) {}
                            setTimeout(() => { setWon(false); setScreen('menu'); setShowDailyModal(true); }, 800);
                          })();
                        } else {
                          submitScoreToCloud({user:user||"Guest",mode,moves:mv,time:tm,score:finalScore})
                            .then(docId => { if(docId) setScoreDocId(docId); });
                        }
                        recordGameStats({mode,moves:mv,time:tm,score:finalScore,comboBonus:comboBonusRef.current});
                        setTimeout(async () => {
                          if (!db) return;
                          try {
                            const snap = await db.collection("scores").where("mode","==",mode).orderBy("score","desc").get();
                            const scoresList = snap.docs.map(d => d.data());
                            const position = scoresList.findIndex(s => s.score===finalScore&&s.user===(user||t('guest')));
                            if (position>=0) setRank(position+1);
                          } catch(e) {}
                        }, 1200);
                        return tm;
                      });
                      return mv;
                    });
                  }
                  lockRef.current = false;
                  return newTiles;
                } else {
                  comboRef.current=0; setCombo(0);
                  if (settings.sfx) play('fail');
                  if (settings.vibration && navigator.vibrate) navigator.vibrate([30,20,30]);
                  setShake(next);
                  setTimeout(() => setShake(null), 400);
                  const reset = cur.map(t => next.includes(t.id) ? {...t,flipped:false} : t);
                  lockRef.current = false;
                  return reset;
                }
              });
              setFlipped([]);
            }, 900);
          }
          return next;
        });
      }, [running,mode,play,user,settings.sfx,settings.vibration]);

      const cfg        = GRID_CONFIGS[mode];
      const totalPairs = cfg ? cfg.pairs : 0;
      const GAP        = (typeof window !== 'undefined' && window.innerWidth < 380) ? 6 : 5;

                  <h2 style={{ color:'#ffe082', fontFamily:'Georgia,serif', margin:0, fontSize:20,

                  border:'1px solid rgba(255,255,255,0.15)', backdropFilter:'blur(4px)' }}>
                  <ScoreBoard scores={scores} sortBy={sortBy} onSortChange={setSortBy}
                    activeCategory={scoreCategory} onCategoryChange={setScoreCategory}
                    onClearCategory={async (cat) => { setScores(prev => prev.filter(s => s.mode!==cat)); }} />
                </div>
                {showInstallBanner && <InstallBanner onDismiss={() => setShowInstallBanner(false)} />}
              </div>
            )}

            {screen === 'game' && (
              <div style={{ width:'100%', display:'flex', flexDirection:'column', alignItems:'center', gap:8 }}>
                <div style={{ width:'100%', padding:'8px 12px', display:'flex', alignItems:'center',
                  justifyContent:'space-between', background:'rgba(0,0,0,0.4)', borderRadius:10 }}>
                  <button onClick={() => { if(running||moves>0) setShowExitConfirm(true); else { setRunning(false); setScreen('menu'); } }}
                    style={{ background:'none', border:'none', color:'#ffe082', fontSize:20, cursor:'pointer', padding:'0 4px' }}>←</button>
                  <div style={{ display:'flex', gap:10, alignItems:'center' }}>
                    {[
                      { val:score.toLocaleString(), label:t('score_label') },
                      { val:moves, label:t('moves_label') },
                      { val:formatTime(time), label:t('time_label') },
                      { val:`${matched}/${totalPairs}`, label:t('pairs_label') },
                    ].map((s,i) => (
                      <React.Fragment key={s.label}>
                        {i>0 && <div style={{ width:1, background:'#7a5c2e', alignSelf:'stretch' }}/>}
                        <div style={{ textAlign:'center' }}>
                          <div style={{ color:'#ffe082', fontWeight:i===0?900:800, fontSize:16 }}>{s.val}</div>
                          <div style={{ color:'#c8a96e', fontSize:9, letterSpacing:0.5 }}>{s.label}</div>
                        </div>
                      </React.Fragment>
                    ))}
                  </div>
                  <button onClick={() => startGame(mode)}
                    style={{ background:'none', border:'none', color:'#ffe082', fontSize:20, cursor:'pointer', padding:'0 4px' }}>↺</button>
                </div>
                <div style={{ width:'100%', height:4, background:'rgba(255,255,255,0.1)', borderRadius:2 }}>
                  <div style={{ height:'100%', background:'linear-gradient(90deg,#27ae60,#2ecc71)',
                    width:`${(matched/totalPairs)*100}%`, transition:'width 0.4s ease', borderRadius:2 }}/>
                </div>
                {combo >= 2 && (
                  <div style={{ width:'100%', padding:'4px 0', textAlign:'center',
                    background: combo>=3 ? 'linear-gradient(90deg,rgba(243,156,18,0.9),rgba(230,126,34,0.9))' : 'linear-gradient(90deg,rgba(39,174,96,0.85),rgba(46,204,113,0.85))',
                    color:'#fff', fontWeight:900, fontSize:combo>=3?14:12, letterSpacing:1,
                    animation:'comboBanner 0.4s ease' }}>
                    {combo>=3 ? t('combo_x3',{n:combo}) : t('combo_x2',{n:combo})}
                  </div>
                )}
                <div className={"ms-hint"+(showHint?"":" hide")}>{t("game_hint")}</div>
                <div ref={boardRef} style={{ padding:'8px', width:'100%', maxWidth:'100%', boxSizing:'border-box',
                  overflow:'hidden', boxShadow:'inset 0 2px 10px rgba(0,0,0,0.5)', borderRadius:12,
                  border:'2px solid rgba(90,54,32,0.6)' }}>
                  <div style={{ display:'grid', gridTemplateColumns:`repeat(${cfg.cols},${tileW}px)`,
                    gap:`${GAP}px`, justifyContent:'center' }}>
                    {tiles.map(tile => (
                      <div key={tile.id} className={(shake&&shake.includes(tile.id)?'shake-tile ':'')+(matchAnim.includes(tile.id)?'match-tile':'')}>
                        <Tile tile={tile} onClick={handleTile} size={tileW} />
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}
          </div>

          {won && (
            <WinModal moves={moves} time={time} mode={mode} score={score} comboBonus={comboBonus} rank={rank}
              user={user} scoreDocId={scoreDocId}
              onReplay={() => { trackEvent('replay_click',{mode,score}); startGame(mode); }}
              onMenu={() => { trackEvent('menu_return',{source:'win_modal',mode,score}); setWon(false); setScreen('menu'); }}
              onScores={() => { trackEvent('scores_click',{source:'win_modal'}); setWon(false); setScreen('scores'); }}
              onSaveName={(name) => {
                setUser(name); try { localStorage.setItem('memotiles_user',name); } catch {}
                trackEvent('name_saved_postgame',{source:'win_modal'});
                showToast(t('name_saved_toast'));
              }}
              onScoreDoubled={() => {
                const boosted = score+100; setScore(boosted);
                submitScoreToCloud({user:user||t('guest'),mode,moves,time,score:boosted})
                  .then(docId => { if(docId) setScoreDocId(docId); });
                showToast('🎬 +100 ' + t('pts_label') + '!');
              }}
            />
          )}

          {showSettings && <SettingsModal onClose={() => setShowSettings(false)} settings={settings} onLangChange={() => setForceRender(x=>x+1)} />}

          {showDailyModal && dailyResult && (
            <DailyCompleteModal result={dailyResult} streak={dailyStreak}
              alreadyDone={todayDoneForMode(dailyModeKey)&&screen==='menu'}
              user={user} dailyRank={dailyRank} dailyTotal={dailyTotal} personalBest={dailyPersonalBest}
              onSaveName={(name) => {
                setUser(name); try { localStorage.setItem('memotiles_user',name); } catch {}
                updateDailyScoreUsername(dailyDocId,name);
              }}
              onLeaderboard={() => { trackEvent('daily_leaderboard_view',{mode:dailyModeKey}); setShowDailyModal(false); setScreen('daily_scores'); }}
              onMenu={() => { trackEvent('menu_return',{source:'daily_modal'}); setShowDailyModal(false); setScreen('menu'); }}
              onShare={() => {
                trackEvent('daily_share',{mode:dailyModeKey,score:dailyResult.score,rank:dailyRank});
                const fmtT = s => String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
                const today = new Date();
                const dateLabel = today.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
                const fire = dailyStreak.count>=7?'🔥':dailyStreak.count>=3?'⚡':'✨';
                const rankTxt = dailyRank ? ' | #'+dailyRank+' today' : '';
                const text = [
                  t('share_daily_title'), dateLabel,
                  '⏱ '+fmtT(dailyResult.time)+'  🃏 '+dailyResult.moves+' moves  🏆 '+dailyResult.score.toLocaleString()+' pts'+rankTxt,
                  fire+' '+dailyStreak.count+' '+t('share_daily_streak'),
                  'mindsharp.co'
                ].join('\n');
                if (navigator.share) navigator.share({text}).catch(()=>{});
                else navigator.clipboard.writeText(text).catch(()=>{});
              }}
            />
          )}

          {showExitConfirm && (
            <ConfirmDialog title={t("quit_title")} message={t("quit_message")} confirmLabel={t("quit_confirm")}
              onConfirm={() => {
                setShowExitConfirm(false);
                trackEvent('game_quit',{mode,time,moves,matched,total_pairs:totalPairs,type:isDailyRef.current?'daily':'regular'});
                setRunning(false); setWon(false); setScreen('menu');
              }}
              onCancel={() => setShowExitConfirm(false)} />
          )}

          {toast && <div className="ms-toast">{toast}</div>}

          {showOnboarding && (
            <OnboardingModal onDone={() => setShowOnboarding(false)} playSound={play} sfxEnabled={settings.sfx} />
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        const loader = document.getElementById('ms-loader');
        if (loader) loader.style.display = 'none';
      });
    });
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').then(() => console.log('[SW] Registered')).catch(err => console.warn('[SW] Failed:', err));
    }
  </script>
  <script>
    window.__installPromptEvent = null;
    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      window.__installPromptEvent = e;
      if (window.__onInstallPromptReady) window.__onInstallPromptReady();
    });
    window.addEventListener('appinstalled', function() {
      window.__installPromptEvent = null;
      try { localStorage.setItem('ms_pwa_installed','1'); } catch {}
      if (window.__onAppInstalled) window.__onAppInstalled();
    });
  </script>
</body>
</html>
