  <script>
    window.MindSharpAds = {
      _initialized: false,
      _rewardedReady: false,
      AD_UNIT_ID: 'ca-app-pub-9758848686103243/3344380722',
      async init() {
        try {
          if (!window.Capacitor || !window.Capacitor.isNativePlatform()) return;
          const { AdMob } = window.CapacitorAdMob || {};
          if (!AdMob) return;
          await AdMob.initialize({ testingDevices: [], initializeForTesting: false });
          this._initialized = true;
          this.loadRewarded();
        } catch(e) {}
      },
      async loadRewarded() {
        try {
          if (!this._initialized) return;
          const { AdMob } = window.CapacitorAdMob || {};
          if (!AdMob) return;
          await AdMob.prepareRewardVideoAd({ adId: this.AD_UNIT_ID, isTesting: false });
          this._rewardedReady = true;
        } catch(e) { this._rewardedReady = false; }
      },
      isReady() { return this._initialized && this._rewardedReady; },
      async showRewarded(onReward) {
        try {
          if (!this.isReady()) { onReward && onReward(false); return; }
          const { AdMob } = window.CapacitorAdMob || {};
          if (!AdMob) { onReward && onReward(false); return; }
          const result = await AdMob.showRewardVideoAd();
          this._rewardedReady = false;
          this.loadRewarded();
          if (result && result.type === 'Rewarded') { onReward && onReward(true); }
          else { onReward && onReward(false); }
        } catch(e) { onReward && onReward(false); }
      }
    };
    document.addEventListener('deviceready', () => window.MindSharpAds.init(), false);
    window.addEventListener('load', () => { setTimeout(() => window.MindSharpAds.init(), 800); });

    function loadStats() {
      try {
        const s = localStorage.getItem('ms_stats');
        return s ? JSON.parse(s) : { totalGames:0, totalWins:0, bestScores:{}, bestMoves:{}, bestTime:{}, totalMoves:0, totalTime:0, maxCombo:0, streak:[] };
      } catch { return { totalGames:0, totalWins:0, bestScores:{}, bestMoves:{}, bestTime:{}, totalMoves:0, totalTime:0, maxCombo:0, streak:[] }; }
    }
    function saveStats(stats) { try { localStorage.setItem('ms_stats', JSON.stringify(stats)); } catch {} }
    function recordGameStats({ mode, moves, time, score, comboBonus }) {
      const stats = loadStats();
      stats.totalGames = (stats.totalGames || 0) + 1;
      stats.totalWins  = (stats.totalWins  || 0) + 1;
      if (!stats.bestScores[mode] || score > stats.bestScores[mode]) stats.bestScores[mode] = score;
      if (!stats.bestMoves[mode]  || moves < stats.bestMoves[mode])  stats.bestMoves[mode]  = moves;
      if (!stats.bestTime[mode]   || time  < stats.bestTime[mode])   stats.bestTime[mode]   = time;
      stats.totalMoves = (stats.totalMoves || 0) + moves;
      stats.totalTime  = (stats.totalTime  || 0) + time;
      if (comboBonus > (stats.maxCombo || 0)) stats.maxCombo = comboBonus;
      const today = new Date().toISOString().slice(0, 10);
      if (!stats.streak) stats.streak = [];
      if (!stats.streak.includes(today)) stats.streak.push(today);
      saveStats(stats);
      return stats;
    }
    function getStreakCount(streak) {
      if (!streak || streak.length === 0) return 0;
      const sorted = [...streak].sort().reverse();
      let count = 0;
      let cur = new Date();
      cur.setHours(0,0,0,0);
      for (const d of sorted) {
        const dd = new Date(d);
        dd.setHours(0,0,0,0);
        const diff = Math.round((cur - dd) / 86400000);
        if (diff === 0 || diff === count) { count++; cur = dd; }
        else break;
      }
      return count;
    }

    const TILE_COLORS = ['#E8000A', '#29B6F6', '#F9A825', '#212121'];
    const GRID_CONFIGS = {
      '8x4': { rows:4, cols:8, pairs:16, maxNum:4, difficulty:'Classic', tileCount:32 },
      '8x7': { rows:7, cols:8, pairs:28, maxNum:7, difficulty:'Hard',    tileCount:56 },
    };
    const PREVIEW_TILES = [
      { color:'#E8000A', number:1, rot:-8,  y: 4 },
      { color:'#29B6F6', number:4, rot: 4,  y:-6 },
      { color:'#F9A825', number:7, rot:-5,  y: 8 },
      { color:'#212121', number:9, rot: 7,  y:-3 },
    ];

    function generateTiles(pairs, maxNum) {
      const colorCount = TILE_COLORS.length;
      const uniquePairs = [];
      for (let n = 1; n <= maxNum; n++) {
        for (let c = 0; c < colorCount; c++) uniquePairs.push({ number:n, color:TILE_COLORS[c] });
      }
      for (let i = uniquePairs.length-1; i > 0; i--) {
        const j = Math.floor(Math.random()*(i+1));
        [uniquePairs[i],uniquePairs[j]] = [uniquePairs[j],uniquePairs[i]];
      }
      const selected = uniquePairs.slice(0,pairs);
      const allTiles = [...selected,...selected].map((p,idx) => ({ id:idx, number:p.number, color:p.color, flipped:false, matched:false }));
      for (let i = allTiles.length-1; i > 0; i--) {
        const j = Math.floor(Math.random()*(i+1));
        [allTiles[i],allTiles[j]] = [allTiles[j],allTiles[i]];
      }
      return allTiles;
    }

    function calcScore({ pairs, moves, time, comboBonus }) {
      const baseScore = pairs * 100;
      const movePenalty = Math.max(0,(moves-pairs)*8);
      const timePenalty = Math.floor(time*1.5);
      return Math.max(0, baseScore - movePenalty - timePenalty + comboBonus);
    }

    function mulberry32(seed) {
      return function() {
        seed |= 0; seed = seed + 0x6D2B79F5 | 0;
        let t = Math.imul(seed ^ seed >>> 15, 1|seed);
        t = t + Math.imul(t ^ t >>> 7, 61|t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
      };
    }
    function getDailyDateKey() {
      const d = new Date();
      return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
    }
    function getDailySeed() {
      const key = getDailyDateKey();
      let hash = 0;
      for (let i = 0; i < key.length; i++) hash = Math.imul(31,hash) + key.charCodeAt(i) | 0;
      return Math.abs(hash);
    }
    function generateDailyTiles(gridMode) {
      const m = gridMode || '8x4';
      const cfg = GRID_CONFIGS[m];
      const sharedKey = getDailyDateKey() + m;
      let sharedHash = 0;
      for (let i = 0; i < sharedKey.length; i++) sharedHash = Math.imul(31,sharedHash) + sharedKey.charCodeAt(i) | 0;
      const sharedRng = mulberry32(Math.abs(sharedHash));
      const colorCount = TILE_COLORS.length;
      const uniquePairs = [];
      for (let n = 1; n <= cfg.maxNum; n++) {
        for (let c = 0; c < colorCount; c++) uniquePairs.push({ number:n, color:TILE_COLORS[c] });
      }
      for (let i = uniquePairs.length-1; i > 0; i--) {
        const j = Math.floor(sharedRng()*(i+1));
        [uniquePairs[i],uniquePairs[j]] = [uniquePairs[j],uniquePairs[i]];
      }
      const selected = uniquePairs.slice(0,cfg.pairs);
      const uid = (() => {
        try {
          let id = localStorage.getItem('ms_uid');
          if (!id) { id = Math.random().toString(36).slice(2)+Date.now().toString(36); localStorage.setItem('ms_uid',id); }
          return id;
        } catch { return 'anon'; }
      })();
      const personalKey = getDailyDateKey()+m+uid;
      let personalHash = 0;
      for (let i = 0; i < personalKey.length; i++) personalHash = Math.imul(31,personalHash) + personalKey.charCodeAt(i) | 0;
      const personalRng = mulberry32(Math.abs(personalHash));
      const allTiles = [...selected,...selected].map((p,idx) => ({ id:idx, number:p.number, color:p.color, flipped:false, matched:false }));
      for (let i = allTiles.length-1; i > 0; i--) {
        const j = Math.floor(personalRng()*(i+1));
        [allTiles[i],allTiles[j]] = [allTiles[j],allTiles[i]];
      }
      return allTiles;
    }

    function loadDailyStreak() {
      try { const raw = localStorage.getItem('ms_daily_streak'); return raw ? JSON.parse(raw) : { count:0, lastDate:null }; }
      catch { return { count:0, lastDate:null }; }
    }
    function saveDailyStreak(streak) { try { localStorage.setItem('ms_daily_streak', JSON.stringify(streak)); } catch {} }
    function updateStreak() {
      const today = getDailyDateKey();
      const streak = loadDailyStreak();
      if (streak.lastDate === today) return streak;
      const yesterday = (() => {
        const d = new Date(); d.setDate(d.getDate()-1);
        return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
      })();
      const newCount = streak.lastDate === yesterday ? streak.count+1 : 1;
      const newStreak = { count:newCount, lastDate:today };
      saveDailyStreak(newStreak);
      return newStreak;
    }
    function hasDoneToday() { return loadDailyStreak().lastDate === getDailyDateKey(); }
    function getDailyResult(gridMode) {

    function useSound() {
      const ctx = useRef(null);
      const getCtx = () => {
        if (!ctx.current) { try { ctx.current = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {} }
        return ctx.current;
      };
      const play = (type) => {
        const ac = getCtx(); if (!ac) return;
        if (type === 'win') {
          [523,659,784,1047].forEach((f,i) => {
            const o2=ac.createOscillator(); const g2=ac.createGain();
            o2.connect(g2); g2.connect(ac.destination); o2.frequency.value=f;
            g2.gain.setValueAtTime(0.12,ac.currentTime+i*0.12);
            g2.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+i*0.12+0.3);
            o2.start(ac.currentTime+i*0.12); o2.stop(ac.currentTime+i*0.12+0.3);
          }); return;
        }
        if (type === 'combo3') {
          [523,659,784,880,1047].forEach((f,i) => {
            const o2=ac.createOscillator(); const g2=ac.createGain();
            o2.connect(g2); g2.connect(ac.destination); o2.type='sine'; o2.frequency.value=f;
            g2.gain.setValueAtTime(0.18,ac.currentTime+i*0.07);
            g2.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+i*0.07+0.25);
            o2.start(ac.currentTime+i*0.07); o2.stop(ac.currentTime+i*0.07+0.25);
          }); return;
        }
        if (type === 'combo') {
          [660,880].forEach((f,i) => {
            const o2=ac.createOscillator(); const g2=ac.createGain();
            o2.connect(g2); g2.connect(ac.destination); o2.type='sine'; o2.frequency.value=f;
            g2.gain.setValueAtTime(0.14,ac.currentTime+i*0.1);
            g2.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+i*0.1+0.25);
            o2.start(ac.currentTime+i*0.1); o2.stop(ac.currentTime+i*0.1+0.25);
          }); return;
        }
        const o = ac.createOscillator(); const g = ac.createGain();
        o.connect(g); g.connect(ac.destination);
        if (type==='flip')  { o.frequency.value=440; g.gain.setValueAtTime(0.1,ac.currentTime); g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.1); }
        else if (type==='match') { o.frequency.value=660; o.frequency.setValueAtTime(880,ac.currentTime+0.1); g.gain.setValueAtTime(0.15,ac.currentTime); g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.3); }
        else if (type==='fail')  { o.frequency.value=220; g.gain.setValueAtTime(0.08,ac.currentTime); g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.2); }
        o.start(); o.stop(ac.currentTime+0.3);
      };
      return play;
    }

                    background: i===0 ? 'rgba(241,196,15,0.25)' : 'rgba(255,255,255,0.1)',
                    borderRadius:8, fontSize:11,
                    border: i===0 ? '1px solid rgba(255,200,0,0.4)' : '1px solid rgba(255,255,255,0.05)' }}>
                    <span style={{ fontWeight:700, color:i===0?'#ffe066':'#fff', minWidth:52, flexShrink:0 }}>#{i+1}</span>
                    <span style={{ color:'#fff', fontWeight:600, flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{s.user || t('guest')}</span>
                    <span style={{ color:'#ffe082', fontWeight:800, minWidth:44, textAlign:'right', flexShrink:0 }}>{s.score ? s.score.toLocaleString() : '-'}</span>
                    <span style={{ color:'#ffe082', minWidth:36, textAlign:'right', flexShrink:0 }}>{s.moves}mv</span>
                    <span style={{ color:'#ffe082', minWidth:36, textAlign:'right', flexShrink:0 }}>{formatTime(s.time)}</span>
                    <span style={{ color:'rgba(255,224,130,0.7)', minWidth:52, textAlign:'right', flexShrink:0, fontSize:10 }}>{formatDate(s.createdAt)}</span>
                  </div>
                ))}
              </div>
            )
          }
          {filtered.length > 0 && (
            <>
              <button onClick={() => setConfirmClear(true)}
                style={{ width:'100%', marginTop:8, padding:'8px', borderRadius:10, border:'1.5px solid #c0392b',
                  background:'rgba(0,0,0,0.3)', color:'#e74c3c', fontWeight:600, fontSize:12, cursor:'pointer' }}>
                {t('clear_scores', {difficulty: tDiff(GRID_CONFIGS[activeCategory].difficulty)})}
              </button>
              {confirmClear && (
                <ConfirmDialog
                  title={t("clear_confirm_title")}
                  message={t('clear_confirm_msg', {difficulty: tDiff(GRID_CONFIGS[activeCategory].difficulty)})}
                  confirmLabel={t("delete_all")}
                  onConfirm={() => { setConfirmClear(false); onClearCategory(activeCategory); }}
                  onCancel={() => setConfirmClear(false)}
                />
              )}
            </>
          )}
        </div>
      );
    }

    function DailyCompleteModal({ result, streak, onMenu, onShare, onLeaderboard, user, alreadyDone, dailyRank, dailyTotal, personalBest, onSaveName }) {
      const [confetti, setConfetti] = React.useState([]);
      const [nameInput, setNameInput] = React.useState(user || '');
      const [nameSaved, setNameSaved] = React.useState(!!user);
      React.useEffect(() => {
        const colors = ['#f39c12','#e74c3c','#2ecc71','#3498db','#9b59b6','#f1c40f'];
        const shapes = ['■','●','▲','★','◆'];
        setConfetti(Array.from({ length:36 }, (_,i) => ({
          id:i, color:colors[i%colors.length], shape:shapes[i%shapes.length],
          left:Math.random()*100, delay:Math.random()*1.8,
          duration:2.2+Math.random()*2, size:8+Math.random()*9,
        })));
      }, []);
      const fmtT = s => `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
      const today = new Date();
      const dateLabel = today.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
      const streakFire = streak.count >= 7 ? '🔥' : streak.count >= 3 ? '⚡' : '✨';
      const isPersonalBest = personalBest && result.score >= personalBest;
      const rankLabel = dailyRank ? (dailyRank===1?'🥇 #1':dailyRank===2?'🥈 #2':dailyRank===3?'🥉 #3':`#${dailyRank}`) : null;
      const rankColor = dailyRank===1?'#f1c40f':dailyRank<=3?'#e67e22':'#aaa';
      const tomorrowMsg = streak.count===0 ? t("daily_start_streak") :
        streak.count<3 ? t('daily_unlock_bolt',{n:3-streak.count}) :
        streak.count<7 ? t('daily_unlock_fire',{n:7-streak.count}) :
        t('daily_on_fire');
      return (
        <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.82)', zIndex:10000,
          display:'flex', alignItems:'center', justifyContent:'center', padding:'16px' }}>
          {confetti.map(p => (
            <div key={p.id} style={{ position:'fixed', top:'-20px', left:`${p.left}%`,
              fontSize:p.size, color:p.color, animation:`fall ${p.duration}s ${p.delay}s ease-in forwards`,
              pointerEvents:'none', zIndex:10001 }}>{p.shape}</div>
          ))}
          <div style={{ background:'linear-gradient(160deg,#2a1e08,#1a1004)', borderRadius:24,
            padding:'24px 20px 20px', width:'100%', maxWidth:360, boxSizing:'border-box',
            border:'1.5px solid rgba(255,210,80,0.3)', boxShadow:'0 12px 50px rgba(0,0,0,0.8)',
            textAlign:'center', position:'relative', zIndex:10002, maxHeight:'90vh', overflowY:'auto' }}>
            <div style={{ fontSize:40, marginBottom:4 }}>🎯</div>
            <h2 style={{ color:'#ffe066', fontFamily:'Georgia,serif', margin:'0 0 1px', fontSize:22 }}>
              {alreadyDone ? t("daily_today") : t("daily_complete")}
            </h2>
            <p style={{ color:'rgba(255,255,255,0.4)', fontSize:11, margin:'0 0 16px', letterSpacing:0.5 }}>{dateLabel}</p>
            {isPersonalBest && !alreadyDone && (
              <div style={{ background:'linear-gradient(135deg,rgba(241,196,15,0.25),rgba(243,156,18,0.15))',
                border:'1px solid rgba(241,196,15,0.5)', borderRadius:10, padding:'6px 14px',
                color:'#f1c40f', fontWeight:800, fontSize:13, marginBottom:12, display:'inline-block' }}>
                {t("daily_personal_best")}
              </div>
            )}
            <div style={{ display:'flex', gap:8, marginBottom:12 }}>
              {[
                { label:t('time_label'),  value:fmtT(result.time),             icon:'⏱' },
                { label:t('moves_label'), value:result.moves,                  icon:'🃏' },
                { label:t('score_label'), value:result.score.toLocaleString(), icon:'🏆' },
              ].map(s => (
                <div key={s.label} style={{ flex:1, background:'rgba(0,0,0,0.4)', borderRadius:12,
                  padding:'10px 4px', border:'1px solid rgba(255,255,255,0.08)' }}>
                  <div style={{ fontSize:14, marginBottom:2 }}>{s.icon}</div>
                  <div style={{ color:'#ffe066', fontWeight:900, fontSize:17 }}>{s.value}</div>
                  <div style={{ color:'rgba(255,255,255,0.35)', fontSize:9, letterSpacing:1 }}>{s.label}</div>
                </div>
              ))}
            </div>
            <div style={{ background:'rgba(255,255,255,0.05)', border:'1px solid rgba(255,255,255,0.1)',
              borderRadius:14, padding:'12px 14px', marginBottom:10, display:'flex', alignItems:'center', gap:12 }}>
              <div style={{ flex:1, textAlign:'left' }}>
                <div style={{ color:'rgba(255,255,255,0.45)', fontSize:10, letterSpacing:1, marginBottom:2 }}>{t("daily_ranking")}</div>
                {rankLabel ? (
                  <div style={{ color:rankColor, fontWeight:900, fontSize:20 }}>{rankLabel}</div>
                ) : (
                  <div style={{ color:'rgba(255,255,255,0.35)', fontSize:13 }}>{t("daily_calculating")}</div>
                )}
                {dailyTotal > 0 && (
                  <div style={{ color:'rgba(255,255,255,0.35)', fontSize:11 }}>{t("daily_out_of", {n:dailyTotal})}</div>
                )}
              </div>
              <button onClick={onLeaderboard} style={{ background:'rgba(255,180,0,0.15)',
                border:'1px solid rgba(255,180,0,0.35)', borderRadius:10, padding:'8px 12px',
                color:'#ffb300', fontWeight:700, fontSize:12, cursor:'pointer' }}>
                {t("daily_view_all")}
              </button>
            </div>
            <div style={{ background:'rgba(255,140,0,0.1)', border:'1px solid rgba(255,140,0,0.25)',
              borderRadius:14, padding:'10px 14px', marginBottom:14, display:'flex', alignItems:'center', gap:10 }}>
              <div style={{ fontSize:26 }}>{streakFire}</div>
              <div style={{ textAlign:'left', flex:1 }}>
                <div style={{ color:'#ffb300', fontWeight:900, fontSize:16 }}>{streak.count} {t("daily_day_streak")}</div>
                <div style={{ color:'rgba(255,255,255,0.4)', fontSize:11, marginTop:1 }}>{tomorrowMsg}</div>
              </div>
            </div>
            {(!nameSaved || !nameInput.trim()) ? (
              <div style={{ marginBottom:14, borderRadius:14,
                background:'linear-gradient(135deg,rgba(255,220,80,0.18),rgba(243,156,18,0.12))',
                border:'1.5px solid rgba(255,210,60,0.55)', padding:'14px 14px 12px',
                boxShadow:'0 0 18px rgba(243,156,18,0.15)' }}>
                <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:8, justifyContent:'center' }}>
                  <span style={{ fontSize:16 }}>👤</span>
                  <span style={{ color:'#ffe066', fontWeight:800, fontSize:13 }}>{t("daily_add_name")}</span>
                </div>
                <div style={{ display:'flex', flexDirection:'column', gap:7 }}>
                  <input type="text" value={nameInput} onChange={e => setNameInput(e.target.value)}
                    onKeyDown={e => { if (e.key==='Enter') { const n=nameInput.trim(); if(n){onSaveName(n);setNameSaved(true);} } }}
                    placeholder={t("name_placeholder")} maxLength={20}
                    style={{ width:'100%', padding:'11px 13px', borderRadius:11, background:'rgba(255,255,255,0.92)',
                      border:'2px solid rgba(243,156,18,0.7)', color:'#1a0e00', fontSize:15, fontWeight:600,
                      outline:'none', boxSizing:'border-box' }}
                  />
                  <button onClick={() => { const n=nameInput.trim(); if(n){onSaveName(n);setNameSaved(true);} }}
                    style={{ width:'100%', padding:'12px', borderRadius:11, border:'none',
                      background: nameInput.trim() ? 'linear-gradient(135deg,#f39c12,#e67e22)' : 'rgba(200,169,110,0.3)',
                      color:'#fff', fontWeight:800, fontSize:15, cursor:'pointer',
                      boxShadow: nameInput.trim() ? '0 3px 12px rgba(243,156,18,0.4)' : 'none', transition:'all 0.2s' }}>
                    {t("save_button")}
                  </button>
                </div>
              </div>
            ) : (
              <div style={{ color:'rgba(255,255,255,0.45)', fontSize:12, textAlign:'center', padding:'4px 0 10px' }}>
                {t("daily_leaderboard_name")} <span style={{ color:'#ffe066', fontWeight:700 }}>{nameInput}</span>
                <button onClick={() => setNameSaved(false)} style={{ background:'none', border:'none',
                  color:'rgba(255,180,0,0.5)', fontSize:11, cursor:'pointer', marginLeft:6 }}>
                  {t("daily_edit")}
                </button>
              </div>
            )}
            <button onClick={onShare} style={{ width:'100%', padding:'13px', borderRadius:14, marginBottom:8,
              background:'linear-gradient(135deg,#f39c12,#e67e22)', border:'none',
              color:'#fff', fontWeight:800, fontSize:15, cursor:'pointer' }}>
              {t("daily_share_result")}
            </button>
            <button onClick={onMenu} style={{ width:'100%', padding:'11px', borderRadius:14,
              background:'rgba(255,255,255,0.06)', border:'1px solid rgba(255,255,255,0.12)',
              color:'rgba(255,255,255,0.55)', fontWeight:600, fontSize:13, cursor:'pointer' }}>
              {t("daily_back_menu")}
            </button>
          </div>
        </div>
      );
    }

    function DailyScoresScreen({ onBack, dateKey, gridMode, myScore }) {
      const [entries, setEntries] = React.useState([]);
      const [loading, setLoading] = React.useState(true);
      const fmtT = s => String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
      const modeLabel = { '8x4':t('difficulty_classic'), '8x7':t('difficulty_hard') }[gridMode] || gridMode;
      const today = new Date();
      const dateLabel = today.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
      React.useEffect(() => {
        if (!db) { setLoading(false); return; }
        db.collection('daily_scores').where('dateKey','==',dateKey).where('gridMode','==',gridMode).get()
          .then(snap => {
            const rows = snap.docs.map(d => d.data());
            rows.sort((a,b) => (b.score||0)-(a.score||0));
            setEntries(rows); setLoading(false);
          }).catch(() => setLoading(false));
      }, [dateKey, gridMode]);
      return (
        <div style={{ width:'100%', display:'flex', flexDirection:'column', gap:10 }}>
          {/* Header — ScoreBoard ile aynı */}
          <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:4 }}>
            <button onClick={onBack} style={{ background:'rgba(0,0,0,0.35)', border:'1px solid rgba(255,255,255,0.2)',
              color:'#ffe082', borderRadius:10, padding:'7px 13px', cursor:'pointer', fontSize:16 }}>←</button>
            <h2 style={{ color:'#ffe082', fontFamily:'Georgia,serif', margin:0, fontSize:20,
              textShadow:'0 2px 6px rgba(0,0,0,0.8)' }}>{t('daily_header',{mode:modeLabel})}</h2>
          </div>

          <div style={{ background:'rgba(0,0,0,0.5)', borderRadius:16, padding:'14px 10px',
            border:'1px solid rgba(255,255,255,0.15)', backdropFilter:'blur(4px)' }}>

            {/* Tarih + oyuncu sayısı satırı */}
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10, padding:'0 4px' }}>
              <span style={{ color:'#ffe082', fontSize:12, fontWeight:700 }}>{dateLabel}</span>
              <span style={{ color:'rgba(255,224,130,0.6)', fontSize:11 }}>
                {getLang()==='tr' ? 'Bugün oynayan ' + entries.length + ' oyuncu' : entries.length + ' players today'}
              </span>
            </div>

            {loading ? (
              <div style={{ color:'rgba(255,255,255,0.4)', textAlign:'center', padding:24 }}>{t('loading')}</div>
            ) : entries.length===0 ? (
              <div style={{ color:'#ffe082', textAlign:'center', fontSize:13, margin:'16px 0' }}>{t("daily_no_scores")}</div>
            ) : (
              <div style={{ maxHeight:400, overflowY:'auto' }}>
                {entries.map((e,i) => {
                  const isMe = myScore > 0 && e.score === myScore;
                  const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
                  return (
                    <div key={i} style={{ display:'flex', alignItems:'center', padding:'6px 8px', marginBottom:4, gap:4,
                      background: isMe ? 'rgba(243,156,18,0.25)' : i===0 ? 'rgba(241,196,15,0.25)' : 'rgba(255,255,255,0.1)',
                      borderRadius:8, fontSize:11,
                      border: isMe ? '1.5px solid rgba(243,156,18,0.6)' : i===0 ? '1px solid rgba(255,200,0,0.4)' : '1px solid rgba(255,255,255,0.05)' }}>
                      {/* Sıra / madalya */}
                      <span style={{ fontWeight:700, color: medal ? '#ffe066' : isMe ? '#ffe066' : '#fff',
                        minWidth:52, flexShrink:0, fontSize:13 }}>
                        {medal || ('#'+(i+1))}
                      </span>
                      {/* İsim */}
                      <span style={{ color: isMe ? '#ffe066' : '#fff', fontWeight: isMe ? 800 : 600,
                        flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
                        {e.user||t('guest')}
                      </span>
                      {/* Sen badge */}
                      {isMe && (
                        <span style={{ background:'rgba(243,156,18,0.35)', border:'1px solid rgba(243,156,18,0.6)',
                          color:'#ffe082', fontSize:9, fontWeight:800, padding:'1px 6px', borderRadius:20, flexShrink:0, marginRight:2 }}>
                          {getLang()==='tr' ? 'sen' : 'you'}
                        </span>
                      )}
                      {/* Skor */}
                      <span style={{ color:'#ffe082', fontWeight:800, minWidth:44, textAlign:'right', flexShrink:0 }}>
                        {(e.score||0).toLocaleString()}
                      </span>
                      {/* Hamle */}
                      <span style={{ color:'#ffe082', minWidth:36, textAlign:'right', flexShrink:0 }}>
                        {(e.moves||0)}mv
                      </span>
                      {/* Süre */}
                      <span style={{ color:'#ffe082', minWidth:36, textAlign:'right', flexShrink:0 }}>
                        {fmtT(e.time||0)}
                      </span>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </div>
      );
    }

    function WinModal({ moves, time, mode, score, comboBonus, rank, user, scoreDocId, onReplay, onMenu, onScores, onSaveName, onScoreDoubled }) {
      const [sharing, setSharing] = React.useState(false);
      const [confetti, setConfetti] = React.useState([]);
      const [nameInput, setNameInput] = React.useState('');
      const [nameSaved, setNameSaved] = React.useState(false);
      const [adWatched, setAdWatched] = React.useState(false);
      const [adLoading, setAdLoading] = React.useState(false);
      const [adAvailable, setAdAvailable] = React.useState(false);
      const needsName = !user || user.trim() === '';

      // Character & fact — sabit kalsın, her render'da değişmesin
      const character = React.useMemo(() => getCharacter(score), [score]);
      const fact = React.useMemo(() => getRandomFact(), []);

      React.useEffect(() => {
        const check = () => setAdAvailable(!!(window.MindSharpAds && window.MindSharpAds.isReady()));
        check();
        const timer = setInterval(check,1000);
        return () => clearInterval(timer);
      }, []);
      const handleWatchAd = () => {
        if (adWatched||adLoading) return;
        setAdLoading(true);
        window.MindSharpAds.showRewarded((rewarded) => {
          setAdLoading(false);
          if (rewarded) { setAdWatched(true); onScoreDoubled && onScoreDoubled(); }
        });
      };
      const displayName = needsName ? (nameSaved ? nameInput : t('well_played')) : user;
      const handleSaveName = () => {
        const n = nameInput.trim();
        if (!n) return;
        onSaveName(n);
        if (scoreDocId) updateScoreUsername(scoreDocId, n);
        setNameSaved(true);
      };
      React.useEffect(() => {
        const colors = ['#f39c12','#e74c3c','#2ecc71','#3498db','#9b59b6','#f1c40f','#1abc9c','#e67e22'];
        const shapes = ['■','●','▲','★','◆'];
        setConfetti(Array.from({ length:38 }, (_,i) => ({
          id:i, color:colors[Math.floor(Math.random()*colors.length)],

          left:Math.random()*100, delay:Math.random()*2.5,

        })));

      const getRankInfo = () => {

        if (rank<=10) return { label:t('top10'), color:'#27ae60', bg:'rgba(39,174,96,0.15)' };
        return { label:`Rank #${rank}`, color:'#7f8c8d', bg:'rgba(127,140,141,0.12)' };
      };
      const rankInfo = getRankInfo();
      const today = new Date();
      const dateStr = `${String(today.getDate()).padStart(2,'0')}-${String(today.getMonth()+1).padStart(2,'0')}-${today.getFullYear()}`;
      const lang = getLang();

      const charQuote = lang==='tr' ? character.quotetr : character.quoteen;
      const factText = lang==='tr' ? fact.tr : fact.en;

      const buildCertificate = async () => {
        const W=1080, H=1920;
        const canvas = document.createElement('canvas');
        canvas.width=W; canvas.height=H;
        const ctx = canvas.getContext('2d');

        // Arka plan
        const bgImg = new Image(); bgImg.crossOrigin='anonymous'; bgImg.src='./wood_bg.png';
        await new Promise(r => { bgImg.onload=r; bgImg.onerror=r; });
        ctx.fillStyle='#2b1a10'; ctx.fillRect(0,0,W,H);
        try {
          const r = Math.max(W/bgImg.width, H/bgImg.height);
          ctx.drawImage(bgImg,(W-bgImg.width*r)/2,(H-bgImg.height*r)/2,bgImg.width*r,bgImg.height*r);
        } catch(e) {}
        const vg=ctx.createRadialGradient(W/2,H*0.4,50,W/2,H*0.4,H*0.7);
        vg.addColorStop(0,'rgba(0,0,0,0.2)'); vg.addColorStop(1,'rgba(0,0,0,0.78)');
        ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);

        // Ana kart
        const cx=60,cy=140,cw=W-120,ch=H-300,cr=48;
        const rr=(x,y,w,h,r)=>{ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();};
        ctx.save();ctx.shadowColor='rgba(0,0,0,0.6)';ctx.shadowBlur=60;ctx.shadowOffsetY=20;
        rr(cx,cy,cw,ch,cr);
        const cardGrad=ctx.createLinearGradient(cx,cy,cx,cy+ch);
        cardGrad.addColorStop(0,'#fdf6e3');cardGrad.addColorStop(0.5,'#fef9ed');cardGrad.addColorStop(1,'#f5e6c8');
        ctx.fillStyle=cardGrad;ctx.fill();ctx.restore();
        rr(cx,cy,cw,ch,cr);ctx.lineWidth=10;ctx.strokeStyle='#c8a96e';ctx.stroke();

        // Gold top bar
        ctx.fillStyle='#b8860b';
        for(let i=0;i<W;i+=3){const g=ctx.createLinearGradient(0,cy,0,cy+12);g.addColorStop(0,'#f0c040');g.addColorStop(1,'#b8860b');ctx.fillStyle=g;}
        ctx.fillRect(cx+10,cy,cw-20,12);

        // MindSharp başlık
        ctx.save();ctx.textAlign='center';
        ctx.font='900 110px Georgia,serif';
        const tg=ctx.createLinearGradient(W/2-250,0,W/2+250,0);
        tg.addColorStop(0,'#8B4513');tg.addColorStop(0.5,'#c8860a');tg.addColorStop(1,'#8B4513');
        ctx.fillStyle=tg;ctx.shadowColor='rgba(0,0,0,0.2)';ctx.shadowBlur=8;
        ctx.fillText('MindSharp',W/2,cy+150);ctx.restore();

        // Achievement banner
        const bx=cx+80,by=cy+178,bw=cw-160,bh=68,br=12;
        rr(bx,by,bw,bh,br);
        const bg2=ctx.createLinearGradient(bx,by,bx+bw,by);
        bg2.addColorStop(0,'#b8860b');bg2.addColorStop(0.5,'#f0c040');bg2.addColorStop(1,'#b8860b');
        ctx.fillStyle=bg2;ctx.fill();
        ctx.save();ctx.textAlign='center';ctx.font='800 34px Segoe UI,Arial';ctx.fillStyle='#5a2d00';
        ctx.fillText(lang==='tr'?'T E B R İ K L E R !':'C O N G R A T U L A T I O N S !',W/2,by+46);ctx.restore();

        // Rank — only for top 3
        if(rank && rank<=3){
          const rankColor=rank===1?'#f1c40f':rank<=3?'#e67e22':'#27ae60';
          const rankLabel=rank===1?(lang==='tr'?'YENİ REKOR!':'NEW RECORD!'):(lang==='tr'?'İLK 3 — Harika!':'TOP 3 — Amazing!');
          ctx.save();ctx.textAlign='center';ctx.font='900 42px Segoe UI';ctx.fillStyle=rankColor;
          ctx.fillText(rankLabel,W/2,cy+298);ctx.restore();
        }

        // Kullanıcı adı
        ctx.save();ctx.textAlign='center';
        ctx.font='900 80px Segoe UI,Arial';ctx.fillStyle='#3d1a00';ctx.shadowColor='rgba(0,0,0,0.15)';ctx.shadowBlur=8;
        ctx.fillText((user||t('guest')).trim(),W/2,cy+468);ctx.restore();

        // ── Karakter görselini canvas'a çiz ──
        const charImg = new Image();
        charImg.crossOrigin = 'anonymous';
        charImg.src = character.img;
        await new Promise(r => { charImg.onload=r; charImg.onerror=r; });
        try { ctx.drawImage(charImg, W/2-160, cy+490, 320, 320); } catch(e){}

        // Karakter ismi pill
        const pillX=W/2-200, pillY=cy+830, pillW=400, pillH=70;
        rr(pillX,pillY,pillW,pillH,35);
        ctx.fillStyle=character.labelBg||'#3a6aff';ctx.fill();
        ctx.save();ctx.textAlign='center';ctx.font='800 32px Segoe UI,Arial';ctx.fillStyle='#fff';
        ctx.fillText(charName,W/2,pillY+46);ctx.restore();

        // Skor bloğu
        const spx=cx+70,spy=cy+1020,spw=cw-140,sph=220,spr=28;
        rr(spx,spy,spw,sph,spr);
        ctx.save();ctx.shadowColor='rgba(200,120,0,0.4)';ctx.shadowBlur=28;ctx.shadowOffsetY=10;
        const sg=ctx.createLinearGradient(spx,spy,spx+spw,spy+sph);
        sg.addColorStop(0,'#e67e22');sg.addColorStop(1,'#c0392b');ctx.fillStyle=sg;ctx.fill();ctx.restore();
        ctx.save();ctx.textAlign='center';
        ctx.font='800 30px Segoe UI';ctx.fillStyle='rgba(255,255,255,0.85)';ctx.fillText(t('score_label'),W/2,spy+58);
        ctx.font='900 140px Segoe UI,Arial';ctx.fillStyle='#fff';ctx.fillText(score.toLocaleString(),W/2,spy+188);ctx.restore();
        if(comboBonus>0){ctx.save();ctx.textAlign='center';ctx.font='700 28px Segoe UI';ctx.fillStyle='rgba(255,255,200,0.9)';ctx.fillText(`🔥 +${comboBonus} ${lang==='tr'?'Kombo Bonusu':'Combo Bonus'}`,W/2,spy+216);ctx.restore();}

        // Stats
        const statsY=cy+1290;
        [{label:t('moves_label'),value:moves,color:'#e74c3c'},{label:t('time_label'),value:formatTime(time),color:'#3498db'},{label:t('rank_label'),value:rank?`#${rank}`:'-',color:rank===1?'#f1c40f':rank<=3?'#e67e22':'#27ae60'}].forEach((col,i)=>{
          const colX=cx+70+i*((cw-140)/3)+((cw-140)/3)/2;
          if(i>0){ctx.save();ctx.strokeStyle='rgba(180,140,80,0.35)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(cx+70+i*(cw-140)/3,statsY-20);ctx.lineTo(cx+70+i*(cw-140)/3,statsY+120);ctx.stroke();ctx.restore();}
          ctx.save();ctx.textAlign='center';ctx.font='700 28px Segoe UI';ctx.fillStyle='rgba(100,60,10,0.6)';ctx.fillText(col.label,colX,statsY);
          ctx.font='900 72px Segoe UI,Arial';ctx.fillStyle=col.color;ctx.fillText(String(col.value),colX,statsY+88);ctx.restore();
        });

        // Footer
        ctx.save();ctx.strokeStyle='rgba(180,140,80,0.3)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(cx+100,cy+ch-130);ctx.lineTo(cx+cw-100,cy+ch-130);ctx.stroke();
        ctx.textAlign='center';ctx.font='600 28px Segoe UI';ctx.fillStyle='rgba(100,60,10,0.5)';ctx.fillText(`✦  ${dateStr}  ✦`,W/2,cy+ch-90);
        ctx.font='700 26px Segoe UI';ctx.fillStyle='rgba(100,60,10,0.45)';ctx.fillText('mindsharp.co',W/2,cy+ch-50);ctx.restore();

        return canvas.toDataURL('image/png');
      };

      const handleShare = async () => {
        try {
          setSharing(true);
          const dataUrl = await buildCertificate();
          const res = await fetch(dataUrl);
          const blob = await res.blob();
          const file = new File([blob],'mindsharp-certificate.png',{type:'image/png'});

            @keyframes rankGlow{0%,100%{box-shadow:0 0 8px currentColor}50%{box-shadow:0 0 22px currentColor,0 0 40px rgba(241,196,15,0.4)}}

                {t("share_certificate_hint")}

            </div>
          </div>
        </div>
      );
    }


    function useSettings() {
      const load = (key,def) => {
        try { const v=localStorage.getItem('ms_'+key); return v===null?def:JSON.parse(v); } catch { return def; }
      };
      const [sfx,setSfxRaw]             = React.useState(() => load('sfx',true));
      const [music,setMusicRaw]         = React.useState(() => load('music',true));
      const [vibration,setVibrationRaw] = React.useState(() => load('vibration',false));
      const save = (key,val) => { try { localStorage.setItem('ms_'+key,JSON.stringify(val)); } catch {} };
      const setSfx       = v => { setSfxRaw(v);       save('sfx',v); };
      const setMusic     = v => { setMusicRaw(v);     save('music',v); };
      const setVibration = v => { setVibrationRaw(v); save('vibration',v); };
      return { sfx,setSfx,music,setMusic,vibration,setVibration };
    }

      const bgSourceRef   = useRef(null);
      const bgBufferRef   = useRef(null);
      const bgLoadedRef   = useRef(false);
      const bgPlayingRef  = useRef(false);
      const musicEnabledRef = useRef(settings.music);
      useEffect(() => { musicEnabledRef.current = settings.music; }, [settings.music]);
      const getAudioCtx = () => {
        if (!bgAudioCtxRef.current) bgAudioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
        return bgAudioCtxRef.current;
      };
      const startBgMusic = () => {
        if (bgPlayingRef.current) return;
        const ctx = getAudioCtx();
        if (ctx.state === 'suspended') ctx.resume();
        if (!bgBufferRef.current) return;
        const source = ctx.createBufferSource();
        source.buffer = bgBufferRef.current;
        source.loop = true;
        const gainNode = ctx.createGain();
        gainNode.gain.value = 0.18;
        source.connect(gainNode);
        gainNode.connect(ctx.destination);
        source.start(0);
        bgSourceRef.current = source;
        bgPlayingRef.current = true;
      };
      const stopBgMusic = () => {
        if (!bgPlayingRef.current) return;
        try { bgSourceRef.current && bgSourceRef.current.stop(); } catch(e) {}
        bgSourceRef.current = null;
        bgPlayingRef.current = false;
      };
      useEffect(() => {
        if (bgLoadedRef.current) return;
        bgLoadedRef.current = true;
        fetch('./music.mp3').then(r => r.arrayBuffer()).then(ab => {
          const ctx = getAudioCtx();
          return ctx.decodeAudioData(ab);
        }).then(buffer => {
          bgBufferRef.current = buffer;
          if (musicEnabledRef.current) startBgMusic();
        }).catch(() => {});
      }, []);
      useEffect(() => {
        if (!bgBufferRef.current) return;
        if (settings.music) startBgMusic(); else stopBgMusic();
      }, [settings.music]);
      useEffect(() => {
        const tryStart = () => {
          const ctx = bgAudioCtxRef.current;
          if (ctx && ctx.state==='suspended') ctx.resume();
          if (musicEnabledRef.current && !bgPlayingRef.current && bgBufferRef.current) startBgMusic();
          document.removeEventListener('pointerdown', tryStart);
        };
        document.addEventListener('pointerdown', tryStart);
        return () => document.removeEventListener('pointerdown', tryStart);
      }, []);

      useEffect(() => {
        if (screen !== 'game') return;
        setShowHint(true);
        const timer = setTimeout(() => setShowHint(false), 5000);
        return () => clearTimeout(timer);
      }, [screen]);

      useEffect(() => {
        if (!db) return;
        const unsub = db.collection('scores').orderBy('score','desc').limit(500)
          .onSnapshot(snap => {
            setScores(snap.docs.map(d => ({ id:d.id, ...d.data() })));
          }, err => console.log('Firestore read error:', err));
        return () => unsub();
      }, []);

      const boardRef = useRef(null);
      const [boardWidth, setBoardWidth] = useState(330);
      useEffect(() => {
        if (screen !== 'game') return;
        const el = boardRef.current;
        if (!el) return;
        const update = () => setBoardWidth(el.clientWidth || 330);
        update();
        let ro;
        try { ro = new ResizeObserver(update); ro.observe(el); }
        catch(e) { window.addEventListener('resize', update); }
        return () => { if (ro) ro.disconnect(); window.removeEventListener('resize', update); };
      }, [screen, mode]);

      useEffect(() => {
        if (!running) return;
        const id = setInterval(() => setTime(t => t+1), 1000);
        return () => clearInterval(id);
      }, [running]);

      const showToast = useCallback((msg) => {
        setToast(msg);
        setTimeout(() => setToast(null), 2400);
      }, []);

      const startDailyChallenge = useCallback((m) => {
        const gm = m || mode;
        setTiles(generateDailyTiles(gm));
        setFlipped([]); setMoves(0); setMatched(0); setTime(0);
        setRunning(false); setWon(false); lockRef.current = false;
        setMode(gm); setScreen('game');
        trackEvent('game_start',{mode:gm,type:'daily'});
        setScore(0); setComboBonus(0); setCombo(0); setScoreDocId(null);
        comboBonusRef.current=0; comboRef.current=0;
        setIsDailyMode(true); isDailyRef.current=true;
        setDailyModeKey(gm); firstFlipTracked.current=false;
      }, [mode]);

      const startGame = useCallback((m) => {
        const cfg = GRID_CONFIGS[m];
        setTiles(generateTiles(cfg.pairs, cfg.maxNum));
        setFlipped([]); setMoves(0); setMatched(0); setTime(0);
        setRunning(false); setWon(false); lockRef.current = false;
        setMode(m); setScreen('game');
        trackEvent('game_start',{mode:m,type:'regular'});
        setScore(0); setComboBonus(0); setCombo(0); setScoreDocId(null);
        comboBonusRef.current=0; comboRef.current=0;
        setIsDailyMode(false); isDailyRef.current=false;
        firstFlipTracked.current=false;
      }, []);

      const firstFlipTracked = useRef(false);
      const handleTile = useCallback((id) => {
        if (lockRef.current) return;
        if (!running) {
          setRunning(true);
          if (!firstFlipTracked.current) {
            firstFlipTracked.current = true;
            trackEvent('game_first_flip',{mode,type:isDailyRef.current?'daily':'regular'});
          }
        }
        if (settings.sfx) play('flip');
        setTiles(prev => prev.map(t => t.id===id ? {...t,flipped:true} : t));
        setFlipped(prev => {
          const next = [...prev, id];
          if (next.length === 2) {
            lockRef.current = true;
            setMoves(m => m+1);
            setTimeout(() => {
              setTiles(cur => {
                const [a,b] = next.map(fid => cur.find(t => t.id===fid));
                if (a && b && a.number===b.number && a.color===b.color) {
                  const newCombo = comboRef.current+1;
                  comboRef.current = newCombo;
                  setCombo(newCombo);
                  let bonusPts = 0;
                  if (newCombo>=3) { bonusPts=60; if(settings.sfx)play('combo3'); trackEvent('combo_achieved',{combo:newCombo,mode}); }
                  else if (newCombo===2) { bonusPts=25; if(settings.sfx)play('combo'); trackEvent('combo_achieved',{combo:2,mode}); }
                  else { if(settings.sfx)play('match'); }
                  
                  comboBonusRef.current += bonusPts;
                  setComboBonus(b => b+bonusPts);
                  setMatchAnim([a.id,b.id]);
                  setTimeout(() => setMatchAnim([]), 600);
                  const newTiles = cur.map(t => next.includes(t.id) ? {...t,matched:true,flipped:false} : t);
                  const newMatchedCount = newTiles.filter(t => t.matched).length/2;
                  setMatched(newMatchedCount);
                  const activeM = isDailyRef.current ? dailyModeKey : mode;
                  const cfgP = GRID_CONFIGS[activeM] || GRID_CONFIGS[mode];
                  const pct = Math.round((newMatchedCount/cfgP.pairs)*100);
                  if (pct===25||pct===50||pct===75) trackEvent('game_progress',{percent:pct,mode:activeM,type:isDailyRef.current?'daily':'regular'});
                  const activeMode = isDailyRef.current ? dailyModeKey : mode;
                  const cfg = GRID_CONFIGS[activeMode] || GRID_CONFIGS[mode];
                  if (newMatchedCount === cfg.pairs) {
                    setRunning(false);
                    if (!isDailyRef.current) setWon(true);
                    if (settings.sfx) play('win');
                    setMoves((mv) => {
                      setTime((tm) => {
                        const finalScore = calcScore({pairs:cfg.pairs,moves:mv,time:tm,comboBonus:comboBonusRef.current});
                        setScore(finalScore);
                        const myEntry = {user:user||t('guest'),mode,moves:mv,time:tm,score:finalScore};
                        const sameMode = (scoresRef.current||[]).filter(s => s.mode===mode);
                        const merged = [...sameMode,myEntry].sort((a,b)=>(b.score||0)-(a.score||0));
                        const myRank = merged.findIndex(s => s.user===myEntry.user&&s.score===myEntry.score&&s.time===myEntry.time&&s.moves===myEntry.moves)+1;
                        setRank(myRank);
                        if (isDailyRef.current) {
                          const result = {moves:mv,time:tm,score:finalScore,gridMode:dailyModeKey};
                          saveDailyResult(result,dailyModeKey);
                          setDailyDoneMap(prev => ({...prev,[dailyModeKey]:true}));
                          const newStreak = updateStreak();
                          setDailyStreak(newStreak);
                          setDailyResult(result);
                          submitDailyScore({user:user||t('guest'),moves:mv,time:tm,score:finalScore,gridMode:dailyModeKey})
                            .then(docId => { if(docId) setDailyDocId(docId); });
                          (async () => {
                            try {
                              if (db) {
                                const dateKey = getDailyDateKey();
                                const snap = await db.collection('daily_scores')
                                  .where('dateKey','==',dateKey).where('gridMode','==',dailyModeKey).get();
                                const allScores = snap.docs.map(d => d.data().score||0).sort((a,b)=>b-a);
                                const total = allScores.length;
                                const rankPos = allScores.findIndex(s => s<=finalScore)+1||total;
                                setDailyRank(rankPos); setDailyTotal(total);
                                try {
                                  const stats = JSON.parse(localStorage.getItem('ms_stats')||'{}');
                                  const pb = stats.bestScores&&stats.bestScores[dailyModeKey];
                                  setDailyPersonalBest(pb||0);
                                } catch {}
                              }
                            } catch(e) {}
                            setTimeout(() => { setWon(false); setScreen('menu'); setShowDailyModal(true); }, 800);
                          })();
                        } else {
                          submitScoreToCloud({user:user||"Guest",mode,moves:mv,time:tm,score:finalScore})
                            .then(docId => { if(docId) setScoreDocId(docId); });
                        }
                        recordGameStats({mode,moves:mv,time:tm,score:finalScore,comboBonus:comboBonusRef.current});
                        setTimeout(async () => {
                          if (!db) return;
                          try {
                            const snap = await db.collection("scores").where("mode","==",mode).orderBy("score","desc").get();
                            const scoresList = snap.docs.map(d => d.data());
                            const position = scoresList.findIndex(s => s.score===finalScore&&s.user===(user||t('guest')));
                            if (position>=0) setRank(position+1);
                          } catch(e) {}
                        }, 1200);
                        return tm;
                      });
                      return mv;
                    });
                  }
                  lockRef.current = false;
                  return newTiles;
                } else {
                  comboRef.current=0; setCombo(0);
                  if (settings.sfx) play('fail');
                  
                  setShake(next);
                  setTimeout(() => setShake(null), 400);
                  const reset = cur.map(t => next.includes(t.id) ? {...t,flipped:false} : t);
                  lockRef.current = false;
                  return reset;
                }
              });
              setFlipped([]);
            }, 900);
          }
          return next;
        });
      }, [running,mode,play,user,settings.sfx,settings.vibration]);

      const cfg        = GRID_CONFIGS[mode];
      const totalPairs = cfg ? cfg.pairs : 0;
      const GAP        = (typeof window !== 'undefined' && window.innerWidth < 380) ? 6 : 5;
      const BOARD_PAD  = 8;
      const innerW     = Math.max(0, boardWidth - BOARD_PAD*2);
      const tileW      = Math.max(22, Math.floor((innerW - GAP*(cfg.cols-1)) / cfg.cols));

      // forceRender used to trigger re-render on lang change
      const _lang = forceRender && getLang();

      return (
        <div style={{ minHeight:'100vh', width:'100%', maxWidth:430, margin:'0 auto',
          backgroundImage:"url('/wood_bg.png')", backgroundSize:'cover', backgroundPosition:'center',
          backgroundRepeat:'no-repeat', backgroundColor:'#2b1a10',
          display:'flex', flexDirection:'column', alignItems:'center',
          fontFamily:"'Segoe UI',sans-serif", userSelect:'none', position:'relative', overflow:'hidden' }}>

          <button onClick={() => { const nv=!settings.music; settings.setMusic(nv); trackEvent('music_toggle_float',{value:nv}); }}
            style={{ position:'fixed', top:'calc(env(safe-area-inset-top,0px) + 12px)', right:12, zIndex:9999,
              width:32, height:32, borderRadius:'50%',
              background: settings.music ? 'rgba(255,180,0,0.3)' : 'rgba(0,0,0,0.5)',
              border: settings.music ? '1.5px solid rgba(255,210,0,0.8)' : '1.5px solid rgba(255,255,255,0.25)',
              color: settings.music ? '#ffe066' : 'rgba(255,255,255,0.55)',
              fontSize:15, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center',
              backdropFilter:'blur(4px)', transition:'all 0.2s ease',
              boxShadow: settings.music ? '0 0 10px rgba(255,180,0,0.4)' : 'none' }}>
            {settings.music ? '🎵' : '🔇'}
          </button>

          <style>{`
            .contentWrap { padding: calc(env(safe-area-inset-top, 0px) + 50px) 46px 40px; }
            @media (max-width: 420px) { .contentWrap { padding: calc(env(safe-area-inset-top, 0px) + 44px) 18px 32px; } }
            @keyframes popIn { from{transform:scale(0.5);opacity:0} to{transform:scale(1);opacity:1} }
            @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }
            @keyframes matchPop { 0%{transform:scale(1)} 50%{transform:scale(1.18)} 100%{transform:scale(1)} }
            @keyframes comboBanner { 0%{transform:scaleX(0);opacity:0} 20%{transform:scaleX(1);opacity:1} 80%{opacity:1} 100%{opacity:0} }
            @keyframes cardSlideUp { from{transform:translateY(40px) scale(0.94);opacity:0} to{transform:translateY(0) scale(1);opacity:1} }
            @keyframes fall { 0%{transform:translateY(0);opacity:1} 100%{transform:translateY(100vh);opacity:0} }
            .shake-tile { animation: shake 0.35s ease; }
            .match-tile { animation: matchPop 0.5s ease; }
          `}</style>

          <div style={{ position:'absolute', inset:0, zIndex:2, pointerEvents:'none',
            background:'radial-gradient(circle at 50% 30%,rgba(0,0,0,0.15),rgba(0,0,0,0.55))' }}/>

          <div className="contentWrap" style={{ position:'relative', zIndex:5, width:'100%', minHeight:'100vh',
            boxSizing:'border-box', display:'flex', flexDirection:'column', alignItems:'center' }}>

            {screen === 'menu' && (
              <div style={{ width:'100%', display:'flex', flexDirection:'column', alignItems:'center' }}>
                <div style={{ width:'100%', position:'relative', display:'flex', justifyContent:'center', alignItems:'center', marginBottom:6 }}>
                  <h1 style={{ margin:0, fontFamily:"'Georgia',serif", fontSize:44, fontWeight:900,
                    background:'linear-gradient(160deg,#fff9c4 0%,#ffe066 40%,#ffb300 70%,#ff8f00 100%)',
                    WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent',
                    filter:'drop-shadow(0 3px 6px rgba(0,0,0,0.8))', textAlign:'center' }}>MindSharp</h1>
                  <button onClick={() => { setShowSettings(true); trackEvent('settings_open',{}); }}
                    style={{ position:'absolute', right:0, background:'rgba(0,0,0,0.35)',
                      border:'1px solid rgba(255,255,255,0.2)', borderRadius:10, width:36, height:36,
                      display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', fontSize:18 }}>⚙️</button>
                </div>
                <p style={{ color:'#fff', fontSize:12, margin:'0 0 20px',
                  textShadow:'0 1px 6px rgba(0,0,0,0.9)', fontWeight:700, letterSpacing:2, textTransform:'uppercase',
                  background:'rgba(0,0,0,0.35)', padding:'3px 14px', borderRadius:20, border:'1px solid rgba(255,255,255,0.15)' }}>
                  {t("brand_subtitle")}
                </p>
                <div style={{ display:'flex', alignItems:'flex-end', justifyContent:'center', gap:10, marginBottom:22, height:76 }}>
                  {PREVIEW_TILES.map((pt,idx) => {
                    const tw=44,th=63,ds=13;
                    return (
                      <div key={idx} style={{ width:tw, height:th, borderRadius:7,
                        background:'linear-gradient(160deg,#FDFAF0 60%,#EDE5C8 100%)',
                        border:'1.5px solid #c8b98a',
                        boxShadow:'0 5px 12px rgba(0,0,0,0.5),inset 0 1px 2px rgba(255,255,255,0.9)',
                        display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'flex-start',
                        paddingTop:5, boxSizing:'border-box',
                        transform:`rotate(${pt.rot}deg) translateY(${pt.y}px)`, flexShrink:0 }}>
                        <span style={{ color:pt.color, fontWeight:900, fontSize:28, fontFamily:'Georgia,serif', lineHeight:1,
                          textShadow:'0 2px 4px rgba(0,0,0,0.2)', WebkitTextStroke:'0.5px rgba(0,0,0,0.15)' }}>{pt.number}</span>
                        <div style={{ flex:1 }}/>
                        <div style={{ width:ds, height:ds, borderRadius:'50%',
                          background:'radial-gradient(circle at 40% 35%,#d8cfa8,#b8a870)',
                          boxShadow:'inset 0 2px 4px rgba(0,0,0,0.35)',
                          display:'flex', alignItems:'center', justifyContent:'center', marginBottom:6 }}>
                          <span style={{ color:pt.color, fontSize:7, lineHeight:1 }}>♥</span>
                        </div>
                      </div>
                    );
                  })}
                </div>

                {user ? (
                  <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center',
                    background:'rgba(0,0,0,0.3)', borderRadius:10, padding:'8px 12px',
                    border:'1px solid rgba(200,169,110,0.3)', marginBottom:10, width:'100%', boxSizing:'border-box' }}>
                    <div style={{ display:'flex', alignItems:'center', gap:8, flexWrap:'nowrap', minWidth:0 }}>
                      <span style={{ color:'#ffe082', fontSize:13, fontWeight:700, whiteSpace:'nowrap' }}>👤 {user}</span>
                      {(() => {
                        const s=loadStats(); const streak=getStreakCount(s.streak||[]);
                        return streak>0 ? (
                          <span style={{ color:'rgba(255,224,130,0.6)', fontSize:11, fontWeight:700,
                            background:'rgba(255,150,0,0.15)', borderRadius:6, padding:'2px 7px', whiteSpace:'nowrap' }}>
                            🔥 {streak} {t("day_streak")}
                          </span>
                        ) : null;
                      })()}
                    </div>
                    <button onClick={() => { setUser(''); try { localStorage.removeItem('memotiles_user'); } catch {} }}
                      style={{ background:'none', border:'1px solid rgba(255,255,255,0.2)', borderRadius:6,
                        color:'rgba(255,255,255,0.45)', fontSize:11, cursor:'pointer',
                        padding:'3px 8px', whiteSpace:'nowrap', flexShrink:0, marginLeft:8 }}>{t("change_button")}</button>
                  </div>
                ) : (
                  <div style={{ marginBottom:10, padding:'10px 12px', borderRadius:14, width:'100%', boxSizing:'border-box',
                    background:'linear-gradient(135deg,rgba(255,220,80,0.18),rgba(243,156,18,0.12))',
                    border:'2px solid rgba(255,210,60,0.55)', boxShadow:'0 0 18px rgba(243,156,18,0.15)',
                    animation:'dailyGlow 2s ease-in-out infinite' }}>
                    <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                      <span style={{ fontSize:14, flexShrink:0 }}>👤</span>
                      <input type="text" value={tempUser} onChange={e => setTempUser(e.target.value)}
                        onKeyDown={e => {
                          if (e.key==='Enter' && tempUser.trim()) {
                            const n=tempUser.trim(); setUser(n);
                            try { localStorage.setItem('memotiles_user',n); } catch {}
                            setTempUser(''); trackEvent('name_entered',{source:'menu'});
                            showToast(t('name_saved_toast'));
                          }
                        }}
                        placeholder={t("name_placeholder")} maxLength={20}
                        style={{ flex:1, padding:'9px 11px', borderRadius:10, minWidth:0,
                          background:'rgba(255,255,255,0.92)', border:'2px solid rgba(243,156,18,0.7)',
                          color:'#1a0e00', fontSize:14, fontWeight:600, outline:'none', boxSizing:'border-box' }}
                      />
                      <button onClick={() => {
                        const n=tempUser.trim(); if(!n) return;
                        setUser(n); try { localStorage.setItem('memotiles_user',n); } catch {}
                        setTempUser(''); trackEvent('name_entered',{source:'menu'});
                        showToast(t('name_saved_toast'));
                      }} style={{ padding:'9px 14px', borderRadius:10, border:'none', flexShrink:0,
                        background: tempUser.trim() ? 'linear-gradient(135deg,#f39c12,#e67e22)' : 'rgba(200,169,110,0.35)',
                        color:'#fff', fontWeight:800, fontSize:13, cursor:'pointer',
                        transition:'all 0.2s', boxShadow: tempUser.trim() ? '0 3px 10px rgba(243,156,18,0.4)' : 'none' }}>
                        {t("save_button")}
                      </button>
                    </div>
                  </div>
                )}

                <div style={{ width:'100%', display:'flex', flexDirection:'column', gap:10 }}>
                  <div style={{ background:'rgba(0,0,0,0.4)', borderRadius:16, padding:15, border:'1px solid rgba(255,255,255,0.15)' }}>
                    <p style={{ color:'#ffe082', fontWeight:800, margin:'0 0 10px', textAlign:'center', fontSize:14 }}>{t("select_board")}</p>
                    {Object.entries(GRID_CONFIGS).map(([key,val]) => (
                      <button key={key} onClick={() => { setMode(key); trackEvent('board_selected',{board:key,difficulty:val.difficulty}); }}
                        style={{ width:'100%', padding:'12px 14px', marginBottom:7, borderRadius:10,
                          border:`2px solid ${mode===key?'#5B9BD5':'rgba(255,255,255,0.2)'}`,
                          background: mode===key ? 'linear-gradient(135deg,#4682B4,#5B9BD5)' : 'rgba(255,255,255,0.1)',
                          color:'#fff', fontWeight:700, fontSize:14, cursor:'pointer',
                          display:'flex', justifyContent:'space-between', alignItems:'center',
                          boxShadow: mode===key ? '0 4px 14px rgba(70,130,180,0.45)' : 'none' }}>
                        <span style={{ fontSize:20, fontWeight:900, letterSpacing:0.5 }}>{tDiff(val.difficulty)}</span>
                        <span style={{ fontSize:12, fontWeight:700,
                          color: mode===key ? 'rgba(255,255,255,0.85)' : 'rgba(255,255,255,0.5)',
                          background: mode===key ? 'rgba(255,255,255,0.15)' : 'rgba(255,255,255,0.08)',
                          padding:'3px 10px', borderRadius:6 }}>
                          {val.tileCount} {t("tiles_label")}
                        </span>
                      </button>
                    ))}
                  </div>

                  {(() => {
                    const doneForMode = todayDoneForMode(mode);
                    return (
                      <button onClick={() => {
                        if (doneForMode) {
                          const r = getDailyResult(mode);
                          if (r) {
                            setDailyResult(r); setDailyModeKey(mode);
                            (async () => {
                              try {
                                if (db) {
                                  const snap = await db.collection('daily_scores')
                                    .where('dateKey','==',getDailyDateKey()).where('gridMode','==',mode).get();
                                  const all = snap.docs.map(d => d.data().score||0).sort((a,b)=>b-a);
                                  setDailyTotal(all.length);
                                  setDailyRank(all.findIndex(s => s<=r.score)+1||all.length);
                                }
                              } catch {}
                              setShowDailyModal(true);
                            })();
                          }
                        } else { startDailyChallenge(mode); }
                      }} style={{ width:'100%', padding:'14px 15px', borderRadius:14,
                        background: doneForMode ? 'linear-gradient(135deg,#b35a00,#e67e22)' : 'linear-gradient(135deg,#f39c12,#e67e22)',
                        border: doneForMode ? 'none' : '2px solid rgba(255,220,80,0.5)',
                        cursor:'pointer', animation: doneForMode ? 'none' : 'dailyGlow 2s ease-in-out infinite',
                        display:'flex', alignItems:'center', justifyContent:'center', gap:8, position:'relative' }}>
                        <span style={{ fontSize:18 }}>{doneForMode?'✅':'🎯'}</span>
                        <span style={{ display:'flex', flexDirection:'column', alignItems:'flex-start', gap:1 }}>
                          <span style={{ color:'#fff', fontWeight:800, fontSize:17, lineHeight:1.2 }}>{t("daily_challenge")}</span>
                          {!doneForMode && (
                            <span style={{ color:'rgba(255,255,255,0.7)', fontSize:10, fontStyle:'italic', fontWeight:400, lineHeight:1 }}>{t("daily_once")}</span>
                          )}
                        </span>
                        {dailyStreak.count > 0 && (
                          <span style={{ fontSize:12, background:'rgba(0,0,0,0.2)', padding:'2px 8px', borderRadius:20,
                            color:'#fff', fontWeight:700, marginLeft:'auto', flexShrink:0 }}>
                            {dailyStreak.count>=7?'🔥':'⚡'} {dailyStreak.count}
                          </span>
                        )}
                      </button>
                    );
                  })()}

                  <button onClick={() => startGame(mode)} style={{ width:'100%', padding:'15px', borderRadius:14, border:'none',
                    background:'linear-gradient(135deg,#27ae60,#2ecc71)', color:'#fff', fontWeight:800, fontSize:17,
                    cursor:'pointer', boxShadow:'0 5px 18px rgba(46,204,113,0.4)' }}>{t("start_game")}</button>

                  <div style={{ display:'flex', gap:8 }}>
                    <button onClick={() => { setScreen('scores'); trackEvent('scores_click',{}); }}
                      style={{ flex:1, padding:'12px', borderRadius:14, border:'2px solid rgba(255,255,255,0.3)',
                        background:'rgba(0,0,0,0.3)', color:'#fff', fontWeight:700, fontSize:14, cursor:'pointer' }}>{t("scores_button")}</button>
                    <button onClick={() => { setScreen('profile'); trackEvent('profile_click',{}); }}
                      style={{ flex:1, padding:'12px', borderRadius:14, border:'2px solid rgba(255,255,255,0.3)',
                        background:'rgba(0,0,0,0.3)', color:'#fff', fontWeight:700, fontSize:14, cursor:'pointer' }}>{t("profile_button")}</button>
                  </div>
                </div>
              </div>
            )}

            {screen === 'profile' && (
              <div style={{ width:'100%', display:'flex', flexDirection:'column' }}>
                <ProfileScreen user={user} scores={scores} onBack={() => setScreen('menu')} />
                {showInstallBanner && <InstallBanner onDismiss={() => setShowInstallBanner(false)} />}
              </div>
            )}

            {screen === 'daily_scores' && (
              <div style={{ width:'100%', display:'flex', flexDirection:'column' }}>
                <DailyScoresScreen onBack={() => setScreen('menu')} dateKey={getDailyDateKey()}
                  gridMode={dailyModeKey} myScore={dailyResult ? dailyResult.score : 0} />
                {showInstallBanner && <InstallBanner onDismiss={() => setShowInstallBanner(false)} />}
              </div>
            )}

            {screen === 'scores' && (
              <div style={{ width:'100%', display:'flex', flexDirection:'column', gap:10 }}>
                <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:4 }}>
                  <button onClick={() => setScreen('menu')} style={{ background:'rgba(0,0,0,0.35)',
                    border:'1px solid rgba(255,255,255,0.2)', color:'#ffe082', borderRadius:10,
                    padding:'7px 13px', cursor:'pointer', fontSize:16 }}>←</button>
                  <h2 style={{ color:'#ffe082', fontFamily:'Georgia,serif', margin:0, fontSize:20,
                    textShadow:'0 2px 6px rgba(0,0,0,0.8)' }}>{t("scores_title")}</h2>
                </div>
                <div style={{ background:'rgba(0,0,0,0.5)', borderRadius:16, padding:'14px 10px',
                  border:'1px solid rgba(255,255,255,0.15)', backdropFilter:'blur(4px)' }}>
                  <ScoreBoard scores={scores} sortBy={sortBy} onSortChange={setSortBy}
                    activeCategory={scoreCategory} onCategoryChange={setScoreCategory}
                    onClearCategory={async (cat) => { setScores(prev => prev.filter(s => s.mode!==cat)); }} />
                </div>
                {showInstallBanner && <InstallBanner onDismiss={() => setShowInstallBanner(false)} />}
              </div>
            )}

            {screen === 'game' && (
              <div style={{ width:'100%', display:'flex', flexDirection:'column', alignItems:'center', gap:8 }}>
                <div style={{ width:'100%', padding:'8px 12px', display:'flex', alignItems:'center',
                  justifyContent:'space-between', background:'rgba(0,0,0,0.4)', borderRadius:10 }}>
                  <button onClick={() => { if(running||moves>0) setShowExitConfirm(true); else { setRunning(false); setScreen('menu'); } }}
                    style={{ background:'none', border:'none', color:'#ffe082', fontSize:20, cursor:'pointer', padding:'0 4px' }}>←</button>
                  <div style={{ display:'flex', gap:10, alignItems:'center' }}>
                    {[
                      { val:score.toLocaleString(), label:t('score_label') },
                      { val:moves, label:t('moves_label') },
                      { val:formatTime(time), label:t('time_label') },
                      { val:`${matched}/${totalPairs}`, label:t('pairs_label') },
                    ].map((s,i) => (
                      <React.Fragment key={s.label}>
                        {i>0 && <div style={{ width:1, background:'#7a5c2e', alignSelf:'stretch' }}/>}
                        <div style={{ textAlign:'center' }}>
                          <div style={{ color:'#ffe082', fontWeight:i===0?900:800, fontSize:16 }}>{s.val}</div>
                          <div style={{ color:'#c8a96e', fontSize:9, letterSpacing:0.5 }}>{s.label}</div>
                        </div>
                      </React.Fragment>
                    ))}
                  </div>
                  <button onClick={() => startGame(mode)}
                    style={{ background:'none', border:'none', color:'#ffe082', fontSize:20, cursor:'pointer', padding:'0 4px' }}>↺</button>
                </div>
                <div style={{ width:'100%', height:4, background:'rgba(255,255,255,0.1)', borderRadius:2 }}>
                  <div style={{ height:'100%', background:'linear-gradient(90deg,#27ae60,#2ecc71)',
                    width:`${(matched/totalPairs)*100}%`, transition:'width 0.4s ease', borderRadius:2 }}/>
                </div>
                {combo >= 2 && (
                  <div style={{ width:'100%', padding:'4px 0', textAlign:'center',
                    background: combo>=3 ? 'linear-gradient(90deg,rgba(243,156,18,0.9),rgba(230,126,34,0.9))' : 'linear-gradient(90deg,rgba(39,174,96,0.85),rgba(46,204,113,0.85))',
                    color:'#fff', fontWeight:900, fontSize:combo>=3?14:12, letterSpacing:1,
                    animation:'comboBanner 0.4s ease' }}>
                    {combo>=3 ? t('combo_x3',{n:combo}) : t('combo_x2',{n:combo})}
                  </div>
                )}
                <div className={"ms-hint"+(showHint?"":" hide")}>{t("game_hint")}</div>
                <div ref={boardRef} style={{ padding:'8px', width:'100%', maxWidth:'100%', boxSizing:'border-box',
                  overflow:'hidden', boxShadow:'inset 0 2px 10px rgba(0,0,0,0.5)', borderRadius:12,
                  border:'2px solid rgba(90,54,32,0.6)' }}>
                  <div style={{ display:'grid', gridTemplateColumns:`repeat(${cfg.cols},${tileW}px)`,
                    gap:`${GAP}px`, justifyContent:'center' }}>
                    {tiles.map(tile => (
                      <div key={tile.id} className={(shake&&shake.includes(tile.id)?'shake-tile ':'')+(matchAnim.includes(tile.id)?'match-tile':'')}>
                        <Tile tile={tile} onClick={handleTile} size={tileW} />
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}
          </div>

          {won && (
            <WinModal moves={moves} time={time} mode={mode} score={score} comboBonus={comboBonus} rank={rank}
              user={user} scoreDocId={scoreDocId}
              onReplay={() => { trackEvent('replay_click',{mode,score}); startGame(mode); }}
              onMenu={() => { trackEvent('menu_return',{source:'win_modal',mode,score}); setWon(false); setScreen('menu'); }}
              onScores={() => { trackEvent('scores_click',{source:'win_modal'}); setWon(false); setScreen('scores'); }}
              onSaveName={(name) => {
                setUser(name); try { localStorage.setItem('memotiles_user',name); } catch {}
                trackEvent('name_saved_postgame',{source:'win_modal'});
                showToast(t('name_saved_toast'));
              }}
              onScoreDoubled={() => {
                const boosted = score+100; setScore(boosted);
                submitScoreToCloud({user:user||t('guest'),mode,moves,time,score:boosted})
                  .then(docId => { if(docId) setScoreDocId(docId); });
                showToast('🎬 +100 ' + t('pts_label') + '!');
              }}
            />
          )}

          {showSettings && <SettingsModal onClose={() => setShowSettings(false)} settings={settings} onLangChange={() => setForceRender(x=>x+1)} />}

          {showDailyModal && dailyResult && (
            <DailyCompleteModal result={dailyResult} streak={dailyStreak}
              alreadyDone={todayDoneForMode(dailyModeKey)&&screen==='menu'}
              user={user} dailyRank={dailyRank} dailyTotal={dailyTotal} personalBest={dailyPersonalBest}
              onSaveName={(name) => {
                setUser(name); try { localStorage.setItem('memotiles_user',name); } catch {}
                updateDailyScoreUsername(dailyDocId,name);
              }}
              onLeaderboard={() => { trackEvent('daily_leaderboard_view',{mode:dailyModeKey}); setShowDailyModal(false); setScreen('daily_scores'); }}
              onMenu={() => { trackEvent('menu_return',{source:'daily_modal'}); setShowDailyModal(false); setScreen('menu'); }}
              onShare={() => {
                trackEvent('daily_share',{mode:dailyModeKey,score:dailyResult.score,rank:dailyRank});
                const fmtT = s => String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
                const today = new Date();
                const dateLabel = today.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
                const fire = dailyStreak.count>=7?'🔥':dailyStreak.count>=3?'⚡':'✨';
                const rankTxt = dailyRank ? ' | #'+dailyRank+' today' : '';
                const text = [
                  t('share_daily_title'), dateLabel,
                  '⏱ '+fmtT(dailyResult.time)+'  🃏 '+dailyResult.moves+' moves  🏆 '+dailyResult.score.toLocaleString()+' pts'+rankTxt,
                  fire+' '+dailyStreak.count+' '+t('share_daily_streak'),
                  'mindsharp.co'
                ].join('\n');
                if (navigator.share) navigator.share({text}).catch(()=>{});
                else navigator.clipboard.writeText(text).catch(()=>{});
              }}
            />
          )}

          {showExitConfirm && (
            <ConfirmDialog title={t("quit_title")} message={t("quit_message")} confirmLabel={t("quit_confirm")}
              onConfirm={() => {
                setShowExitConfirm(false);
                trackEvent('game_quit',{mode,time,moves,matched,total_pairs:totalPairs,type:isDailyRef.current?'daily':'regular'});
                setRunning(false); setWon(false); setScreen('menu');
              }}
              onCancel={() => setShowExitConfirm(false)} />
          )}

          {toast && <div className="ms-toast">{toast}</div>}

          {showOnboarding && (
            <OnboardingModal onDone={() => setShowOnboarding(false)} playSound={play} sfxEnabled={settings.sfx} />
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        const loader = document.getElementById('ms-loader');
        if (loader) loader.style.display = 'none';
      });
    });
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').then(() => console.log('[SW] Registered')).catch(err => console.warn('[SW] Failed:', err));
    }
  </script>
  <script>
    window.__installPromptEvent = null;
    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      window.__installPromptEvent = e;
      if (window.__onInstallPromptReady) window.__onInstallPromptReady();
    });
    window.addEventListener('appinstalled', function() {
      window.__installPromptEvent = null;
      try { localStorage.setItem('ms_pwa_installed','1'); } catch {}
      if (window.__onAppInstalled) window.__onAppInstalled();
    });
  </script>
</body>
</html>
